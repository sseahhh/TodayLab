<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>핫딜공유방 🔥 | 오늘연구소</title>
  <meta name="description" content="오늘연구소 핫딜공유방 — 최신 핫딜 정보를 실시간으로 공유하고 확인하세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js" crossorigin="anonymous"></script>
  <script src="auth.js"></script>
  <style>
    .board-wrap { min-height: 100vh; background: var(--bg); padding: calc(var(--nav-h) + 32px) 20px 80px; }
    .board-inner { max-width: 860px; margin: 0 auto; }
    .board-header { margin-bottom: 28px; }
    .board-header h1 { font-size: 26px; font-weight: 900; margin-bottom: 6px; }
    .board-header p { font-size: 14px; color: var(--gray3); }
    .board-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .cat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .cat-chip {
      padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 600;
      border: 1.5px solid rgba(255,255,255,.1); background: var(--bg2);
      color: var(--gray2); cursor: pointer; transition: all .2s;
    }
    .cat-chip.active, .cat-chip:hover { background: var(--red); border-color: var(--red); color: #fff; }
    .btn-write {
      padding: 10px 22px; background: var(--red); color: #fff; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 700; cursor: pointer;
      font-family: inherit; white-space: nowrap; transition: opacity .2s;
    }
    .btn-write:hover { opacity: .85; }

    /* Post card */
    .post-list { display: flex; flex-direction: column; gap: 10px; }
    .post-item {
      background: var(--bg2); border-radius: 12px;
      border: 1.5px solid rgba(255,255,255,.06);
      display: grid; grid-template-columns: auto 1fr auto;
      gap: 0; overflow: hidden; transition: border-color .2s;
    }
    .post-item:hover { border-color: rgba(229,9,20,.35); }
    .post-thumb {
      width: 120px; min-height: 100px; object-fit: cover;
      display: block; flex-shrink: 0;
    }
    .post-thumb-empty {
      width: 120px; min-height: 100px; background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; flex-shrink: 0;
    }
    .post-body { padding: 14px 16px; min-width: 0; }
    .post-top { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
    .post-cat {
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; white-space: nowrap;
    }
    .hot-badge {
      font-size: 10px; font-weight: 800; color: #ffd700;
      background: rgba(255,215,0,.1); border: 1px solid rgba(255,215,0,.25);
      padding: 1px 6px; border-radius: 4px;
    }
    .new-badge {
      font-size: 10px; font-weight: 800; color: #ff4d4d;
      background: rgba(255,77,77,.12); border: 1px solid rgba(255,77,77,.3);
      padding: 1px 6px; border-radius: 4px;
    }
    .post-title { font-size: 15px; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
    .post-desc { font-size: 13px; color: var(--gray2); line-height: 1.6; margin-bottom: 8px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-meta { display: flex; align-items: center; gap: 14px; font-size: 12px; color: var(--gray3); flex-wrap: wrap; }
    .post-link { color: #4facfe; text-decoration: none; font-weight: 600; }
    .post-link:hover { text-decoration: underline; }
    .post-right {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 14px 16px; gap: 6px; border-left: 1px solid rgba(255,255,255,.05);
    }
    .like-btn {
      display: flex; flex-direction: column; align-items: center;
      gap: 2px; background: none; border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 10px; padding: 8px 12px; cursor: pointer;
      color: var(--gray3); font-size: 11px; font-weight: 600;
      transition: all .2s; font-family: inherit; min-width: 48px;
    }
    .like-btn:hover, .like-btn.liked { border-color: #ff4d4d; color: #ff4d4d; }
    .like-btn .like-icon { font-size: 18px; }
    .post-date { font-size: 11px; color: var(--gray3); }

    .empty-msg { text-align: center; padding: 60px 0; color: var(--gray3); font-size: 15px; }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 28px; }
    .page-btn {
      width: 36px; height: 36px; border-radius: 8px; border: 1.5px solid rgba(255,255,255,.1);
      background: var(--bg2); color: var(--gray2); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .page-btn.active, .page-btn:hover { background: var(--red); border-color: var(--red); color: #fff; }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.8);
      z-index: 2000; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--bg2); border-radius: 16px; padding: 28px;
      width: 100%; max-width: 500px; border: 1.5px solid rgba(255,255,255,.1);
      max-height: 90vh; overflow-y: auto;
    }
    .modal-box h2 { font-size: 20px; font-weight: 800; margin-bottom: 22px; }
    .modal-label { font-size: 13px; font-weight: 600; color: var(--gray2); margin-bottom: 6px; display: block; }
    .modal-input, .modal-select, .modal-textarea {
      width: 100%; background: var(--bg3); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 14px;
      font-family: inherit; outline: none; margin-bottom: 16px;
    }
    .modal-input:focus, .modal-select:focus, .modal-textarea:focus { border-color: var(--red); }
    .modal-select option { background: #242424; }
    .modal-textarea { min-height: 90px; resize: vertical; }

    /* Image upload */
    .img-upload-area {
      width: 100%; border: 2px dashed rgba(255,255,255,.15); border-radius: 10px;
      padding: 24px; text-align: center; cursor: pointer; margin-bottom: 16px;
      transition: border-color .2s; position: relative;
    }
    .img-upload-area:hover, .img-upload-area.drag { border-color: var(--red); }
    .img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .img-upload-area p { font-size: 13px; color: var(--gray3); margin-top: 6px; }
    .img-preview { width: 100%; max-height: 180px; object-fit: cover; border-radius: 8px; display: none; margin-bottom: 16px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn-submit {
      flex: 1; padding: 13px; background: var(--red); color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit;
    }
    .btn-submit:hover { opacity: .85; }
    .btn-cancel {
      padding: 13px 22px; background: var(--bg3); color: var(--gray2);
      border: 1.5px solid rgba(255,255,255,.1); border-radius: 8px;
      font-size: 14px; cursor: pointer; font-family: inherit;
    }

    @media (max-width: 600px) {
      .post-item { grid-template-columns: 1fr; }
      .post-thumb, .post-thumb-empty { width: 100%; height: 160px; }
      .post-right { flex-direction: row; justify-content: space-between; border-left: none; border-top: 1px solid rgba(255,255,255,.05); }
    }

    /* Auth wall */
    .auth-wall {
      display: none; position: fixed; inset: 0; z-index: 9999;
      background: var(--bg); align-items: center; justify-content: center; padding: 20px;
    }
    .auth-wall.show { display: flex; }
    .auth-box {
      background: var(--bg2); border-radius: 20px; padding: 36px 32px;
      width: 100%; max-width: 400px; border: 1.5px solid rgba(255,255,255,.1);
      text-align: center;
    }
    .auth-box h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
    .auth-box > p { font-size: 14px; color: var(--gray3); margin-bottom: 24px; }
    .auth-tabs {
      display: flex; margin-bottom: 22px; border-radius: 10px;
      overflow: hidden; border: 1.5px solid rgba(255,255,255,.1);
    }
    .auth-tab {
      flex: 1; padding: 11px; background: transparent; border: none; cursor: pointer;
      font-family: inherit; font-size: 14px; font-weight: 700; color: var(--gray3); transition: all .2s;
    }
    .auth-tab.active { background: var(--red); color: #fff; }
    .auth-input {
      width: 100%; background: var(--bg3); border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px; padding: 12px 14px; color: #fff; font-size: 14px;
      font-family: inherit; outline: none; margin-bottom: 10px; box-sizing: border-box;
    }
    .auth-input:focus { border-color: var(--red); }
    .auth-submit {
      width: 100%; padding: 13px; background: var(--red); color: #fff; border: none;
      border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
      font-family: inherit; margin-top: 4px; transition: opacity .2s;
    }
    .auth-submit:hover { opacity: .85; }
    .auth-error { font-size: 13px; color: #ff4d4d; margin: 4px 0 8px; min-height: 18px; text-align: left; }
    .auth-back { display: block; margin-top: 20px; font-size: 13px; color: var(--gray3); text-decoration: none; }
    .auth-back:hover { color: var(--gray2); }
    .kakao-login-btn {
      width: 100%; padding: 14px; background: #FEE500; color: #191919;
      border: none; border-radius: 10px; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit; transition: opacity .2s; margin-top: 8px;
    }
    .kakao-login-btn:hover { opacity: .88; }
    .user-chip { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--gray2); }
    .btn-logout {
      padding: 6px 14px; background: transparent; border: 1.5px solid rgba(255,255,255,.15);
      border-radius: 6px; color: var(--gray3); font-size: 12px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all .2s;
    }
    .btn-logout:hover { border-color: var(--red); color: #ff4d4d; }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="board-free.html" style="color:var(--gray2);text-decoration:none;font-size:13px;margin-right:16px;">💬 자유게시판</a>
        <div id="userBar" class="user-chip" style="display:none;margin-right:12px;">
          <span>👤 <span id="userNickDisplay"></span></span>
          <button class="btn-logout" onclick="doLogout()">로그아웃</button>
        </div>
        <a href="index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="board-wrap">
    <div class="board-inner">
      <div class="board-header">
        <h1>🔥 핫딜공유방</h1>
        <p>좋은 딜을 발견했다면 함께 나눠요! 실시간 최저가 · 할인 정보 공유</p>
      </div>

      <div class="board-toolbar">
        <div class="cat-chips" id="catChips">
          <button class="cat-chip active" data-cat="전체">전체</button>
          <button class="cat-chip" data-cat="식품/음료">🍱 식품/음료</button>
          <button class="cat-chip" data-cat="패션/뷰티">👗 패션/뷰티</button>
          <button class="cat-chip" data-cat="전자기기">📱 전자기기</button>
          <button class="cat-chip" data-cat="생활용품">🏠 생활용품</button>
          <button class="cat-chip" data-cat="육아">👶 육아</button>
          <button class="cat-chip" data-cat="기타">📦 기타</button>
        </div>
        <button class="btn-write" onclick="openModal()">✏️ 딜 공유하기</button>
      </div>

      <div class="post-list" id="postList"></div>
      <div class="empty-msg" id="emptyMsg" style="display:none;">등록된 딜이 없습니다 😥</div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <!-- Write Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <h2>✏️ 핫딜 공유하기</h2>

      <label class="modal-label">제목 *</label>
      <input class="modal-input" id="mTitle" placeholder="예: [쿠팡] 핫초코 2개 100원">

      <label class="modal-label">카테고리</label>
      <select class="modal-select" id="mCat">
        <option>식품/음료</option>
        <option>패션/뷰티</option>
        <option>전자기기</option>
        <option>생활용품</option>
        <option>육아</option>
        <option>기타</option>
      </select>

      <label class="modal-label">딜 링크</label>
      <input class="modal-input" id="mLink" placeholder="https://...">

      <label class="modal-label">설명</label>
      <textarea class="modal-textarea" id="mDesc" placeholder="할인 내용, 유의사항 등을 간단히 적어주세요"></textarea>

      <label class="modal-label">스크린샷 첨부</label>
      <div class="img-upload-area" id="uploadArea">
        <input type="file" id="mImage" accept="image/*">
        <div id="uploadPlaceholder">
          <div style="font-size:32px;">📷</div>
          <p>클릭하거나 이미지를 드래그해서 올려주세요</p>
        </div>
      </div>
      <img id="imgPreview" class="img-preview" alt="미리보기">

      <div class="modal-actions">
        <button class="btn-submit" onclick="submitPost()">공유하기</button>
        <button class="btn-cancel" onclick="closeModal()">취소</button>
      </div>
    </div>
  </div>

<script>
const CAT_COLORS = {
  '식품/음료': { bg: 'rgba(255,171,0,.15)', color: '#ffab00' },
  '패션/뷰티': { bg: 'rgba(240,98,146,.15)', color: '#f06292' },
  '전자기기':  { bg: 'rgba(79,172,254,.15)', color: '#4facfe' },
  '생활용품':  { bg: 'rgba(67,233,123,.15)', color: '#43e97b' },
  '육아':      { bg: 'rgba(252,182,159,.15)', color: '#fcb69f' },
  '기타':      { bg: 'rgba(255,255,255,.08)', color: '#b3b3b3' },
};

const CAT_EMOJI = { '식품/음료':'🍱', '패션/뷰티':'👗', '전자기기':'📱', '생활용품':'🏠', '육아':'👶', '기타':'📦' };

const SAMPLE = [
  { id:1, title:'GS25 삼각김밥 + 컵라면 1+1 행사 중', cat:'식품/음료', link:'', desc:'행사기간 한정. 매장 확인 필수.', likes:187, date:'2025-06-25', isHot:true, img:'' },
  { id:2, title:'에어팟 4세대 최저가 경신 — 쿠팡 로켓배송', cat:'전자기기', link:'', desc:'쿠팡 단독 특가. 재고 소진 시 종료.', likes:542, date:'2025-06-25', isHot:true, img:'' },
  { id:3, title:'올리브영 선크림 50% 타임특가 (오늘 자정 마감)', cat:'패션/뷰티', link:'', desc:'인기 선크림 3종. 자정에 종료 예정.', likes:321, date:'2025-06-24', isHot:true, img:'' },
  { id:4, title:'다이슨 청소기 공식몰 여름 특가', cat:'생활용품', link:'', desc:'V12 한정 수량 할인. 멤버십 추가 5% 혜택.', likes:234, date:'2025-06-24', isHot:false, img:'' },
  { id:5, title:'카카오페이 결제 시 스벅 아메리카노 무료', cat:'식품/음료', link:'', desc:'선착순 10만명. 카카오페이 앱에서 쿠폰 발급.', likes:893, date:'2025-06-23', isHot:true, img:'' },
  { id:6, title:'나이키 공식 사이트 여름 세일 최대 40%', cat:'패션/뷰티', link:'', desc:'러닝화·트레이닝화 대다수 포함. 7/2까지.', likes:312, date:'2025-06-23', isHot:false, img:'' },
];

const STORE_KEY = 'ft_hotdeals_v2';
let currentCat = '전체';
let currentPage = 1;
const PER_PAGE = 8;
let pendingImg = '';

function getPosts() {
  const saved = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
  return saved || SAMPLE;
}
function savePosts(posts) { localStorage.setItem(STORE_KEY, JSON.stringify(posts)); }

function getFiltered() {
  const posts = getPosts();
  return currentCat === '전체' ? posts : posts.filter(p => p.cat === currentCat);
}

function timeAgo(dateStr) {
  const diff = Math.floor((new Date() - new Date(dateStr)) / 86400000);
  if (diff === 0) return '오늘';
  if (diff === 1) return '1일 전';
  if (diff < 7) return diff + '일 전';
  return dateStr.slice(5).replace('-', '/');
}

function renderPosts() {
  const list = getFiltered();
  const page = list.slice((currentPage - 1) * PER_PAGE, currentPage * PER_PAGE);
  const el = document.getElementById('postList');
  el.innerHTML = '';
  document.getElementById('emptyMsg').style.display = list.length ? 'none' : 'block';

  page.forEach(p => {
    const col = CAT_COLORS[p.cat] || CAT_COLORS['기타'];
    const emoji = CAT_EMOJI[p.cat] || '📦';
    const isNew = p.id > 100;
    const item = document.createElement('div');
    item.className = 'post-item';
    item.innerHTML = `
      ${p.img
        ? `<img class="post-thumb" src="${p.img}" alt="딜 이미지">`
        : `<div class="post-thumb-empty">${emoji}</div>`}
      <div class="post-body">
        <div class="post-top">
          <span class="post-cat" style="background:${col.bg};color:${col.color}">${p.cat}</span>
          ${p.isHot ? '<span class="hot-badge">🔥 HOT</span>' : ''}
          ${isNew ? '<span class="new-badge">NEW</span>' : ''}
        </div>
        <div class="post-title">${p.title}</div>
        ${p.desc ? `<div class="post-desc">${p.desc}</div>` : ''}
        <div class="post-meta">
          <span>${timeAgo(p.date)}</span>
          ${p.link ? `<a class="post-link" href="${p.link}" target="_blank" rel="noopener" onclick="event.stopPropagation()">🔗 링크 바로가기</a>` : ''}
        </div>
      </div>
      <div class="post-right">
        <button class="like-btn ${p.liked ? 'liked' : ''}" onclick="toggleLike(${p.id}, event)">
          <span class="like-icon">🔥</span>
          <span>${p.likes}</span>
        </button>
        <span class="post-date">${p.date.slice(5).replace('-', '/')}</span>
      </div>`;
    el.appendChild(item);
  });

  renderPagination(list.length);
}

function renderPagination(total) {
  const pages = Math.ceil(total / PER_PAGE);
  const el = document.getElementById('pagination');
  el.innerHTML = '';
  for (let i = 1; i <= pages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.textContent = i;
    btn.onclick = () => { currentPage = i; renderPosts(); window.scrollTo({ top: 0, behavior: 'smooth' }); };
    el.appendChild(btn);
  }
}

function toggleLike(id, e) {
  e.stopPropagation();
  const posts = getPosts();
  const p = posts.find(x => x.id === id);
  if (!p) return;
  p.liked = !p.liked;
  p.likes += p.liked ? 1 : -1;
  savePosts(posts);
  renderPosts();
}

document.getElementById('catChips').addEventListener('click', e => {
  const chip = e.target.closest('.cat-chip');
  if (!chip) return;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  currentCat = chip.dataset.cat;
  currentPage = 1;
  renderPosts();
});

// Image upload
const imageInput = document.getElementById('mImage');
const imgPreview = document.getElementById('imgPreview');
const uploadArea = document.getElementById('uploadArea');

imageInput.addEventListener('change', () => {
  const file = imageInput.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    pendingImg = e.target.result;
    imgPreview.src = pendingImg;
    imgPreview.style.display = 'block';
    document.getElementById('uploadPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('drag'); });
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('drag'));
uploadArea.addEventListener('drop', e => {
  e.preventDefault();
  uploadArea.classList.remove('drag');
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = ev => {
    pendingImg = ev.target.result;
    imgPreview.src = pendingImg;
    imgPreview.style.display = 'block';
    document.getElementById('uploadPlaceholder').style.display = 'none';
  };
  reader.readAsDataURL(file);
});

// Modal
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
  ['mTitle','mLink','mDesc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('mCat').selectedIndex = 0;
  pendingImg = '';
  imgPreview.src = '';
  imgPreview.style.display = 'none';
  imageInput.value = '';
  document.getElementById('uploadPlaceholder').style.display = 'block';
}
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function submitPost() {
  const title = document.getElementById('mTitle').value.trim();
  if (!title) { alert('제목을 입력해주세요!'); return; }
  const posts = getPosts();
  posts.unshift({
    id: Date.now(),
    title,
    cat: document.getElementById('mCat').value,
    link: document.getElementById('mLink').value.trim(),
    desc: document.getElementById('mDesc').value.trim(),
    img: pendingImg,
    likes: 0, liked: false,
    date: new Date().toISOString().slice(0, 10),
    isHot: false,
  });
  savePosts(posts);
  closeModal();
  currentCat = '전체';
  document.querySelector('.cat-chip[data-cat="전체"]').click();
  alert('딜이 공유됐어요! 🔥');
}

renderPosts();

// ---- Auth wall ----
function doKakaoLogin() {
  document.getElementById('kakaoLoginError').textContent = '';
  authKakaoLogin(
    function(profile) { onAuthSuccess(profile.nick); },
    function() { document.getElementById('kakaoLoginError').textContent = '카카오 로그인에 실패했어요. 다시 시도해주세요.'; }
  );
}

function onAuthSuccess(nick) {
  document.getElementById('authWall').classList.remove('show');
  document.getElementById('userNickDisplay').textContent = nick;
  document.getElementById('userBar').style.display = 'flex';
}

function doLogout() {
  authLogout();
  location.reload();
}

// Page load check
(function() {
  const user = authCurrentUser();
  if (!user) {
    document.getElementById('authWall').classList.add('show');
  } else {
    document.getElementById('userNickDisplay').textContent = user;
    document.getElementById('userBar').style.display = 'flex';
  }
})();
</script>

  <style>
    .mbti-type-display {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 6px;
      line-height: 1;
      margin: 8px 0 16px;
      background: linear-gradient(135deg, #e50914, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .mbti-nickname {
      font-size: 20px;
      font-weight: 700;
      color: var(--gray1);
      margin-bottom: 20px;
    }
    .mbti-axes {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 18px 0;
    }
    .mbti-axis-item {
      background: var(--bg3);
      border-radius: 10px;
      padding: 12px 14px;
      text-align: center;
    }
    .mbti-axis-label {
      font-size: 11px;
      color: var(--gray3);
      margin-bottom: 6px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .mbti-axis-bar {
      background: rgba(255,255,255,.06);
      border-radius: 50px;
      height: 8px;
      margin: 6px 0;
      overflow: hidden;
    }
    .mbti-axis-fill {
      height: 100%;
      border-radius: 50px;
      transition: width 1.2s cubic-bezier(.4,0,.2,1) .3s;
    }
    .mbti-axis-letters {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 700;
    }
    .strength-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .strength-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 7px 0;
      font-size: 14px;
      color: var(--gray2);
      line-height: 1.6;
      border-bottom: 1px solid rgba(255,255,255,.05);
    }
    .strength-item:last-child { border-bottom: none; }
    .mbti-compat-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }
    .compat-item {
      border-radius: 10px;
      padding: 14px 16px;
      text-align: center;
    }
    .compat-item.good {
      background: rgba(70,211,105,.08);
      border: 1px solid rgba(70,211,105,.2);
    }
    .compat-item.bad {
      background: rgba(229,9,20,.07);
      border: 1px solid rgba(229,9,20,.18);
    }
    .compat-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .compat-item.good .compat-label { color: #46d369; }
    .compat-item.bad .compat-label { color: #ff6b6b; }
    .compat-type {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: 2px;
    }
    .compat-item.good .compat-type { color: #6edd8a; }
    .compat-item.bad .compat-type { color: #ff8a8a; }
    .compat-name {
      font-size: 12px;
      color: var(--gray3);
      margin-top: 4px;
    }
    .axis-section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray3);
      margin: 18px 0 10px;
    }
  </style>
</head>

const TYPES = {
  INTJ: { emoji: '🦅', nickname: '냉철한 전략가', desc: '당신은 조용하지만 가장 멀리 보는 사람입니다. 혼자서 치밀한 계획을 세우고, 남들이 보지 못하는 패턴을 꿰뚫어 보는 직관과 논리를 동시에 갖췄어요. 사람보다 목표를 중요하게 여기는 것처럼 보이지만, 자신이 가치 있다고 판단한 것에는 모든 에너지를 쏟아붓는 완벽주의자입니다. 겉은 냉정해 보여도 속에는 누구보다 강한 신념이 있어요.', strengths: ['장기적 전략과 복잡한 시스템 설계', '독립적으로 깊이 있게 사고하는 능력', '목표를 향한 철저한 실행력'], cautions: ['타인의 감정과 관계에 소홀해질 수 있어요', '완벽주의로 인한 과도한 자기비판'], good: 'ENFP', bad: 'ESFP' },
  INTP: { emoji: '🔬', nickname: '논리의 화신', desc: '당신은 세상의 모든 것을 분해하고 원리를 이해하고 싶어하는 사람입니다. "왜?"라는 질문을 멈출 수가 없고, 어떤 분야든 한번 빠지면 그 누구보다 깊이 파고드는 집중력을 가졌어요. 대화보다 생각이 많은 편이지만, 한번 터지기 시작하면 밤새 이야기할 수 있는 아이디어의 보물창고입니다. 혼자만의 세계에서 가장 빛나는 타입이에요.', strengths: ['복잡한 이론과 개념을 빠르게 흡수하는 능력', '창의적이고 독창적인 문제 해결 방식', '어떤 주제든 깊이 파고드는 탐구심'], cautions: ['이론에 치우쳐 실행이 늦어질 수 있어요', '사회적 관계나 감정 표현을 어색해할 수 있어요'], good: 'ENTJ', bad: 'ESFJ' },
  ENTJ: { emoji: '👑', nickname: '타고난 지휘관', desc: '당신이 방에 들어서면 자연스럽게 사람들의 시선이 모입니다. 목표를 세우고 사람들을 이끄는 것이 숨 쉬는 것처럼 자연스러운 타입이에요. 비효율을 용납하지 못하고, 항상 더 나은 방법을 찾아 빠르게 실행합니다. 때로는 너무 직설적이거나 강압적으로 보일 수 있지만, 그 안에는 진짜 일이 되게 만들겠다는 강한 책임감이 있습니다.', strengths: ['사람과 자원을 효율적으로 조직하는 리더십', '명확한 목표 설정과 신속한 의사결정', '어떤 환경에서도 기회를 발견하는 전략적 시각'], cautions: ['타인의 의견이나 감정을 간과할 수 있어요', '성과를 너무 중시하다 관계가 소원해질 수 있어요'], good: 'INTP', bad: 'INFP' },
  ENTP: { emoji: '💡', nickname: '아이디어 폭발형', desc: '당신의 머릿속은 24시간 새로운 아이디어가 터지고 있습니다. 어떤 주제든 10분 안에 반론을 만들어낼 수 있는 논쟁의 달인이기도 하죠. 지루함을 못 견디고 항상 새로운 자극을 찾아다니며, 한 가지를 끝내기 전에 더 재밌는 것을 발견하는 건 늘 있는 일이에요. 세상에 불가능이라는 단어는 당신 사전에 없습니다.', strengths: ['독창적인 아이디어 발상과 혁신적인 사고', '논리와 창의를 결합한 설득 능력', '새로운 아이디어와 사람들을 연결하는 능력'], cautions: ['시작은 많은데 끝맺음이 약할 수 있어요', '상대방을 논쟁에서 이기려는 성향을 주의하세요'], good: 'INFJ', bad: 'ISFJ' },

// Axis scores: higher = first pole (E, S, T, J)
let axisScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
let current = 0;

function startTest() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function showQ(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.pole);
    choicesEl.appendChild(btn);
  });
}

function pick(pole) {
  axisScores[pole]++;
  current++;
  if (current < QUESTIONS.length) {
    showQ(current);
  } else {
    showAdThenResult(showResult);
  }
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';

  const e = axisScores['E'], i = axisScores['I'];
  const s = axisScores['S'], n = axisScores['N'];
  const t = axisScores['T'], f = axisScores['F'];
  const j = axisScores['J'], p = axisScores['P'];

  const mbti =
    (e >= i ? 'E' : 'I') +
    (s >= n ? 'S' : 'N') +
    (t >= f ? 'T' : 'F') +
    (j >= p ? 'J' : 'P');

  const r = TYPES[mbti];
  const totalEI = e + i || 1;
  const totalSN = s + n || 1;
  const totalTF = t + f || 1;
  const totalJP = j + p || 1;

  const ePct = Math.round((e / totalEI) * 100);
  const sPct = Math.round((s / totalSN) * 100);
  const tPct = Math.round((t / totalTF) * 100);
  const jPct = Math.round((j / totalJP) * 100);

  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <div class="result-type">나의 MBTI 유형</div>
      <div class="mbti-type-display" id="mbtiDisplay">${mbti}</div>

      <div class="result-desc">${r.desc}</div>

      <div class="axis-section-title">📊 성향 분석</div>
      <div class="mbti-axes" id="mbtiAxes">
        <div class="mbti-axis-item">
          <div class="mbti-axis-label">에너지 방향</div>
          <div class="mbti-axis-letters">
            <span style="color:${e >= i ? '#e50914' : 'var(--gray3)'}">E</span>
            <span style="color:${e < i ? '#e50914' : 'var(--gray3)'}">I</span>
          </div>
          <div class="mbti-axis-bar">
            <div class="mbti-axis-fill" id="axisEI" style="width:0%;background:linear-gradient(90deg,#e50914,#ff6b6b);"></div>
          </div>
          <div style="font-size:12px;color:var(--gray3);text-align:center;">${e >= i ? `E ${ePct}%` : `I ${100-ePct}%`}</div>
        </div>
        <div class="mbti-axis-item">
          <div class="mbti-axis-label">인식 방식</div>
          <div class="mbti-axis-letters">
            <span style="color:${s >= n ? '#e50914' : 'var(--gray3)'}">S</span>
            <span style="color:${s < n ? '#e50914' : 'var(--gray3)'}">N</span>
          </div>
          <div class="mbti-axis-bar">
            <div class="mbti-axis-fill" id="axisSN" style="width:0%;background:linear-gradient(90deg,#8b5cf6,#a78bfa);"></div>
          </div>
          <div style="font-size:12px;color:var(--gray3);text-align:center;">${s >= n ? `S ${sPct}%` : `N ${100-sPct}%`}</div>

          <div class="mbti-axis-label">판단 방식</div>
          <div class="mbti-axis-letters">

            <span style="color:${t < f ? '#e50914' : 'var(--gray3)'}">F</span>
          </div>
          <div class="mbti-axis-bar">
            <div class="mbti-axis-fill" id="axisTF" style="width:0%;background:linear-gradient(90deg,#0ea5e9,#38bdf8);"></div>
          </div>
          <div style="font-size:12px;color:var(--gray3);text-align:center;">${t >= f ? `T ${tPct}%` : `F ${100-tPct}%`}</div>
        </div>
        <div class="mbti-axis-item">
          <div class="mbti-axis-label">생활 방식</div>
          <div class="mbti-axis-letters">
            <span style="color:${j >= p ? '#e50914' : 'var(--gray3)'}">J</span>
            <span style="color:${j < p ? '#e50914' : 'var(--gray3)'}">P</span>
          </div>
          <div class="mbti-axis-bar">
            <div class="mbti-axis-fill" id="axisJP" style="width:0%;background:linear-gradient(90deg,#10b981,#34d399);"></div>
          </div>
          <div style="font-size:12px;color:var(--gray3);text-align:center;">${j >= p ? `J ${jPct}%` : `P ${100-jPct}%`}</div>
        </div>
      </div>

      <div class="axis-section-title">💪 강점 3가지</div>
      <ul class="strength-list">
        ${r.strengths.map(s => `<li class="strength-item"><span>✅</span><span>${s}</span></li>`).join('')}
      </ul>

      <div class="axis-section-title">⚠️ 주의할 점</div>
      <ul class="strength-list">
        ${r.cautions.map(c => `<li class="strength-item"><span>⚡</span><span>${c}</span></li>`).join('')}
      </ul>

      <div class="mbti-compat-box" style="margin-top:16px;">
        <div class="compat-item good">
          <div class="compat-label">잘 맞는 유형</div>
          <div class="compat-type">${r.good}</div>
          <div class="compat-name">${TYPES[r.good] ? TYPES[r.good].nickname : ''}</div>
        </div>
        <div class="compat-item bad">
          <div class="compat-label">조심할 유형</div>
          <div class="compat-type">${r.bad}</div>
          <div class="compat-name">${TYPES[r.bad] ? TYPES[r.bad].nickname : ''}</div>
        </div>
      </div>

      <div class="result-actions" style="margin-top:28px;">
        <button class="btn-share" onclick="shareResult('${mbti}')">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;

  // Animate axis bars
  setTimeout(() => {
    const eiEl = document.getElementById('axisEI');
    const snEl = document.getElementById('axisSN');
    const tfEl = document.getElementById('axisTF');
    const jpEl = document.getElementById('axisJP');
    if (eiEl) eiEl.style.width = ePct + '%';
    if (snEl) snEl.style.width = sPct + '%';
    if (tfEl) tfEl.style.width = tPct + '%';
    if (jpEl) jpEl.style.width = jPct + '%';
  }, 150);
}

function retryTest() {
  axisScores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareResult(mbti) {
  const text = `나의 MBTI는 ${mbti}! 너는?`;
  if (navigator.share) {
    navigator.share({ title: 'MBTI 간이 테스트', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
  }
}
</script>
</body>
</html>

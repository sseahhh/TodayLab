<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>복리 적금 계산기 | 오늘연구소</title>
  <meta name="description" content="복리 적금 계산기 — 매달 얼마씩 모으면 얼마가 될까? 복리 효과로 알아보는 적금 수령액 | 오늘연구소">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .savings-big {
      font-size: 52px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #96fbc4, #f9f586);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0 4px;
    }
    .growth-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 14px;
    }
    .growth-row:last-child { border-bottom: none; }
    .growth-year { color: var(--gray3); font-size: 13px; }
    .growth-val { font-weight: 700; color: #96fbc4; }
    .interest-val { color: #f9f586; font-weight: 700; }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">
      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">📈</span>
          <h1>복리 적금 계산기</h1>
          <p>매달 적립하면 복리로 얼마나 불어날까요?<br>10년 후 미래를 미리 확인해보세요!</p>
          <div class="test-meta">
            <span>💳 금융</span>
            <span>⏱ 1분</span>
            <span>👥 167,889명 참여</span>
          </div>
        </div>

        <div class="question-card">
          <label class="input-label">월 납입금 (만원)</label>
          <input type="number" class="input-field" id="monthly" placeholder="예: 30 (30만원)" min="1" max="10000">

          <label class="input-label">연 이자율 (%)</label>
          <input type="number" class="input-field" id="rate" placeholder="예: 3.5" min="0.1" max="20" step="0.01">

          <label class="input-label">납입 기간 (년)</label>
          <input type="number" class="input-field" id="years" placeholder="예: 5" min="1" max="40">

          <label class="input-label">이자 과세</label>
          <div class="chip-group" id="taxGroup">
            <button class="chip selected" onclick="selectTax(this,'normal')">일반과세 (15.4%)</button>
            <button class="chip" onclick="selectTax(this,'exempt')">비과세</button>
          </div>

          <button class="btn-primary" onclick="calculate()" style="width:100%;padding:15px;font-size:16px;margin-top:8px;">
            📈 복리 계산하기
          </button>
        </div>

        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:16px 18px;margin-top:16px;">
          <p style="font-size:12px;color:var(--gray3);line-height:1.7;">
            📌 월복리 기준 계산이며, 실제 금융상품은 연복리, 월복리 등 조건이 다를 수 있습니다.<br>
            비과세 혜택은 조건에 따라 다르니 금융기관에 확인하세요 😊
          </p>
        </div>
      </div>

      <div id="resultSection" style="display:none;"></div>
    </div>
  </div>

<script>
let taxType = 'normal';

function selectTax(btn, type) {
  document.querySelectorAll('#taxGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  taxType = type;
}

function calcFV(pmt, r, n) {
  // FV = PMT × [(1+r)^n - 1] / r
  return pmt * (Math.pow(1 + r, n) - 1) / r;
}

function calculate() {
  const monthlyWan = parseFloat(document.getElementById('monthly').value);
  const annualRate = parseFloat(document.getElementById('rate').value);
  const years = parseFloat(document.getElementById('years').value);

  if (!monthlyWan || monthlyWan < 1 || monthlyWan > 10000) {
    alert('월 납입금을 1~10000만원 사이로 입력해주세요!'); return;
  }
  if (!annualRate || annualRate < 0.1 || annualRate > 20) {
    alert('연 이자율을 0.1~20% 사이로 입력해주세요!'); return;
  }
  if (!years || years < 1 || years > 40) {
    alert('납입 기간을 1~40년 사이로 입력해주세요!'); return;
  }

  const pmt = monthlyWan * 10000;
  const r = annualRate / 12 / 100;
  const n = Math.round(years * 12);
  const totalPaid = pmt * n;

  const fvBeforeTax = calcFV(pmt, r, n);
  const grossInterest = fvBeforeTax - totalPaid;

  let taxAmount = 0;
  let netInterest = grossInterest;
  let netFV = fvBeforeTax;
  if (taxType === 'normal') {
    taxAmount = Math.round(grossInterest * 0.154);
    netInterest = grossInterest - taxAmount;
    netFV = totalPaid + netInterest;
  }

  // Year-by-year growth table
  const checkpoints = [];
  const maxCheckYear = Math.min(years, 10);
  const checkYears = [1, 3, 5, 10].filter(y => y <= years);
  if (!checkYears.includes(years) && years <= 10) checkYears.push(years);
  checkYears.sort((a,b) => a-b);

  checkYears.forEach(y => {
    const nCheck = y * 12;
    const fvCheck = calcFV(pmt, r, nCheck);
    const paidCheck = pmt * nCheck;
    const interestCheck = fvCheck - paidCheck;
    let taxCheck = 0;
    if (taxType === 'normal') taxCheck = Math.round(interestCheck * 0.154);
    const netFVCheck = fvCheck - taxCheck;
    checkpoints.push({ year: y, fv: Math.round(netFVCheck), paid: paidCheck, interest: Math.round(interestCheck - taxCheck) });
  });

  const yearsLabel = years >= 10 ? `10년 후 ${netFV.toLocaleString('ko-KR')}원!` : `${years}년 후 ${netFV.toLocaleString('ko-KR')}원!`;

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';

    const growthHTML = checkpoints.map(cp => `
      <div class="growth-row">
        <span class="growth-year">${cp.year}년 후</span>
        <div style="text-align:right;">
          <div class="growth-val">${cp.fv.toLocaleString('ko-KR')}원</div>
          <div style="font-size:11px;color:var(--gray3);">이자 ${cp.interest.toLocaleString('ko-KR')}원</div>
        </div>
      </div>`).join('');

    sec.innerHTML = `
      <div class="result-card">
        <span class="result-emoji">📈</span>
        <div class="result-type">최종 수령액 (세후)</div>
        <div class="savings-big">${netFV.toLocaleString('ko-KR')}원</div>
        <div style="text-align:center;color:var(--gray3);font-size:13px;margin-bottom:24px;">
          ${years}년 × 월 ${monthlyWan.toLocaleString('ko-KR')}만원, 연 ${annualRate}%
        </div>

        <div class="range-info" style="margin-bottom:20px;">
          <div class="range-row">
            <span>💵 총 납입금</span>
            <span class="range-val">${totalPaid.toLocaleString('ko-KR')}원</span>
          </div>
          <div class="range-row">
            <span>💰 세전 이자</span>
            <span class="interest-val">${Math.round(grossInterest).toLocaleString('ko-KR')}원</span>
          </div>
          ${taxType === 'normal' ? `
          <div class="range-row">
            <span>🏛️ 이자 세금 (15.4%)</span>
            <span style="color:#ff9999;font-weight:600;">-${taxAmount.toLocaleString('ko-KR')}원</span>
          </div>` : ''}
          <div class="range-row">
            <span>✅ 세후 이자</span>
            <span class="interest-val">${Math.round(netInterest).toLocaleString('ko-KR')}원</span>
          </div>
          <div class="range-row">
            <span>🎉 최종 수령액</span>
            <span class="range-val">${netFV.toLocaleString('ko-KR')}원</span>
          </div>
        </div>

        <div style="text-align:left;margin-bottom:20px;">
          <div style="font-size:14px;font-weight:700;margin-bottom:10px;">📊 연도별 성장 현황</div>
          <div style="background:rgba(255,255,255,.04);border-radius:12px;padding:4px 18px;">
            ${growthHTML}
          </div>
        </div>

        <div style="background:rgba(150,251,196,.06);border:1px solid rgba(150,251,196,.2);border-radius:12px;padding:16px 18px;margin-bottom:20px;">
          <p style="font-size:16px;font-weight:800;color:#96fbc4;text-align:center;">
            🚀 ${yearsLabel}
          </p>
          <p style="font-size:13px;color:var(--gray2);text-align:center;margin-top:6px;">
            복리의 마법, 일찍 시작할수록 강해져요!
          </p>
        </div>

        <div class="result-actions">
          <button class="btn-share" onclick="shareResult(${Math.round(netFV)}, ${years})">🔗 결과 공유하기</button>
          <button class="btn-retry" onclick="location.reload()">🔄 다시 계산</button>
          <a href="../index.html" class="btn-back">← 포털로</a>
        </div>
      </div>`;
  });
}

function shareResult(fv, years) {
  const text = `복리 적금 ${years}년 후 ${fv.toLocaleString('ko-KR')}원! 📈 복리의 마법 같이 경험해봐요~`;
  if (navigator.share) navigator.share({ title: '복리 적금 계산기', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

      color:white; border:none; padding:16px 0; width:100%;
      border-radius:12px; font-size:18px; font-weight:900;

// 기분별 추천 멘트
const MOOD_WHY_DEFAULT = {
  든든:    '든든하게 먹고 싶은 당신에게 딱 맞는 메뉴예요!',
  가벼운:  '가볍고 건강하게 먹고 싶은 당신을 위한 추천이에요.',
  매콤:    '칼칼하고 매콤한 게 당기는 당신의 선택!',
  시원한:  '시원하고 청량하게 즐길 수 있는 메뉴예요.',
  달콤:    '달콤한 것이 땡기는 당신을 위한 추천이에요.',
  아무거나:'오늘은 이걸로 결정! 고민 끝 😄',
};

const HEALTH_STARS = v => '★'.repeat(v) + '☆'.repeat(5 - v);
const SPICE_LABELS = ['안 맵다','약간 매움','보통 매움','매우 매움'];
const SPICE_EMOJIS = ['🟢','🟡','🟠','🔴'];

let selectedMood = null, selectedCuisine = null, lastPool = [];

document.querySelectorAll('#moodGroup .chip').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('#moodGroup .chip').forEach(c => c.classList.remove('selected'));
    btn.classList.add('selected');
    selectedMood = btn.dataset.mood;
  });
});

function goStep2() {
  if (!selectedMood) { alert('기분을 선택해주세요! 😊'); return; }
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
  document.querySelectorAll('#cuisineGroup .chip').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#cuisineGroup .chip').forEach(c => c.classList.remove('selected'));
      btn.classList.add('selected');
      selectedCuisine = btn.dataset.cuisine;
    });
  });
}

function getPool() {
  const mMatch = m => selectedMood    === '아무거나' || m.mood.includes(selectedMood);
  const cMatch = m => selectedCuisine === '아무거나' || m.cuisine === selectedCuisine;
  let pool = MENU.filter(m => mMatch(m) && cMatch(m));
  if (!pool.length) pool = MENU.filter(m => cMatch(m));
  if (!pool.length) pool = MENU.filter(m => mMatch(m));
  if (!pool.length) pool = MENU;
  return pool;
}

function recommend() {
  if (!selectedCuisine) { alert('음식 종류를 선택해주세요! 😊'); return; }
  lastPool = getPool();
  const pick = lastPool[Math.floor(Math.random() * lastPool.length)];
  showAdThenResult(() => showResult(pick));
}

function showResult(item) {
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'none';
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';

  // 맛 특징 칩 색상
  const flavorColors = ['#f59e0b','#f472b6','#34d399','#60a5fa','#a78bfa','#fb923c'];
  const flavorChips = item.flavor.map((f, i) =>
    `<span class="flavor-chip" style="background:${flavorColors[i%flavorColors.length]}22;color:${flavorColors[i%flavorColors.length]};border:1px solid ${flavorColors[i%flavorColors.length]}44;">${f}</span>`
  ).join('');

  // 왜 추천인지
  const whyText = (item.why && item.why[selectedMood]) || MOOD_WHY_DEFAULT[selectedMood] || '오늘의 추천 메뉴!';

  // 카드 그라데이션 by cuisine
  const gradients = {
    한식:'linear-gradient(135deg,rgba(255,100,60,.12) 0%,rgba(255,60,60,.06) 100%)',
    중식:'linear-gradient(135deg,rgba(255,200,0,.12) 0%,rgba(255,120,0,.06) 100%)',
    일식:'linear-gradient(135deg,rgba(255,80,120,.12) 0%,rgba(200,80,180,.06) 100%)',
    양식:'linear-gradient(135deg,rgba(80,160,255,.12) 0%,rgba(80,100,255,.06) 100%)',
    분식:'linear-gradient(135deg,rgba(255,140,0,.12) 0%,rgba(255,60,100,.06) 100%)',
  };
  const grad = gradients[item.cuisine] || gradients['한식'];

  // 대안 메뉴 (현재 메뉴 제외하고 비슷한 것들)
  const altPool = item.alts || [];

  sec.innerHTML = `
    <div class="result-card">
      <div class="menu-hero" style="background:${grad};border:1px solid rgba(255,255,255,.08);">
        <span class="menu-big-emoji" id="menuEmoji">${item.emoji}</span>
        <div class="menu-match-label" style="color:var(--red);">${item.cuisine} · ${selectedMood !== '아무거나' ? selectedMood + ' 추천' : '오늘의 추천'}</div>
        <div class="menu-title">${item.name}</div>
        <div class="menu-desc">${item.desc}</div>
      </div>

      <div class="stats-row">
        <div class="stat-chip">
          <span class="stat-chip-icon">🔥</span>
          <div class="stat-chip-label">칼로리</div>
          <div class="stat-chip-val">${item.kcal} kcal</div>
        </div>
        <div class="stat-chip">
          <span class="stat-chip-icon">💚</span>
          <div class="stat-chip-label">건강점수</div>
          <div class="stat-chip-val" style="font-size:12px;color:#46d369;">${HEALTH_STARS(item.health)}</div>
        </div>
        <div class="stat-chip">
          <span class="stat-chip-icon">${SPICE_EMOJIS[item.spice]}</span>
          <div class="stat-chip-label">맵기</div>
          <div class="stat-chip-val" style="font-size:11px;">${SPICE_LABELS[item.spice]}</div>
        </div>
      </div>

      <div class="flavor-row">${flavorChips}</div>

      <div class="why-box" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);">
        <span style="font-size:13px;font-weight:700;color:var(--gray3);">💡 추천 이유</span><br>
        <span style="font-size:13px;color:var(--gray2);line-height:1.8;">${whyText}</span>
      </div>

      ${altPool.length ? `
      <div class="alts-section">
        <div class="alts-title">🔀 이런 메뉴는 어때요?</div>
        <div class="alts-grid">
          ${altPool.map(a => `<button class="alt-btn" onclick="pickAlt('${a}')">${a}</button>`).join('')}
        </div>
      </div>` : ''}

      <div class="result-actions" style="margin-top:8px;">
        <button class="spin-btn" onclick="reRoll()">🎲 다른 메뉴 추천</button>
      </div>
      <div class="result-actions" style="margin-top:12px;">
        <button class="btn-share" onclick="shareResult('${item.name}')">🔗 공유하기</button>
        <button class="btn-retry" onclick="location.reload()">🔄 처음부터</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
}

function reRoll() {
  lastPool = getPool();
  const pick = lastPool[Math.floor(Math.random() * lastPool.length)];
  showResult(pick);
  setTimeout(() => { const e = document.getElementById('menuEmoji'); if(e){ e.classList.add('spinning'); setTimeout(()=>e.classList.remove('spinning'),650); } }, 50);
}

function pickAlt(name) {
  const found = MENU.find(m => m.name === name);
  if (found) showResult(found);
  else reRoll();
}

function shareResult(name) {
  const text = `오늘 점심은 ${name}! 뭐 먹을지 고민이라면? 🍱`;
  if (navigator.share) navigator.share({ title:'오늘 점심 추천', text, url:window.location.href });
  else navigator.clipboard.writeText(text).then(() => alert('복사됐어요! 🎉'));
}
</script>

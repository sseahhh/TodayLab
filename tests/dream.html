<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꿈 해몽 | 오늘연구소</title>
  <meta name="description" content="꿈 해몽 — 오늘연구소에서 재미있게 즐겨보세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .step-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .step-num {
      width: 28px; height: 28px;
      background: var(--red);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 900;
      flex-shrink: 0;
    }
    .step-title { font-size: 16px; font-weight: 700; }
    .step-card {
      background: var(--bg2);
      border-radius: 16px;
      padding: 24px 24px;
      border: 1.5px solid rgba(255,255,255,.06);
      margin-bottom: 16px;
    }
    .dream-result-badge {
      display: inline-block;
      font-size: 14px;
      font-weight: 800;
      padding: 6px 18px;
      border-radius: 50px;
      margin-bottom: 16px;
    }
    .badge-gil { background: rgba(70,211,105,.15); color: #46d369; border: 1px solid rgba(70,211,105,.3); }
    .badge-hyung { background: rgba(229,9,20,.12); color: #ff6b6b; border: 1px solid rgba(229,9,20,.25); }
    .badge-plain { background: rgba(255,255,255,.07); color: var(--gray2); border: 1px solid rgba(255,255,255,.12); }
    .dream-interp {
      background: linear-gradient(135deg, rgba(101,78,163,.12) 0%, rgba(50,100,255,.08) 100%);
      border: 1px solid rgba(161,140,209,.2);
      border-radius: 12px;
      padding: 20px 20px;
      margin-bottom: 20px;
    }
    .dream-interp p { font-size: 14px; color: var(--gray1); line-height: 1.85; }
    .dream-advice-box {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }
    .dream-advice-box p { font-size: 14px; color: var(--gray2); line-height: 1.8; }
    .progress-steps {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      align-items: center;
    }
    .ps-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background .3s;
    }
    .ps-dot.done { background: var(--red); }
    .ps-line {
      flex: 1; height: 2px;
      background: rgba(255,255,255,.1);
    }
  </style>
</head>
<body>

  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">

      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">💭</span>
          <h1>꿈 해몽</h1>
          <p>어젯밤 꿈이 궁금하다면?<br>꿈의 장소 · 등장인물 · 분위기로 해몽해드려요!</p>
          <div class="test-meta">
            <span>🔮 운세</span>
            <span>⏱ 1분</span>
            <span>👥 67,891명 참여</span>
          </div>
        </div>

        <div class="progress-steps">
          <div class="ps-dot done" id="pd0"></div>
          <div class="ps-line"></div>
          <div class="ps-dot" id="pd1"></div>
          <div class="ps-line"></div>
          <div class="ps-dot" id="pd2"></div>
        </div>

        <!-- Step 1: 장소 -->
        <div class="step-card" id="step1">
          <div class="step-header">
            <div class="step-num">1</div>
            <div class="step-title">꿈에 나온 주요 장소는?</div>
          </div>
          <div class="chip-group" id="placeGroup">

            <button class="chip" data-subject="4" onclick="selectSubject(this)">💰 돈/보물</button>
            <button class="chip" data-subject="5" onclick="selectSubject(this)">⚔️ 싸움/쫓김</button>
            <button class="chip" data-subject="6" onclick="selectSubject(this)">✨ 빛/신비로운 것</button>
          </div>
        </div>

        <!-- Step 3: 분위기 -->
        <div class="step-card" id="step3" style="opacity:.5;pointer-events:none;">
          <div class="step-header">
            <div class="step-num">3</div>

      <div id="resultSection" style="display:none;"></div>

<script>
let selPlace = null, selSubject = null, selMood = null;

function selectPlace(btn) {
  document.querySelectorAll('#placeGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selPlace = parseInt(btn.dataset.place);
  document.getElementById('step2').style.opacity = '1';
  document.getElementById('step2').style.pointerEvents = 'auto';
  document.getElementById('pd1').classList.add('done');
}
function selectSubject(btn) {
  document.querySelectorAll('#subjectGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selSubject = parseInt(btn.dataset.subject);
  document.getElementById('step3').style.opacity = '1';
  document.getElementById('step3').style.pointerEvents = 'auto';
  document.getElementById('pd2').classList.add('done');
}
function selectMood(btn) {
  document.querySelectorAll('#moodGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selMood = parseInt(btn.dataset.mood);
  document.getElementById('dreamBtn').disabled = false;
}

// Dream interpretation matrix
// [type: 'gil'|'hyung'|'plain', interpretation, advice]
const PLACE_NAMES = ['집/고향','학교','바다/강','산/숲','도시/건물','탈것','우주/하늘'];
const SUBJECT_NAMES = ['가족','연인/친구','귀신/악마','동물','돈/보물','싸움/쫓김','빛/신비로운 것'];
const MOOD_NAMES = ['무섭고 불안','행복하고 따뜻','이상하고 혼란','슬프고 그리운'];

// 길몽 조합들

  // 하늘+빛+행복
  '6-6-1': ['gil','하늘에서 빛나는 신비로운 존재를 만나는 꿈은 매우 길한 꿈입니다. 신의 보호와 축복이 임하며, 큰 소원이 이루어질 조짐입니다. 새로운 시작과 희망이 가득한 시기입니다.','오늘은 오래 간직해온 소원을 마음속으로 강하게 빌어보세요.'],
  // 산+동물+행복
  '3-3-1': ['gil','산에서 동물을 만나는 행복한 꿈은 귀인을 만날 징조입니다. 특히 호랑이나 곰 같은 큰 동물이라면 큰 행운과 지위 상승을 예고합니다. 가까운 시일 내에 도움이 되는 인물을 만날 것입니다.','사람들을 적극적으로 만나고 네트워크를 넓혀보세요.'],
  // 집+가족+행복
  '0-0-1': ['gil','고향 집에서 가족과 함께하는 행복한 꿈은 가정의 평화와 번영을 의미합니다. 가족 중 누군가에게 좋은 소식이 생기거나, 오래된 가족 문제가 해결될 것입니다.','가족과 함께하는 소중한 시간을 만들어보세요.'],
  // 탈것+연인+행복
  '5-1-1': ['gil','여행 중 사랑하는 사람과 함께하는 꿈은 연애운이 상승하는 신호입니다. 현재 연인이 있다면 관계가 더욱 깊어지고, 솔로라면 새로운 인연이 찾아올 것입니다.','먼저 용기 있게 감정을 표현해보세요.'],
  // 도시+돈+행복
  '4-4-1': ['gil','도시의 번화한 곳에서 돈이나 보물을 얻는 꿈은 사업이나 직장에서의 금전적 성공을 예고합니다. 노력한 만큼 정당한 보상이 돌아오는 시기입니다.','새로운 사업 아이디어나 투자 기회에 관심을 가져보세요.'],

  // 흉몽 조합들
  // 집+귀신+무서움
  '0-2-0': ['hyung','집에서 귀신이나 악마와 마주치는 무서운 꿈은 건강이나 주변 인물에 대한 불안감을 반영합니다. 가족 중 한 명의 건강을 점검해보거나, 평소 해결하지 못한 갈등이 있다면 먼저 풀어보세요.','주변 가족들과 솔직한 대화를 나누고 오해를 풀어보세요.'],
  // 바다+싸움+무서움
  '2-5-0': ['hyung','험한 바다에서 싸우거나 쫓기는 꿈은 현실에서의 극심한 스트레스와 압박감을 나타냅니다. 무리하게 일을 진행하다가 큰 장애를 만날 수 있으니 속도를 줄이고 신중하게 행동하세요.','중요한 결정은 일주일 뒤로 미루고 충분히 재검토하세요.'],
  // 학교+귀신+무서움
  '1-2-0': ['hyung','학교에서 귀신이나 위협적인 존재를 만나는 꿈은 과거의 상처나 실패에 대한 두려움이 아직 해소되지 않았음을 보여줍니다. 과거의 실수에 너무 집착하지 말고 앞으로 나아가세요.','오래된 걱정거리를 적어보고 하나씩 해결 방법을 찾아보세요.'],
  // 도시+싸움+무서움
  '4-5-0': ['hyung','복잡한 도시에서 쫓기거나 싸우는 꿈은 직장이나 사회에서의 갈등과 경쟁에 대한 압박을 표현합니다. 무리한 도전보다는 현재 위치를 지키는 것에 집중하세요.','인간관계에서 불필요한 적을 만들지 않도록 말을 조심하세요.'],
  // 산+귀신+무서움
  '3-2-0': ['hyung','산속에서 귀신이나 어둠을 만나는 꿈은 외로움과 고립감을 나타낼 수 있습니다. 또는 숨겨진 문제가 드러날 것을 예고하기도 합니다. 주변에 솔직하게 도움을 요청하세요.','혼자 해결하려 하지 말고 믿을 수 있는 사람에게 털어놓으세요.'],

  // 평범한 꿈 조합들
  // 학교+가족+슬픔
  '1-0-3': ['plain','학교에서 가족을 만나는 슬픈 꿈은 그리움과 향수를 상징합니다. 오랫동안 만나지 못한 사람에 대한 기억이 꿈으로 나타난 것입니다. 잠시 과거를 돌아보고 감정을 정리하는 시간을 가지세요.','오래 연락 못한 가족이나 친구에게 안부를 전해보세요.'],
  // 탈것+가족+슬픔
  '5-0-3': ['plain','기차나 차 안에서 가족이 나오는 슬픈 꿈은 이별이나 변화에 대한 마음의 준비를 의미합니다. 변화를 두려워하지 말고 자연스럽게 받아들이세요. 헤어짐이 있어야 새로운 만남도 있습니다.','변화를 긍정적으로 받아들이고 새로운 시작을 준비하세요.'],
  // 하늘+가족+혼란
  '6-0-2': ['plain','하늘을 날다가 가족이 등장하는 혼란스러운 꿈은 현실에서 자유와 책임 사이에서 갈등하는 마음을 보여줍니다. 자신의 꿈을 좇으면서도 주변 사람들을 배려하는 균형을 찾아보세요.','하고 싶은 것과 해야 할 것을 리스트로 작성해 균형을 맞춰보세요.'],
  // 바다+연인+슬픔
  '2-1-3': ['plain','바다에서 연인이나 친구와 함께하는 슬픈 꿈은 관계에 대한 아쉬움이나 미련이 담겨있습니다. 아직 하지 못한 말이나 표현이 있다면 용기를 내어 전해보세요.','솔직한 감정 표현이 관계를 더 깊게 만들어줄 것입니다.'],
};

// Fallback interpretations
const FALLBACK = {
  'gil': [
    ['숨겨진 재능이 드러나거나 예상치 못한 행운이 찾아올 꿈의 기운이 감지됩니다. 지금의 노력이 빛을 발할 시기가 가까이 왔습니다.','자신을 믿고 도전을 멈추지 마세요.'],
    ['긍정적인 변화가 시작되는 꿈입니다. 막혔던 일이 풀리고 인간관계에서 새로운 활력이 생길 것입니다.','마음을 열고 주변의 신호에 귀 기울여 보세요.'],
  ],
  'hyung': [
    ['현재의 스트레스나 불안감이 꿈으로 표현된 것 같습니다. 무리하게 진행 중인 일이 있다면 잠시 멈추고 재검토해 보세요.','충분한 휴식이 최선의 해결책입니다.'],
    ['주변의 갈등이나 환경적 압박이 꿈에 반영되었습니다. 감정을 억누르지 말고 건강하게 표출하는 방법을 찾으세요.','신뢰할 수 있는 사람과 대화를 나눠보세요.'],
  ],
  'plain': [
    ['현재의 일상이 그대로 반영된 꿈입니다. 지금 이 순간을 충실히 살아가고 있다는 표시이며, 무난하고 안정적인 시기가 이어질 것입니다.','현재에 집중하고 작은 행복을 발견해보세요.'],
    ['복잡한 감정과 생각이 정리되는 과정에서 꾼 꿈입니다. 자신의 내면을 들여다보는 좋은 기회가 될 것입니다.','명상이나 일기 쓰기가 도움이 될 수 있습니다.'],
  ],
};

const TYPE_INFO = {
  'gil': { label: '✨ 길몽', cls: 'badge-gil' },
  'hyung': { label: '⚠️ 흉몽', cls: 'badge-hyung' },
  'plain': { label: '💤 평범한 꿈', cls: 'badge-plain' },
};

function calculate() {
  if (selPlace === null || selSubject === null || selMood === null) {
    alert('모든 항목을 선택해주세요!');
    return;
  }

  const key = `${selPlace}-${selSubject}-${selMood}`;
  let type, interp, advice;

  if (DREAM_DB[key]) {
    [type, interp, advice] = DREAM_DB[key];
  } else {
    // Determine type by mood
    if (selMood === 1) type = 'gil';
    else if (selMood === 0) type = 'hyung';
    else type = 'plain';
    const fallbacks = FALLBACK[type];
    const idx = (selPlace + selSubject) % fallbacks.length;
    [interp, advice] = fallbacks[idx];
  }

  const typeInfo = TYPE_INFO[type];
  const placeName = PLACE_NAMES[selPlace];
  const subjectName = SUBJECT_NAMES[selSubject];
  const moodName = MOOD_NAMES[selMood];

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `<div class="result-card">
      <div class="result-type">💭 꿈 해몽 결과</div>
      <div class="result-emoji">💭</div>

      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;">
        <span class="result-tag">📍 ${placeName}</span>
        <span class="result-tag">👤 ${subjectName}</span>
        <span class="result-tag">🎭 ${moodName}</span>
      </div>

      <div class="dream-result-badge ${typeInfo.cls}">${typeInfo.label}</div>

      <div class="dream-interp">
        <p>${interp}</p>
      </div>

      <div class="dream-advice-box">
        <p>💜 오늘의 조언: ${advice}</p>
      </div>

      <div class="result-actions">
        <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="location.reload()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
  });
}

function shareResult() {
  const placeName = PLACE_NAMES[selPlace];
  const subjectName = SUBJECT_NAMES[selSubject];
  const text = `꿈 해몽 결과 💭 ${placeName}에서 ${subjectName}이 나온 꿈! 나도 꿈 해몽해봐~`;
  if (navigator.share) navigator.share({ title: '꿈 해몽', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>

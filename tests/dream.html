<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>꿈 해몽 | 오늘연구소</title>
  <meta name="description" content="장소·등장인물·분위기로 풀어보는 꿈 해몽 — 심리해석, 오늘의 운세, 행운 아이템까지">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .progress-steps { display:flex; gap:6px; margin-bottom:20px; align-items:center; }
    .ps-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.15); transition:background .3s; }
    .ps-dot.done { background:var(--red); }
    .ps-line { flex:1; height:2px; background:rgba(255,255,255,.1); }

    .step-card { background:var(--bg2); border-radius:16px; padding:24px; border:1.5px solid rgba(255,255,255,.06); margin-bottom:16px; }
    .step-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
    .step-num { width:28px; height:28px; background:var(--red); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:900; flex-shrink:0; }
    .step-title { font-size:16px; font-weight:700; }

    /* result */
    .score-wrap { display:flex; flex-direction:column; align-items:center; margin:8px 0 20px; }
    .score-ring {
      width:110px; height:110px; border-radius:50%; display:flex; flex-direction:column;
      align-items:center; justify-content:center; border:4px solid;
      margin-bottom:10px; position:relative;
    }
    .score-num { font-size:38px; font-weight:900; line-height:1; }
    .score-unit { font-size:12px; font-weight:500; opacity:.7; }
    .dream-badge {
      display:inline-block; padding:7px 22px; border-radius:50px;
      font-size:15px; font-weight:800;
    }
    .badge-gil   { background:rgba(70,211,105,.15);  color:#46d369; border:1px solid rgba(70,211,105,.3); }
    .badge-hyung { background:rgba(229,9,20,.12);    color:#ff6b6b; border:1px solid rgba(229,9,20,.25); }
    .badge-plain { background:rgba(255,255,255,.07); color:var(--gray2); border:1px solid rgba(255,255,255,.12); }

    .interp-box {
      background:linear-gradient(135deg,rgba(101,78,163,.13) 0%,rgba(50,100,255,.07) 100%);
      border:1px solid rgba(161,140,209,.22); border-radius:14px; padding:20px; margin-bottom:14px;
    }
    .interp-box p { font-size:14px; color:var(--gray1); line-height:1.9; }

    .psych-box {
      background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.07);
      border-radius:14px; padding:16px 18px; margin-bottom:14px;
    }
    .psych-title { font-size:12px; font-weight:700; color:var(--gray3); margin-bottom:8px; letter-spacing:.04em; }
    .psych-text  { font-size:13px; color:var(--gray2); line-height:1.75; }

    .fortune-wrap { margin-bottom:14px; }
    .fortune-title { font-size:13px; font-weight:700; color:var(--gray2); margin-bottom:12px; }
    .fortune-item { margin-bottom:10px; }
    .fortune-row { display:flex; align-items:center; gap:10px; }
    .fortune-label { font-size:12px; color:var(--gray3); width:36px; flex-shrink:0; }
    .fortune-bg { flex:1; background:rgba(255,255,255,.08); border-radius:50px; height:9px; }
    .fortune-fill { height:100%; border-radius:50px; transition:width 1.2s cubic-bezier(.4,0,.2,1) .3s; }
    .fortune-val { font-size:12px; font-weight:700; width:30px; text-align:right; flex-shrink:0; }

    .lucky-title { font-size:12px; font-weight:700; color:var(--gray3); margin-bottom:10px; letter-spacing:.04em; }
    .lucky-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; }
    .lucky-chip  { padding:7px 14px; border-radius:50px; font-size:13px; font-weight:600; border:1px solid; }

    .advice-box  { background:rgba(255,255,255,.04); border-radius:14px; padding:16px 18px; margin-bottom:20px; }
    .advice-text { font-size:14px; color:var(--gray2); line-height:1.8; }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">
      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">💭</span>
          <h1>꿈 해몽</h1>
          <p>어젯밤 꿈이 궁금하다면?<br>장소 · 등장인물 · 분위기로 정밀 해몽해드려요!</p>
          <div class="test-meta">
            <span>🔮 운세</span>
            <span>⏱ 1분</span>
            <span>👥 67,891명 참여</span>
          </div>
        </div>

        <div class="progress-steps">
          <div class="ps-dot done" id="pd0"></div>
          <div class="ps-line"></div>
          <div class="ps-dot" id="pd1"></div>
          <div class="ps-line"></div>
          <div class="ps-dot" id="pd2"></div>
        </div>

        <div class="step-card" id="step1">
          <div class="step-header">
            <div class="step-num">1</div>
            <div class="step-title">꿈에 나온 주요 장소는?</div>
          </div>
          <div class="chip-group" id="placeGroup">
            <button class="chip" data-place="0" onclick="selectPlace(this)">🏠 집·고향</button>
            <button class="chip" data-place="1" onclick="selectPlace(this)">🏫 학교</button>
            <button class="chip" data-place="2" onclick="selectPlace(this)">🌊 바다·강</button>
            <button class="chip" data-place="3" onclick="selectPlace(this)">⛰️ 산·숲</button>
            <button class="chip" data-place="4" onclick="selectPlace(this)">🏙️ 도시·건물</button>
            <button class="chip" data-place="5" onclick="selectPlace(this)">🚂 탈것·이동</button>
            <button class="chip" data-place="6" onclick="selectPlace(this)">🌌 우주·하늘</button>
          </div>
        </div>

        <div class="step-card" id="step2" style="opacity:.45;pointer-events:none;">
          <div class="step-header">
            <div class="step-num">2</div>
            <div class="step-title">꿈에 나온 주요 대상은?</div>
          </div>
          <div class="chip-group" id="subjectGroup">
            <button class="chip" data-subject="0" onclick="selectSubject(this)">👨‍👩‍👧 가족</button>
            <button class="chip" data-subject="1" onclick="selectSubject(this)">💑 연인·친구</button>
            <button class="chip" data-subject="2" onclick="selectSubject(this)">👻 귀신·악마</button>
            <button class="chip" data-subject="3" onclick="selectSubject(this)">🐯 동물</button>
            <button class="chip" data-subject="4" onclick="selectSubject(this)">💰 돈·보물</button>
            <button class="chip" data-subject="5" onclick="selectSubject(this)">⚔️ 싸움·쫓김</button>
            <button class="chip" data-subject="6" onclick="selectSubject(this)">✨ 빛·신비로운 것</button>
          </div>
        </div>

        <div class="step-card" id="step3" style="opacity:.45;pointer-events:none;">
          <div class="step-header">
            <div class="step-num">3</div>
            <div class="step-title">꿈의 전반적인 분위기는?</div>
          </div>
          <div class="chip-group" id="moodGroup">
            <button class="chip" data-mood="0" onclick="selectMood(this)">😰 무섭고 불안한</button>
            <button class="chip" data-mood="1" onclick="selectMood(this)">😊 행복하고 따뜻한</button>
            <button class="chip" data-mood="2" onclick="selectMood(this)">😕 이상하고 혼란스러운</button>
            <button class="chip" data-mood="3" onclick="selectMood(this)">😢 슬프고 그리운</button>
          </div>
          <button class="btn-primary" onclick="calculate()" style="width:100%;padding:15px;font-size:16px;margin-top:8px;" id="dreamBtn" disabled>
            💭 꿈 해몽하기
          </button>
        </div>
      </div>
      <div id="resultSection" style="display:none;"></div>
    </div>
  </div>

<script>
let selPlace = null, selSubject = null, selMood = null;

function selectPlace(btn) {
  document.querySelectorAll('#placeGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selPlace = parseInt(btn.dataset.place);
  document.getElementById('step2').style.opacity = '1';
  document.getElementById('step2').style.pointerEvents = 'auto';
  document.getElementById('pd1').classList.add('done');
}
function selectSubject(btn) {
  document.querySelectorAll('#subjectGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selSubject = parseInt(btn.dataset.subject);
  document.getElementById('step3').style.opacity = '1';
  document.getElementById('step3').style.pointerEvents = 'auto';
  document.getElementById('pd2').classList.add('done');
}
function selectMood(btn) {
  document.querySelectorAll('#moodGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selMood = parseInt(btn.dataset.mood);
  document.getElementById('dreamBtn').disabled = false;
}

// ── 장소 × 분위기 기본 해석 (28가지, {S} = 대상명 with 조사) ──────────────
const PM = {
  '0-0': { score:42, interp:'고향이나 집에서 공포와 불안을 경험하는 꿈은 가장 안전해야 할 공간에서 느끼는 위협을 상징합니다. {S}이(가) 그 두려움을 자극한 것은 가까운 관계나 일상의 기반에 해소되지 않은 갈등이 있음을 무의식이 알리는 신호입니다.', psych:'현재 안정감에 심각한 균열이 느껴지거나, 가정·주변 환경에서 오랫동안 쌓인 불안이 표출된 것입니다.', advice:'가장 가까운 사람과 솔직하게 감정을 나누거나, 일상에서 안전감을 줄 수 있는 작은 변화를 시도해 보세요.' },
  '0-1': { score:86, interp:'집이나 고향에서 행복하고 따뜻한 꿈은 가장 길한 꿈 중 하나입니다. {S}이(가) 함께한 것은 그 행복이 진정성 있게 지속될 것을 암시하며, 삶의 뿌리가 단단해지고 가족이나 가정과 관련된 기쁜 소식이 찾아올 조짐입니다.', psych:'삶의 기반에 대한 깊은 만족감과 안정감이 넘치는 상태입니다. 사랑하는 사람들과의 연결에서 충만함을 느끼고 있습니다.', advice:'소중한 사람들에게 평소 전하지 못했던 감사의 말을 오늘 전해보세요. 좋은 에너지가 배로 돌아옵니다.' },
  '0-2': { score:55, interp:'집이나 고향에서 이상하고 혼란스러운 꿈은 익숙한 환경 속에서 방향을 잃고 있다는 신호입니다. {S}이(가) 낯선 모습으로 등장한 것은 변화에 적응하는 과정에서 오는 내면의 혼란, 또는 가까운 관계에서 뭔가 달라지고 있음을 암시합니다.', psych:'익숙함과 낯섦 사이에서 정체성을 재조정하는 과도기입니다. 혼란은 새로운 균형을 찾아가는 과정입니다.', advice:'정리되지 않은 일들을 하나씩 목록으로 써보고, 가장 작은 것부터 차례로 마무리 지어보세요.' },
  '0-3': { score:50, interp:'집이나 고향에서 슬픔과 그리움을 느끼는 꿈은 잃어버린 무언가에 대한 애도, 혹은 돌아갈 수 없는 시절에 대한 그리움을 담고 있습니다. {S}이(가) 등장한 것은 그 감정이 특정 관계나 기억과 깊이 연결되어 있음을 보여줍니다.', psych:'과거에 대한 미련이나 상실감이 충분히 처리되지 않은 상태입니다. 그 감정을 온전히 느끼고 내려놓을 준비가 필요합니다.', advice:'그리운 사람이나 장소에 대한 감정을 일기에 솔직하게 써보세요. 표현하는 것만으로도 마음이 한결 가벼워집니다.' },

  '1-0': { score:38, interp:'학교에서 두려움과 불안을 느끼는 꿈은 평가받는 것에 대한 공포나 성과 압박이 무의식에 표출된 것입니다. {S}이(가) 그 불안을 더욱 구체화했으며, 아직 극복하지 못한 과거의 트라우마가 현재 행동을 제약하고 있을 수 있습니다.', psych:'타인의 시선과 기대에 대한 두려움이 크고, 실패에 대한 불안이 현재의 도전을 막고 있는 상태입니다.', advice:'\'완벽하지 않아도 충분하다\'고 스스로에게 말해주세요. 작은 성취를 기록하며 자신감을 쌓아가보세요.' },
  '1-1': { score:76, interp:'학교에서 즐겁고 행복한 꿈은 성장, 배움, 새로운 기회의 시작을 암시하는 길몽입니다. {S}이(가) 함께한 것은 그 성장 과정에서 중요한 조력자나 결정적 기회가 함께할 것을 의미합니다. 자기계발이나 도전에 나서기에 최적의 시기입니다.', psych:'자기 발전에 대한 의욕이 높고 배움에 대한 긍정적인 에너지가 최고조에 달해 있습니다.', advice:'지금 배우고 싶었던 것을 시작하기에 가장 좋은 타이밍입니다. 주저 없이 첫걸음을 내딛으세요.' },
  '1-2': { score:53, interp:'학교에서 이상하고 혼란스러운 꿈은 현재 자신의 역할과 사회적 위치에 대한 혼란을 반영합니다. {S}이(가) 등장한 것은 이 혼란이 특정 영역의 방향 설정과 연결되어 있음을 나타냅니다. 무엇을 원하는지, 어디로 가고 싶은지 다시 생각해볼 시간입니다.', psych:'자신의 정체성과 사회적 역할에 대한 의문을 품고 있는 시기입니다. 혼란은 새로운 방향을 찾기 직전의 신호입니다.', advice:'\'나는 지금 진짜 무엇을 원하는가\'를 조용히 자문해보세요. 명확한 목표 하나가 모든 혼란을 정리해 줍니다.' },
  '1-3': { score:47, interp:'학교에서 슬프고 그리운 꿈은 지나온 시절에 대한 향수와 이루지 못한 꿈에 대한 미련을 상징합니다. {S}이(가) 함께한 것은 과거의 특정 관계나 순간에 대한 그리움이 아직 마음속에 남아 있음을 보여줍니다.', psych:'과거에 이루지 못한 것에 대한 아쉬움이 현재 동기에 영향을 미치고 있습니다. 과거를 통해 현재를 재정의하는 시기입니다.', advice:'과거의 자신에게 \'그때 정말 잘했어, 최선이었어\'라고 말해주세요. 후회보다 성장에 집중할 때입니다.' },

  '2-0': { score:44, interp:'바다나 강에서 두려움과 불안을 느끼는 꿈은 감당하기 어려운 감정의 소용돌이나 상황에 압도된 느낌을 나타냅니다. {S}이(가) 그 위협을 구체화했으며, 현실에서 감당하기 힘든 감정이나 문제가 쌓여 있을 수 있습니다.', psych:'감정이 넘쳐 흐르고 있으며 상황을 통제하기 어렵다는 느낌이 강한 상태입니다. 감정적 과부하가 온 신호입니다.', advice:'모든 것을 혼자 감당하려 하지 마세요. 신뢰할 수 있는 사람에게 솔직하게 털어놓는 것이 가장 좋은 처방입니다.' },

function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }

function calculate() {
  if (selPlace===null || selSubject===null || selMood===null) { alert('모든 항목을 선택해주세요!'); return; }

  const pm   = PM[`${selPlace}-${selMood}`];
  const subj = SUBJ[selSubject];
  const finalScore = clamp(pm.score + subj.scoreMod, 10, 99);
  const typeKey = finalScore >= 70 ? 'gil' : finalScore >= 42 ? 'plain' : 'hyung';
  const T = TYPE[typeKey];

  const interpText = pm.interp.replace('{S}', subj.p);
  const psychText  = pm.psych + ' ' + subj.suffix;

  const money  = clamp(T.fortune.m + subj.fm.m, 15, 99);
  const love   = clamp(T.fortune.l + subj.fm.l, 15, 99);
  const health = clamp(T.fortune.h + subj.fm.h, 15, 99);

  const mColor = money  >= 70 ? '#f59e0b' : money  >= 45 ? '#60a5fa' : '#ef4444';
  const lColor = love   >= 70 ? '#f472b6' : love   >= 45 ? '#c084fc' : '#94a3b8';
  const hColor = health >= 70 ? '#34d399' : health >= 45 ? '#60a5fa' : '#f97316';

  const luckyChips = subj.lucky.map(l =>
    `<span class="lucky-chip" style="color:${subj.color};border-color:${subj.color}33;background:${subj.color}11;">${l}</span>`
  ).join('');

  const placeNames    = ['집·고향','학교','바다·강','산·숲','도시·건물','탈것·이동','우주·하늘'];
  const moodNames     = ['무섭고 불안한','행복하고 따뜻한','이상하고 혼란스러운','슬프고 그리운'];

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `
      <div class="result-card">
        <div class="result-type">💭 꿈 해몽 결과</div>

        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:12px 0 20px;">
          <span class="result-tag">📍 ${placeNames[selPlace]}</span>
          <span class="result-tag">👤 ${subj.name}</span>
          <span class="result-tag">🎭 ${moodNames[selMood]}</span>
        </div>

        <div class="score-wrap">
          <div class="score-ring" style="border-color:${T.ringColor};box-shadow:0 0 24px ${T.ringColor}33;">
            <div class="score-num" style="color:${T.ringColor};">${finalScore}</div>
            <div class="score-unit" style="color:${T.ringColor};">점</div>
          </div>
          <span class="dream-badge ${T.cls}">${T.label}</span>
        </div>

        <div class="interp-box">
          <p>${interpText}</p>
        </div>

        <div class="psych-box">
          <div class="psych-title">🧠 심리 해석</div>
          <div class="psych-text">${psychText}</div>
        </div>

        <div class="fortune-wrap">
          <div class="fortune-title">🌟 오늘의 운세</div>
          <div class="fortune-item">
            <div class="fortune-row">
              <span class="fortune-label">💰 재물</span>
              <div class="fortune-bg"><div class="fortune-fill" id="fMoney" style="width:0%;background:${mColor};"></div></div>
              <span class="fortune-val" style="color:${mColor};">${money}</span>
            </div>
          </div>
          <div class="fortune-item">
            <div class="fortune-row">
              <span class="fortune-label">💕 연애</span>
              <div class="fortune-bg"><div class="fortune-fill" id="fLove" style="width:0%;background:${lColor};"></div></div>
              <span class="fortune-val" style="color:${lColor};">${love}</span>
            </div>
          </div>
          <div class="fortune-item">
            <div class="fortune-row">
              <span class="fortune-label">💪 건강</span>
              <div class="fortune-bg"><div class="fortune-fill" id="fHealth" style="width:0%;background:${hColor};"></div></div>
              <span class="fortune-val" style="color:${hColor};">${health}</span>
            </div>
          </div>
        </div>

        <div class="lucky-title">🍀 오늘의 행운 아이템</div>
        <div class="lucky-chips">${luckyChips}</div>

        <div class="advice-box">
          <div class="psych-title" style="margin-bottom:8px;">💜 오늘의 조언</div>
          <div class="advice-text">${pm.advice}</div>
        </div>

        <div class="result-actions">
          <button class="btn-share" onclick="shareResult('${placeNames[selPlace]}','${subj.name}','${T.label}',${finalScore})">🔗 결과 공유하기</button>
          <button class="btn-retry" onclick="location.reload()">🔄 다시하기</button>
          <a href="../index.html" class="btn-back">← 포털로</a>
        </div>
      </div>`;

    setTimeout(() => {
      document.getElementById('fMoney').style.width  = money  + '%';
      document.getElementById('fLove').style.width   = love   + '%';
      document.getElementById('fHealth').style.width = health + '%';
    }, 200);
  });
}

function shareResult(place, subject, type, score) {
  const text = `꿈 해몽 결과 💭 ${place}에서 ${subject}이(가) 나온 꿈 — ${type} ${score}점! 나도 해봐~`;
  if (navigator.share) navigator.share({ title:'꿈 해몽', text, url:window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

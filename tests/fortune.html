<script>
let selectedG = null;
let selectedCal = 'solar';

const def = new Date();
def.setFullYear(def.getFullYear() - 25);
document.getElementById('birthDate').value = def.toISOString().split('T')[0];

function selG(btn) {
  document.querySelectorAll('.chip[data-g]').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selectedG = btn.dataset.g;
}

function selCal(btn) {
  document.querySelectorAll('.chip[data-cal]').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  selectedCal = btn.dataset.cal;
  const isLunar = selectedCal === 'lunar';
  document.getElementById('lunarNote').style.display = isLunar ? 'block' : 'none';
  document.getElementById('dateLabel').textContent = isLunar ? '생년월일 (음력)' : '생년월일 (양력)';
}

// 음력 1월 1일(설날)의 양력 날짜 [월, 일] — 1930~2025
const LUNAR_NEW_YEAR = {
  1930:[1,30], 1931:[2,17], 1932:[2,6],  1933:[1,26], 1934:[2,14],
  1935:[2,4],  1936:[1,24], 1937:[2,11], 1938:[1,31], 1939:[2,19],
  1940:[2,8],  1941:[1,27], 1942:[2,15], 1943:[2,5],  1944:[1,25],
  1945:[2,13], 1946:[2,2],  1947:[1,22], 1948:[2,10], 1949:[1,29],
  1950:[2,17], 1951:[2,6],  1952:[1,27], 1953:[2,14], 1954:[2,3],
  1955:[1,24], 1956:[2,12], 1957:[1,31], 1958:[2,18], 1959:[2,8],
  1960:[1,28], 1961:[2,15], 1962:[2,5],  1963:[1,25], 1964:[2,13],
  1965:[2,2],  1966:[1,21], 1967:[2,9],  1968:[1,30], 1969:[2,17],
  1970:[2,6],  1971:[1,27], 1972:[2,15], 1973:[2,3],  1974:[1,23],
  1975:[2,11], 1976:[1,31], 1977:[2,18], 1978:[2,7],  1979:[1,28],
  1980:[2,16], 1981:[2,5],  1982:[1,25], 1983:[2,13], 1984:[2,2],
  1985:[2,20], 1986:[2,9],  1987:[1,29], 1988:[2,17], 1989:[2,6],
  1990:[1,27], 1991:[2,15], 1992:[2,4],  1993:[1,23], 1994:[2,10],
  1995:[1,31], 1996:[2,19], 1997:[2,7],  1998:[1,28], 1999:[2,16],
  2000:[2,5],  2001:[1,24], 2002:[2,12], 2003:[2,1],  2004:[1,22],
  2005:[2,9],  2006:[1,29], 2007:[2,18], 2008:[2,7],  2009:[1,26],
  2010:[2,14], 2011:[2,3],  2012:[1,23], 2013:[2,10], 2014:[1,31],
  2015:[2,19], 2016:[2,8],  2017:[1,28], 2018:[2,16], 2019:[2,5],
  2020:[1,25], 2021:[2,12], 2022:[2,1],  2023:[1,22], 2024:[2,10],
  2025:[1,29],
};

// 음력 → 양력 변환 (홀수달=30일, 짝수달=29일 근사치, ±1~2일 오차)
function lunarToSolar(ly, lm, ld) {
  const ny = LUNAR_NEW_YEAR[ly];
  if (!ny) return null;
  let days = 0;
  for (let m = 1; m < lm; m++) days += (m % 2 === 1) ? 30 : 29;
  days += (ld - 1);
  const base = new Date(ly, ny[0] - 1, ny[1]);
  return new Date(base.getTime() + days * 86400000);
}

const LUCKY_COLORS = ['빨간색', '파란색', '노란색', '초록색', '보라색', '흰색', '분홍색', '주황색'];

  ['조용히 내면을 들여다보는 하루', '급하게 결정하기보다는 충분히 생각하고 신중하게 행동하세요.'],
  ['주변 사람들과의 인연이 빛나는 날', '소중한 인연에 감사하고, 먼저 연락해보는 것도 좋은 날입니다.'],

const FORTUNE_TEXTS = {

    ['🏦 투자나 재테크에 관심을 가져볼 좋은 시기입니다', 4],

    ['🎰 도박이나 투기는 피하세요. 안정적인 선택이 최선', 2],
    ['✨ 재물운이 서서히 좋아지는 중. 꾸준히 노력하세요', 3],
  ],
  health:  [
    ['💪 에너지가 넘치는 하루! 운동하기 딱 좋은 날이에요', 5],

    ['🥗 식이 관리에 신경써보세요. 건강한 식단이 도움이 돼요', 4],
    ['🏃 야외 활동이 기분 전환에 도움이 될 거예요', 4],
    ['⚠️ 무리하지 마세요. 오늘은 천천히 가는 날입니다', 2],
    ['🌿 마음의 건강도 중요해요. 명상이나 산책을 해보세요', 3],
  ],
  career:  [
    ['🚀 업무에서 빛나는 하루! 리더십을 발휘할 기회가 와요', 5],
    ['📋 꼼꼼한 준비가 성과로 이어집니다. 세부 사항을 챙기세요', 4],
    ['🤝 협력과 소통이 중요한 날. 팀원과 적극적으로 소통하세요', 4],
    ['💡 새로운 아이디어가 인정받을 수 있는 날이에요', 5],
    ['⏰ 기한을 지키는 것이 중요한 날. 우선순위를 정하세요', 3],
    ['🌱 성장을 위한 학습에 투자해보세요', 3],
  ],
};

function stars(n) {
  return '⭐'.repeat(n) + '☆'.repeat(5-n);
}

function seed(date, offset) {
  const d = new Date(date);
  const today = new Date();
  return (d.getFullYear() * 13 + d.getMonth() * 7 + d.getDate() * 3 + today.getDate() * 17 + offset) % 6;
}

function getFortune() {
  const birthStr = document.getElementById('birthDate').value;
  if (!birthStr) { alert('생년월일을 입력해주세요!'); return; }
  if (!selectedG) { alert('성별을 선택해주세요!'); return; }

  const parts = birthStr.split('-');
  const inputY = parseInt(parts[0]), inputM = parseInt(parts[1]), inputD = parseInt(parts[2]);

  let birth = birthStr;
  let calBadge, convertInfo = '';

  if (selectedCal === 'lunar') {
    const solar = lunarToSolar(inputY, inputM, inputD);
    if (solar) {
      birth = solar.toISOString().split('T')[0];
      const sy = solar.getFullYear(), sm = solar.getMonth() + 1, sd = solar.getDate();
      calBadge = '🌙 음력';
      convertInfo = `양력 환산: ${sy}년 ${sm}월 ${sd}일`;
    } else {
      calBadge = '🌙 음력';
      convertInfo = '지원 범위(1930~2025) 외 — 그대로 계산';
    }
  } else {
    calBadge = '☀️ 양력';
  }

  const s0 = seed(birth, 0);
  const s1 = seed(birth, 1);
  const s2 = seed(birth, 2);
  const s3 = seed(birth, 3);
  const s4 = seed(birth, 4);

  const [mainMsg, subMsg] = MAIN_MSGS[s0];
  const [loveText, loveStars]   = FORTUNE_TEXTS.love[s1];
  const [moneyText, moneyStars] = FORTUNE_TEXTS.money[s2];
  const [healthText, healthStars] = FORTUNE_TEXTS.health[s3];
  const [careerText, careerStars] = FORTUNE_TEXTS.career[s4];

  const total = Math.round((loveStars + moneyStars + healthStars + careerStars) / 4 * 20);

  const now = new Date();
  const dateStr = `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일`;

  const luckyColor = LUCKY_COLORS[s1 % LUCKY_COLORS.length];
  const luckyDir   = LUCKY_DIRS[s2 % LUCKY_DIRS.length];
  const luckyItem  = LUCKY_ITEMS[s3 % LUCKY_ITEMS.length];
  const luckyNum   = ((s4 + 1) * 7 % 45) + 1;

  const sec = document.getElementById('resultSection');
  showAdThenResult(() => {
  document.getElementById('formSection').style.display = 'none';
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="fortune-hero">
      <div class="fortune-date">
        📅 ${dateStr} 운세
        <br>
        <span style="font-size:11px; opacity:.65; display:inline-block; margin-top:4px;">
          ${calBadge} ${inputY}년 ${inputM}월 ${inputD}일 생
          ${convertInfo ? `&nbsp;·&nbsp;${convertInfo}` : ''}
        </span>
      </div>
      <div class="fortune-stars">${stars(Math.round(total/20))}</div>
      <div class="fortune-main-msg">${mainMsg}</div>
      <div class="fortune-sub-msg">${subMsg}</div>
    </div>

    <div class="fortune-cards">
      <div class="fortune-card">
        <span class="fc-icon">💕</span>
        <div class="fc-label">애정운</div>
        <div class="fc-stars">${stars(loveStars)}</div>
        <div class="fc-text">${loveText}</div>
      </div>
      <div class="fortune-card">
        <span class="fc-icon">💰</span>
        <div class="fc-label">금전운</div>
        <div class="fc-stars">${stars(moneyStars)}</div>
        <div class="fc-text">${moneyText}</div>
      </div>
      <div class="fortune-card">
        <span class="fc-icon">💪</span>
        <div class="fc-label">건강운</div>
        <div class="fc-stars">${stars(healthStars)}</div>
        <div class="fc-text">${healthText}</div>
      </div>
      <div class="fortune-card">
        <span class="fc-icon">💼</span>
        <div class="fc-label">직장운</div>
        <div class="fc-stars">${stars(careerStars)}</div>
        <div class="fc-text">${careerText}</div>
      </div>
    </div>

    <div class="lucky-section">
      <div class="lucky-title">🍀 오늘의 행운 아이템</div>
      <div class="lucky-row">
        <div class="lucky-item">
          <span class="lucky-item-icon">🎨</span>
          <span class="lucky-item-label">행운의 색</span>
          <span class="lucky-item-val">${luckyColor}</span>
        </div>
        <div class="lucky-item">
          <span class="lucky-item-icon">🧭</span>
          <span class="lucky-item-label">행운의 방향</span>
          <span class="lucky-item-val">${luckyDir}</span>
        </div>
        <div class="lucky-item">
          <span class="lucky-item-icon">🔢</span>
          <span class="lucky-item-label">행운의 숫자</span>
          <span class="lucky-item-val">${luckyNum}</span>
        </div>
        <div class="lucky-item">
          <span class="lucky-item-icon">${luckyItem.slice(0,2)}</span>

          <span class="lucky-item-val">${luckyItem.slice(2)}</span>

    <div class="advice-box">
      <p>💜 오늘의 조언: <strong>지금 이 순간에 충실하세요.</strong> 과거를 후회하거나 미래를 두려워하기보다, 오늘 하루 최선을 다하는 것이 가장 좋은 운세를 만드는 방법입니다.</p>
    </div>

    <div class="result-actions">
      <button class="btn-share" onclick="shareResult()">🔗 운세 공유하기</button>
      <button class="btn-retry" onclick="location.reload()">🔄 다시 보기</button>
      <a href="../index.html" class="btn-back">← 포털로</a>
    </div>`;
  }); // showAdThenResult
}

function shareResult() {
  const text = `오늘 나의 운세 확인했어 🔮 너도 궁금하면 해봐!`;
  if (navigator.share) {
    navigator.share({ title:'오늘의 운세', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
  }
}
</script>
</body>
</html>

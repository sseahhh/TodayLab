function getZodiac2026(year) {
  const cycle = ['monkey','rooster','dog','pig','rat','ox','tiger','rabbit','dragon','snake','horse','goat'];
  // base: 1900 = rat, index 4 in the cycle array
  // Let me re-map: 1900 = rat, cycle starting rat at index 4
  const fullCycle = ['monkey','rooster','dog','pig','rat','ox','tiger','rabbit','dragon','snake','horse','goat'];
  // 1900: monkey? No. Standard: 1900 = rat.
  // Cycle: rat=1900, ox=1901, tiger=1902, rabbit=1903, dragon=1904, snake=1905, horse=1906, goat=1907, monkey=1908, rooster=1909, dog=1910, pig=1911
  const keys2 = ['rat','ox','tiger','rabbit','dragon','snake','horse','goat','monkey','rooster','dog','pig'];
  const idx = ((year - 1900) % 12 + 12) % 12;
  const key = keys2[idx];
  return NY_ZODIAC.find(z => z.key === key) || NY_ZODIAC[0];
}

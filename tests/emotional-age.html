function startTest() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function showQ(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score);
    choicesEl.appendChild(btn);
  });
}

function pick(score) {
  totalScore += score;
  current++;
  if (current < QUESTIONS.length) {
    showQ(current);
  } else {
    showAdThenResult(showResult);
  }
}

function getCategory(score) {
  // score range: 10-40
  if (score <= 17) return CATEGORIES[0];
  if (score <= 23) return CATEGORIES[1];
  if (score <= 29) return CATEGORIES[2];
  if (score <= 35) return CATEGORIES[3];
  if (score <= 39) return CATEGORIES[4];
  return CATEGORIES[5];
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const cat = getCategory(totalScore);
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <div class="result-type">나의 감정 나이</div>
      <div class="age-circle" style="border-color:${cat.borderColor}; background: radial-gradient(circle, ${cat.color}18, transparent);" id="ageCircle">
        <span class="age-circle-num" style="color:${cat.color};" id="ageNum">0</span>
        <span class="age-circle-unit" style="color:${cat.color};">세</span>
      </div>
      <div class="result-title">${cat.label}</div>
      <div class="result-desc">${cat.desc}</div>
      <div class="age-merits">
        <div class="age-merits-title" style="color:${cat.color};">✦ 감정 나이의 장점</div>
        ${cat.merits.map(m => `<div class="merit-item"><span>✅</span><span>${m}</span></div>`).join('')}
      </div>
      <div class="complement-box">⚠️ 보완할 점: ${cat.complement}</div>
      <div class="healing-box">
        <strong>🌿 어울리는 힐링 방법</strong>
        ${cat.healing}
      </div>
      <div class="result-actions" style="margin-top:28px;">
        <button class="btn-share" onclick="shareResult('${cat.age}세')">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;

  // Animate age number
  let n = 0;
  const target = cat.age;
  const step = Math.ceil(target / 30);
  const timer = setInterval(() => {
    n = Math.min(n + step, target);
    const el = document.getElementById('ageNum');
    if (el) el.textContent = n;
    if (n >= target) clearInterval(timer);
  }, 40);
}

function retryTest() {
  totalScore = 0;
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareResult(age) {
  const text = `나의 감정 나이는 ${age}! 너는?`;
  if (navigator.share) {
    navigator.share({ title: '나의 감정 나이는?', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
  }
}
</script>
</body>
</html>

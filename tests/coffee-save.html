<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커피값 절약 계산기 | 오늘연구소</title>
  <meta name="description" content="커피값 절약 계산기 — 오늘연구소에서 재미있게 즐겨보세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .coffee-big {
      font-size: 56px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #f9a825, #f9f586);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0 4px;
    }
    .savings-big-alt {
      font-size: 52px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #96fbc4, #f9f586);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 16px 0 4px;
    }
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }
    .compare-card {
      background: rgba(255,255,255,.04);
      border-radius: 12px;
      padding: 16px 12px;
      text-align: center;
    }
    .compare-card.spend { border: 1px solid rgba(249,168,37,.2); }
    .compare-card.save { border: 1px solid rgba(150,251,196,.2); }
    .compare-emoji { font-size: 28px; margin-bottom: 6px; }
    .compare-label { font-size: 12px; color: var(--gray3); margin-bottom: 4px; }
    .compare-val { font-size: 16px; font-weight: 700; }
    .compare-val.spend-color { color: #f9a825; }
    .compare-val.save-color { color: #96fbc4; }
    .cups-chip-group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .cups-chip {
      background: var(--bg3);
      border: 1.5px solid rgba(255,255,255,.1);
      color: var(--gray2);
      padding: 10px 18px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all .2s;
      font-family: inherit;
      min-width: 52px;
      text-align: center;
    }
    .cups-chip.selected {
      background: rgba(249,168,37,.15);
      border-color: rgba(249,168,37,.5);
      color: #f9d060;
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">
      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">☕</span>
          <h1>커피값 절약 계산기</h1>
          <p>매일 마시는 커피값, 쌓이면 얼마일까요?<br>적금에 넣으면 얼마나 될지도 알려드려요!</p>
          <div class="test-meta">
            <span>💳 금융</span>
            <span>⏱ 1분</span>
            <span>👥 123,445명 참여</span>
          </div>
        </div>

        <div class="question-card">
          <div class="question-num">하루 커피 횟수</div>
          <div class="cups-chip-group" id="cupsGroup">
            <button class="cups-chip" onclick="selectCups(this, 1)">☕ 1잔</button>
            <button class="cups-chip" onclick="selectCups(this, 2)">☕ 2잔</button>
            <button class="cups-chip" onclick="selectCups(this, 3)">☕ 3잔</button>
            <button class="cups-chip" onclick="selectCups(this, 4)">☕ 4잔</button>
            <button class="cups-chip" onclick="selectCups(this, 5)">☕ 5잔</button>
          </div>

          <label class="input-label">평균 커피 가격 (원)</label>
          <input type="number" class="input-field" id="price" placeholder="예: 5500 (5,500원)" min="500" max="50000" value="5500">

          <label class="input-label">대신 적금 이율 (%, 기본 3.5%)</label>
          <input type="number" class="input-field" id="savingsRate" placeholder="3.5" min="0.1" max="20" step="0.01" value="3.5">

          <button class="btn-primary" onclick="calculate()" style="width:100%;padding:15px;font-size:16px;">
            ☕ 커피값 계산하기
          </button>
        </div>

        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:16px 18px;margin-top:16px;">
          <p style="font-size:12px;color:var(--gray3);line-height:1.7;">
            ☕ <strong style="color:var(--gray2)">역시 커피가 최고야!</strong> 이 계산기는 커피를 끊으라는 게 아니에요.<br>
            그냥 얼마 쓰는지 한 번 알아봐요. 알고 마시면 더 맛있거든요 😄
          </p>
        </div>
      </div>

      <div id="resultSection" style="display:none;"></div>
    </div>
  </div>

<script>
let cupsPerDay = null;

function selectCups(btn, cups) {
  document.querySelectorAll('#cupsGroup .cups-chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  cupsPerDay = cups;
}

function calcFV(pmt, r, n) {
  if (r === 0) return pmt * n;
  return pmt * (Math.pow(1 + r, n) - 1) / r;
}

function calculate() {
  if (!cupsPerDay) { alert('하루 커피 횟수를 선택해주세요!'); return; }
  const price = parseFloat(document.getElementById('price').value);
  const savingsRate = parseFloat(document.getElementById('savingsRate').value) || 3.5;

  if (!price || price < 500 || price > 50000) {
    alert('커피 가격을 500~50000원 사이로 입력해주세요!'); return;
  }

  const dailySpend = cupsPerDay * price;
  const monthlySpend = dailySpend * 30;
  const yearlySpend = dailySpend * 365;
  const tenYearSpend = yearlySpend * 10;

  // 복리 적금 시뮬레이션 (월 단위)
  const monthlyPmt = monthlySpend;
  const r = savingsRate / 12 / 100;

  const fv1 = calcFV(monthlyPmt, r, 12);
  const fv5 = calcFV(monthlyPmt, r, 60);
  const fv10 = calcFV(monthlyPmt, r, 120);

  // 세후 (15.4% 이자세)
  const netFV1 = fv1 - Math.max(0, (fv1 - monthlyPmt * 12) * 0.154);
  const netFV5 = fv5 - Math.max(0, (fv5 - monthlyPmt * 60) * 0.154);
  const netFV10 = fv10 - Math.max(0, (fv10 - monthlyPmt * 120) * 0.154);

  const funMessages = [
    '한 잔이면 충분해 (아마도)',
    '딱 적당해요 ☕',
    '카페인 충전 완료! 🔋',
    '진정한 커피 애호가!',
    '커피가 밥이시군요 ☕☕',
  ];
  const funMsg = funMessages[Math.min(cupsPerDay - 1, 4)];

  const comparisonItem = netFV10 > 10000000
    ? `10년 후 ${(netFV10 / 10000).toFixed(0)}만원!`
    : `10년 후 ${netFV10.toLocaleString('ko-KR')}원!`;

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `
      <div class="result-card">
        <span class="result-emoji">☕</span>
        <div class="result-type">하루 ${cupsPerDay}잔 · ${funMsg}</div>
        <div class="coffee-big">${dailySpend.toLocaleString('ko-KR')}원</div>
        <div style="text-align:center;color:var(--gray3);font-size:13px;margin-bottom:24px;">하루 커피 지출</div>

        <div class="range-info" style="margin-bottom:20px;">
          <div class="range-row">
            <span>☕ 하루 지출</span>
            <span class="range-val">${dailySpend.toLocaleString('ko-KR')}원</span>
          </div>
          <div class="range-row">
            <span>📅 한 달 지출</span>
            <span class="range-val">${monthlySpend.toLocaleString('ko-KR')}원</span>
          </div>
          <div class="range-row">
            <span>📆 1년 지출</span>
            <span class="range-val">${yearlySpend.toLocaleString('ko-KR')}원</span>
          </div>
          <div class="range-row">
            <span>😱 10년 총 지출</span>
            <span style="font-size:16px;font-weight:800;color:#f9a825;">${tenYearSpend.toLocaleString('ko-KR')}원</span>
          </div>
        </div>

        <div style="text-align:left;margin-bottom:20px;">
          <div style="font-size:14px;font-weight:700;margin-bottom:12px;">📈 만약 커피값을 적금에 넣었다면? (연 ${savingsRate}%)</div>
          <div class="compare-grid">
            <div class="compare-card save">
              <div class="compare-emoji">🏦</div>
              <div class="compare-label">1년 적립</div>
              <div class="compare-val save-color">${Math.round(netFV1).toLocaleString('ko-KR')}원</div>
            </div>
            <div class="compare-card save">
              <div class="compare-emoji">💰</div>
              <div class="compare-label">5년 적립</div>
              <div class="compare-val save-color">${Math.round(netFV5).toLocaleString('ko-KR')}원</div>
            </div>
          </div>
        </div>

        <div style="background:rgba(150,251,196,.06);border:1px solid rgba(150,251,196,.2);border-radius:12px;padding:16px 18px;margin-bottom:16px;">
          <p style="font-size:16px;font-weight:800;color:#96fbc4;text-align:center;">
            🚀 커피값 아끼면 10년 후 ${Math.round(netFV10).toLocaleString('ko-KR')}원!
          </p>
          <p style="font-size:13px;color:var(--gray2);text-align:center;margin-top:6px;">
            라떼 한 잔 값으로 미래를 바꿀 수 있어요 (이론적으로는요 😅)
          </p>
        </div>

        <div style="background:rgba(249,168,37,.06);border:1px solid rgba(249,168,37,.2);border-radius:12px;padding:14px 18px;margin-bottom:20px;">
          <p style="font-size:14px;font-weight:700;color:#f9a825;text-align:center;">
            ☕ 역시 커피가 최고야!
          </p>
          <p style="font-size:13px;color:var(--gray2);text-align:center;margin-top:4px;">
            커피는 삶의 질. 얼마 쓰는지 알고 마시면 돼요. 오늘도 맛있는 커피 드세요 ☕
          </p>
        </div>

        <div class="result-actions">
          <button class="btn-share" onclick="shareResult(${dailySpend}, ${cupsPerDay})">🔗 결과 공유하기</button>
          <button class="btn-retry" onclick="location.reload()">🔄 다시 계산</button>
          <a href="../index.html" class="btn-back">← 포털로</a>
        </div>
      </div>`;
  });
}

function shareResult(daily, cups) {
  const text = `하루 커피 ${cups}잔에 ${daily.toLocaleString('ko-KR')}원! ☕ 나도 계산해볼게~`;
  if (navigator.share) navigator.share({ title: '커피값 절약 계산기', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

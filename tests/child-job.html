<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="우리 아이 미래직업 — 오늘연구소에서 재미있게 즐겨보세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">

  <style>
    .job-result-header {
      background: linear-gradient(145deg, #43e97b 0%, #38f9d7 100%);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-bottom: 20px;
      color: #0a0a0a;
    }
    .job-result-header h2 { font-size: 28px; font-weight: 900; margin-bottom: 8px; }
    .job-result-header p { font-size: 15px; opacity: .8; }
    .job-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }
    .job-card {
      background: var(--bg2);
      border-radius: 12px;
      padding: 18px 14px;
      text-align: center;
      border: 1.5px solid rgba(255,255,255,.06);
    }
    .job-card-icon { font-size: 32px; margin-bottom: 8px; display: block; }
    .job-card-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
    .job-card-desc { font-size: 12px; color: var(--gray3); line-height: 1.5; }
    .traits-section {
      background: var(--bg2);
      border-radius: 12px;
      padding: 18px 20px;
      margin-bottom: 20px;
      border: 1.5px solid rgba(255,255,255,.06);
    }
    .trait-chip {
      display: inline-block;
      background: rgba(67,233,123,.12);
      border: 1px solid rgba(67,233,123,.25);
      color: #43e97b;
      font-size: 13px;
      padding: 5px 14px;
      border-radius: 50px;
      margin: 4px;
    }
  </style>
</head>
<body>

  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>

      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>

  <div class="test-wrap">
    <div class="test-inner">

      <div id="introSection">
        <div class="test-header">
          <span class="test-header-emoji">🚀</span>

          <p>아이의 성향과 관심사로 알아보는<br>미래에 어울리는 직업 TOP 4!</p>
          <div class="test-meta">
            <span>👶 육아</span>
            <span>⏱ 2분</span>
            <span>👥 176,332명 참여</span>
          </div>
        </div>
        <div style="text-align:center;">
          <button class="btn-primary" onclick="start()" style="font-size:18px;padding:16px 44px;">▶ 시작하기</button>
        </div>
      </div>

      <div id="quizSection" style="display:none;">
        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill" style="width:12.5%"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 8</div>
        <div class="question-card">
          <div class="question-num" id="questionNum">Q1</div>
          <div class="question-text" id="questionText"></div>
          <div class="choices" id="choices"></div>
        </div>
      </div>

      <div id="resultSection" style="display:none;"></div>

    </div>
  </div>

<script>
// Categories: 창의(creative), 과학(science), 소통(comm), 리더(leader), 예술(art), 돌봄(care)

  {
    text: "아이가 가장 좋아하는 활동은?",

      { text: "🎵 노래 부르기, 악기 연주", score: { art:3, comm:1 } },
      { text: "⚽ 운동, 스포츠", score: { leader:3, comm:1 } },

      { text: "🎨 예쁘고 멋진 것을 만드는 일", score: { art:3, creative:3 } },

const TYPES = {

  },

    label: '소통 마스터',
    emoji: '💬',
    subtitle: '어디서든 분위기를 밝히는 타고난 소통왕',
    jobs: [
      { icon:'📺', name:'방송인/유튜버', desc:'콘텐츠로 많은 사람과 소통하는 크리에이터' },
      { icon:'⚖️', name:'변호사', desc:'언어의 힘으로 정의를 실현하는 법률가' },

  },

    label: '미래 리더',

    subtitle: '목표를 정하면 끝까지 이끄는 타고난 리더',

      { icon:'🏢', name:'CEO/창업가', desc:'새로운 세상을 만드는 기업가 정신의 리더' },

  },

    label: '예술 감각파',
    emoji: '🎭',
    subtitle: '아름다움을 보고 느끼고 표현하는 감성인',
    jobs: [
      { icon:'🎬', name:'영화감독/배우', desc:'감동을 만들어내는 스크린의 예술가' },
      { icon:'🎵', name:'뮤지션/작곡가', desc:'음악으로 감정을 전달하는 아티스트' },
      { icon:'👗', name:'패션 디자이너', desc:'옷으로 세상에 아름다움을 더하는 디자이너' },
      { icon:'📸', name:'사진작가/영상감독', desc:'렌즈를 통해 세상을 담는 비주얼 아티스트' },

      { icon:'🧑‍🏫', name:'유치원/초등교사', desc:'아이들의 성장을 함께하는 교육자' },

let scores = { creative:0, science:0, comm:0, leader:0, art:0, care:0 };
let current = 0;

function start() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function showQ(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i+1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i+1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i+1)/QUESTIONS.length)*100}%`;

  const el = document.getElementById('choices');
  el.innerHTML = '';
  const letters = ['A','B','C','D'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => { Object.keys(c.score).forEach(k => { scores[k] += c.score[k]; }); current++; current < QUESTIONS.length ? showQ(current) : showAdThenResult(showResult); };
    el.appendChild(btn);
  });
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
  const r = TYPES[top];
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="job-result-header">
      <div style="font-size:64px;margin-bottom:12px;">${r.emoji}</div>
      <div style="font-size:12px;font-weight:700;letter-spacing:1.5px;opacity:.7;margin-bottom:6px;">우리 아이 유형</div>
      <h2>${r.label}</h2>
      <p>${r.subtitle}</p>
    </div>

    <div style="background:var(--bg2);border-radius:12px;padding:18px 20px;margin-bottom:20px;border:1.5px solid rgba(255,255,255,.06);">
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">💌 아이에게 전하는 말</div>
      <p style="font-size:14px;color:var(--gray2);line-height:1.9;margin:0;">${r.msg}</p>
    </div>

    <div style="background:var(--bg2);border-radius:12px;padding:18px 20px;margin-bottom:20px;border:1.5px solid rgba(255,255,255,.06);">
      <div style="font-size:14px;font-weight:700;margin-bottom:12px;">✨ 아이의 강점 특성</div>
      <div>${r.traits.map(t => `<span class="trait-chip">${t}</span>`).join('')}</div>
    </div>

    <div style="font-size:15px;font-weight:700;margin-bottom:14px;">🚀 어울리는 미래 직업 TOP 4</div>
    <div class="job-cards" style="margin-bottom:28px;">
      ${r.jobs.map(j => `
        <div class="job-card">
          <span class="job-card-icon">${j.icon}</span>
          <div class="job-card-name">${j.name}</div>
          <div class="job-card-desc">${j.desc}</div>
        </div>`).join('')}
    </div>

    <div class="result-actions">
      <button class="btn-share" onclick="shareResult('${r.label}')">🔗 결과 공유하기</button>
      <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
      <a href="../index.html" class="btn-back">← 포털로</a>
    </div>`;
}

function retryTest() {
  scores = { creative:0, science:0, comm:0, leader:0, art:0, care:0 };
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareResult(label) {
  const text = `우리 아이 미래 직업 유형은 "${label}"! 너희 아이는? 🚀`;
  if (navigator.share) {
    navigator.share({ title:'우리 아이 미래직업', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(text).then(() => alert('복사됐어요! 🎉'));
  }
}
</script>

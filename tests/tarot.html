  <style>
    .tarot-intro {
      background: linear-gradient(145deg, #0d0518 0%, #1a0535 100%);
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      margin-bottom: 24px;
      border: 1.5px solid rgba(161,140,209,.25);
      position: relative;
      overflow: hidden;
    }
    .tarot-intro::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(161,140,209,.35) 0%, transparent 65%);
      pointer-events: none;
    }
    .tarot-intro-emoji { font-size: 72px; display: block; margin-bottom: 14px; position: relative; }
    .tarot-intro h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; position: relative; }
    .tarot-intro p { font-size: 14px; color: var(--gray2); line-height: 1.8; position: relative; margin-bottom: 24px; }
    .cards-area {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .tarot-card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .tarot-card-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tarot-card-wrapper {
      perspective: 800px;
      -webkit-perspective: 800px;
    }
    .tarot-card {
      width: 110px;
      height: 170px;
      cursor: pointer;
    }
    .tarot-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      -webkit-transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      -webkit-transition: -webkit-transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
    }
    .tarot-card.flipped .tarot-card-inner {
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }
    .tarot-card-front,
    .tarot-card-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
    }
    .tarot-card-back {
      background: linear-gradient(145deg, #1a0535 0%, #2d0a5e 100%);
      border: 1.5px solid rgba(161,140,209,.35);
    }
    .tarot-card-back-pattern {
      font-size: 36px;
      opacity: .7;
      margin-bottom: 8px;
    }
    .tarot-card-back-hint {
      font-size: 10px;
      color: rgba(255,255,255,.4);
      text-align: center;
    }
    .tarot-card-front {
      background: linear-gradient(145deg, #0a1a2e 0%, #0d2840 100%);
      border: 1.5px solid rgba(100,180,255,.3);
      transform: rotateY(180deg);
      -webkit-transform: rotateY(180deg);
    }
    .card-front-symbol { font-size: 42px; margin-bottom: 8px; }
    .card-front-name { font-size: 12px; font-weight: 700; text-align: center; line-height: 1.4; color: #c9e8ff; }
    .reading-summary {
      background: linear-gradient(135deg, rgba(161,140,209,.1) 0%, rgba(100,180,255,.08) 100%);
      border: 1px solid rgba(161,140,209,.25);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 20px;
    }
    .reading-summary h3 { font-size: 16px; font-weight: 800; margin-bottom: 14px; color: #c9b8f7; }
    .card-detail {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-detail-sym { font-size: 28px; }
    .card-detail-info { flex: 1; }
    .card-detail-pos { font-size: 11px; color: var(--gray3); letter-spacing: 1px; text-transform: uppercase; }
    .card-detail-name { font-size: 16px; font-weight: 800; color: #c9e8ff; }
    .card-detail-meaning { font-size: 13px; color: var(--gray2); line-height: 1.75; margin-bottom: 8px; }
    .card-detail-advice {
      font-size: 12px;
      color: #c9b8f7;
      background: rgba(161,140,209,.1);
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.6;
    }
    .card-readings-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
      margin: 10px 0;
    }
    .card-reading-item {
      background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
      border-radius: 10px; padding: 10px 12px;
    }
    .card-reading-label { font-size: 11px; font-weight: 700; color: var(--gray3); margin-bottom: 5px; }
    .card-reading-text  { font-size: 12px; color: var(--gray2); line-height: 1.65; }
    .card-keywords { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0; }
    .keyword-chip {
      background: rgba(201,184,247,.12); border: 1px solid rgba(201,184,247,.25);
      color: #c9b8f7; border-radius: 50px; padding: 4px 10px;
      font-size: 11px; font-weight: 600;
    }
    .energy-bar-wrap {
      display: flex; align-items: center; gap: 8px; margin: 10px 0 0;
    }
    .energy-bar-label { font-size: 11px; color: var(--gray3); white-space: nowrap; }
    .energy-bar-bg {
      flex: 1; height: 6px; background: rgba(255,255,255,.1);
      border-radius: 4px; overflow: hidden;
    }
    .energy-bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }
    .energy-bar-val  { font-size: 11px; font-weight: 700; min-width: 32px; text-align: right; }
    /* ── 종합 리딩 ── */
    .summary-flow {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin: 14px 0; flex-wrap: wrap;
    }
    .summary-flow-card {
      text-align: center; background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
      padding: 8px 12px; min-width: 66px;
    }
    .summary-flow-sym  { font-size: 22px; display: block; }
    .summary-flow-pos  { font-size: 10px; color: var(--gray3); }
    .summary-flow-name { font-size: 11px; font-weight: 700; color: #c9e8ff; }
    .summary-flow-arrow { font-size: 18px; color: var(--gray3); }
    .summary-area-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 14px 0;
    }
    .summary-area-box {
      background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px; padding: 12px 14px;
    }
    .summary-area-label { font-size: 12px; font-weight: 700; margin-bottom: 6px; }
    .summary-area-text  { font-size: 12px; color: var(--gray2); line-height: 1.7; }
    .summary-energy-row {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,.04); border-radius: 12px; padding: 12px 16px;
      margin: 10px 0;
    }
    .summary-energy-label { font-size: 13px; font-weight: 700; flex: 1; }
    .summary-energy-val { font-size: 22px; font-weight: 900; }
    .today-msg-box {
      background: linear-gradient(135deg, rgba(201,184,247,.12), rgba(100,180,255,.08));
      border: 1px solid rgba(201,184,247,.25); border-radius: 12px;
      padding: 14px 16px; margin-top: 12px;
    }
    .today-msg-label { font-size: 11px; font-weight: 700; color: #c9b8f7; margin-bottom: 6px; }
    .today-msg-text  { font-size: 13px; color: var(--gray1); line-height: 1.75; }
    .reveal-btn {
      width: 100%;
      padding: 12px;
      background: rgba(161,140,209,.15);
      border: 1.5px solid rgba(161,140,209,.3);
      border-radius: 10px;
      color: #c9b8f7;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      margin-bottom: 16px;
    }
    .reveal-btn:hover { background: rgba(161,140,209,.25); }
    .reveal-btn:disabled { opacity: .4; cursor: default; }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background 0.3s;
    }
    .step-dot.active { background: #c9b8f7; }
  </style>
</head>

<script>
const TAROT_DECK = [
  { name:'마법사', symbol:'🧙', energy:90, keywords:['새로운 시작','의지력','창의성','실행'],
    meaning:'새로운 시작과 무한한 가능성이 열립니다. 당신 안에 이미 모든 도구가 갖춰져 있습니다. 의지와 집중력, 창의적인 아이디어가 결합되면 무엇이든 이뤄낼 수 있는 시기입니다. 지금 가진 자원과 능력을 믿으세요.',
    love:'적극적인 표현이 열쇠입니다. 솔로라면 먼저 다가가는 용기가 인연을 만들어 줍니다. 연인이 있다면 새로운 데이트나 특별한 이벤트로 관계에 활력을 불어넣을 좋은 시기입니다.',
    career:'새로운 프로젝트나 사업 아이디어를 실행에 옮기기에 최적의 타이밍입니다. 당신의 역량이 주목받고 중요한 기회가 찾아올 수 있습니다.',
    advice:'오늘은 미루던 일을 시작하기 가장 좋은 날입니다. 첫걸음을 내딛으세요.' },

  { name:'여사제', symbol:'🌙', energy:60, keywords:['직관','신중함','관찰','내면의 지혜'],
    meaning:'직관과 내면의 지혜에 귀 기울이세요. 겉으로 드러나지 않는 진실이 있으며, 신중한 관찰이 필요한 시기입니다. 서두르지 않고 때를 기다리는 것이 지혜입니다.',
    love:'섣부른 판단보다 상대방을 더 깊이 이해하는 시간이 필요합니다. 상대의 말보다 행동을 보세요. 솔로라면 내가 진정 원하는 것이 무엇인지 먼저 알아야 합니다.',
    career:'지금은 과감한 행동보다 정보를 모으고 상황을 파악하는 시기입니다. 중요한 결정은 충분히 생각한 후에 내리세요.',
    advice:'충동적으로 행동하지 말고 조용히 상황을 지켜보는 것이 현명합니다.' },

  { name:'여황제', symbol:'🌸', energy:85, keywords:['풍요','창조','따뜻함','매력'],
    meaning:'풍요와 창조적 에너지가 넘치는 시기입니다. 아이디어가 자연스럽게 샘솟고, 주변 사람들에게 따뜻한 에너지를 전달할 수 있습니다. 자연의 흐름을 따르면 원하는 것이 저절로 찾아옵니다.',
    love:'사랑이 풍성해지는 시기입니다. 솔로라면 자연스러운 매력이 인연을 끌어당깁니다. 커플이라면 서로에 대한 애정이 더욱 깊어지고 따뜻한 시간을 보낼 수 있습니다.',
    career:'창의적인 분야, 예술, 뷰티, 음식, 교육 등에서 두각을 나타낼 수 있는 시기입니다. 아이디어를 행동으로 옮기면 좋은 결과가 따릅니다.',
    advice:'자신을 사랑하고 돌보는 시간을 가지세요. 지금 당신은 가장 매력적인 상태입니다.' },

  { name:'황제', symbol:'👑', energy:80, keywords:['권위','안정','리더십','원칙'],
    meaning:'권위와 리더십이 빛나는 시기입니다. 계획한 일을 실행에 옮길 강한 의지와 구조적 사고가 필요합니다. 안정적인 기반을 다지고, 원칙과 규율로 목표를 향해 나아가세요.',
    love:'안정적이고 책임감 있는 관계를 원하는 시기입니다. 솔로라면 신뢰할 수 있는 사람을 찾게 됩니다. 연인이 있다면 관계에서 더 주도적인 역할을 하게 될 수 있습니다.',
    career:'리더십을 발휘할 기회가 찾아옵니다. 체계적이고 전략적인 접근이 성공을 가져다 줍니다. 관리자나 책임자 역할에 적합한 시기입니다.',
    advice:'원칙과 규율을 세우고 일관성 있게 밀고 나가세요. 흔들리지 않는 태도가 성공을 만듭니다.' },

  { name:'교황', symbol:'⛪', energy:65, keywords:['전통','조언','공동체','배움'],
    meaning:'지혜로운 조언자나 정신적 가르침이 필요한 시기입니다. 전통과 도덕적 가치, 그리고 공동체의 지혜를 따르는 것이 중요합니다. 혼자 결정하기보다 경험 있는 사람의 의견을 구하세요.',
    love:'안정적이고 전통적인 관계를 원하는 마음이 강해집니다. 진지한 만남과 장기적인 관계에 집중하게 됩니다. 솔로라면 지인 소개나 공식적인 만남이 유리합니다.',
    career:'멘토나 선배의 조언이 큰 도움이 됩니다. 기존의 방식과 규칙을 따르되, 그 안에서 자신의 역할을 확고히 하세요.',
    advice:'신뢰할 수 있는 선배나 멘토에게 조언을 구해보세요.' },

  { name:'연인', symbol:'💑', energy:88, keywords:['선택','인연','조화','결합'],
    meaning:'중요한 선택의 기로에 서 있습니다. 마음과 가치관이 일치하는 방향을 선택해야 할 때입니다. 관계와 연결, 그리고 자신이 진정 원하는 것이 무엇인지 깊이 생각해야 합니다.',
    love:'연애운이 매우 강한 시기입니다. 솔로라면 운명적인 만남이 기다리고 있으며, 커플이라면 관계가 더욱 깊어지거나 중요한 결정(약혼, 동거 등)을 하게 될 수 있습니다.',
    career:'협력과 파트너십이 중요한 시기입니다. 중요한 선택을 해야 할 상황이 생길 수 있으며, 가치관에 따라 결정하세요.',
    advice:'머리보다 마음이 이끄는 곳을 따르세요. 진정한 행복은 그곳에 있습니다.' },

  { name:'전차', symbol:'🏆', energy:92, keywords:['추진력','승리','집중','돌파'],
    meaning:'강한 의지와 추진력으로 장애물을 돌파하는 시기입니다. 자기 통제와 집중력이 승리의 열쇠입니다. 두 가지 상반된 힘을 조율하여 목표를 향해 돌진하세요.',
    love:'연애에서 주도권을 쥐고 싶은 욕구가 강해집니다. 솔로라면 적극적으로 대시하면 성공할 확률이 높습니다. 연인과의 사이에서 작은 갈등이 있더라도 소통으로 해결하세요.',
    career:'목표를 향해 집중하면 빠른 성과를 낼 수 있습니다. 경쟁에서 우위를 점할 수 있는 시기이며, 자신감 있게 나아가세요.',

const POSITIONS = ['과거', '현재', '미래'];
let drawnCards = [];
let revealedCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTarot() {
  const shuffled = shuffle(TAROT_DECK);
  drawnCards = [shuffled[0], shuffled[1], shuffled[2]];
  revealedCount = 0;

  document.getElementById('formSection').style.display = 'none';
  document.getElementById('tarotSection').style.display = 'block';

  const area = document.getElementById('cardsArea');
  area.innerHTML = POSITIONS.map((pos, i) => `
    <div class="tarot-card-wrapper">
      <div class="tarot-card-label">${pos}</div>
      <div class="tarot-card" data-idx="${i}">
        <div class="tarot-card-inner">
          <div class="tarot-card-back">
            <div class="tarot-card-back-pattern">✦</div>
            <div class="tarot-card-back-hint">클릭해서 열기</div>
          </div>
          <div class="tarot-card-front">
            <div class="card-front-symbol">${drawnCards[i].symbol}</div>
            <div class="card-front-name">${drawnCards[i].name}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');

  area.querySelectorAll('.tarot-card').forEach(card => {
    card.addEventListener('click', () => revealCard(parseInt(card.dataset.idx)));
  });
}

function revealCard(idx) {
  const card = document.querySelector(`.tarot-card[data-idx="${idx}"]`);
  if (!card || card.classList.contains('flipped')) return;
  card.classList.add('flipped');

  document.getElementById(`dot${idx}`).classList.add('active');
  revealedCount++;

  const revealArea = document.getElementById('revealArea');
  const existing = document.getElementById(`detail${idx}`);
  if (!existing) {
    const detail = document.createElement('div');
    detail.id = `detail${idx}`;
    detail.className = 'card-detail';
    detail.style.animation = 'fadeInUp .4s ease';
    const c = drawnCards[idx];
    const kwHtml = (c.keywords || []).map(k => `<span class="keyword-chip">${k}</span>`).join('');
    const eng = c.energy ?? 70;
    const engColor = eng >= 85 ? '#f9c74f' : eng >= 65 ? '#90e0ef' : '#f4a261';
    detail.innerHTML = `
      <div class="card-detail-header">
        <div class="card-detail-sym">${c.symbol}</div>
        <div class="card-detail-info">
          <div class="card-detail-pos">${POSITIONS[idx]}</div>
          <div class="card-detail-name">${c.name}</div>
        </div>
      </div>
      <div class="card-detail-meaning">${c.meaning}</div>
      <div class="card-keywords">${kwHtml}</div>
      <div class="card-readings-grid">
        <div class="card-reading-item">
          <div class="card-reading-label">💕 연애 · 관계</div>
          <div class="card-reading-text">${c.love || ''}</div>
        </div>
        <div class="card-reading-item">
          <div class="card-reading-label">💼 직업 · 재물</div>
          <div class="card-reading-text">${c.career || ''}</div>
        </div>
      </div>
      <div class="energy-bar-wrap">
        <span style="font-size:11px;color:var(--gray3);white-space:nowrap;">오늘의 에너지</span>
        <div class="energy-bar-bg"><div class="energy-bar-fill" style="width:${eng}%;background:${engColor};"></div></div>
        <span class="energy-bar-val" style="color:${engColor};">${eng}</span>
      </div>
      <div class="card-detail-advice">💜 조언: ${c.advice}</div>
    `;
    revealArea.appendChild(detail);
  }

  if (revealedCount === 3) {
    showAdThenResult(() => {
      document.getElementById('summaryArea').style.display = 'block';
      document.getElementById('summaryArea').innerHTML = buildSummary();
      document.getElementById('cardActions').style.display = 'block';
    });
  }
}

function buildSummary() {
  const [past, present, future] = drawnCards;

  const narratives = [
    `${past.name}이 쌓아온 경험과 에너지 위에 ${present.name}의 기운이 더해지고 있습니다. 앞으로 ${future.name}이 예고하는 흐름 속에서 당신의 선택이 더욱 빛날 것입니다.`,
    `과거의 ${past.name}이 가져온 교훈이 현재 ${present.name}의 상황을 만들었습니다. 이 흐름을 타면 ${future.name}이 열어주는 가능성에 자연스럽게 닿게 됩니다.`,
    `${past.name}의 그림자와 ${present.name}의 빛이 교차하는 지금, ${future.name}이 암시하는 전환이 머지않아 찾아올 것입니다.`,
  ];
  const ni = (past.name.length + future.name.length) % narratives.length;

  const avgEnergy = Math.round(((past.energy ?? 70) + (present.energy ?? 70) + (future.energy ?? 70)) / 3);
  const engColor = avgEnergy >= 85 ? '#f9c74f' : avgEnergy >= 65 ? '#90e0ef' : '#f4a261';

  const loveMsgs = [
    `${past.name}의 연애 에너지가 씨앗이 되어 ${present.name}의 감정 흐름을 타고 있습니다. ${future.name}이 예고하는 설렘을 준비하세요.`,
    `연애 흐름 상 ${present.name}의 영향이 가장 강하게 작용합니다. ${future.name}의 카드가 새로운 만남이나 관계의 발전을 암시하고 있습니다.`,
  ];
  const careerMsgs = [
    `${past.name}이 닦아놓은 기반 위에 ${present.name}의 기운이 실력을 강화시킵니다. ${future.name}이 예고하는 기회를 놓치지 마세요.`,
    `직업·재물 측면에서 ${present.name}과 ${future.name}의 조합이 긍정적입니다. 지금의 노력이 결실로 이어질 가능성이 높습니다.`,
  ];
  const li = (present.name.length) % loveMsgs.length;
  const ci = (future.name.length) % careerMsgs.length;

  const todayMsgs = [
    `오늘은 ${future.name}의 에너지를 활용해 미루던 일 하나를 시작해 보세요. 작은 행동이 큰 변화를 만듭니다.`,
    `${present.name}의 메시지처럼 지금 이 순간에 충실하세요. 오늘 하루 당신의 빛이 가장 밝습니다.`,
    `세 장의 카드가 한목소리로 말합니다 — 당신은 이미 충분히 준비되어 있다고.`,
  ];
  const ti = (past.name.length + present.name.length + future.name.length) % todayMsgs.length;

  return `<div class="reading-summary">
    <h3>🔮 종합 타로 리딩</h3>
    <div class="summary-flow">
      <div class="summary-flow-card">
        <div style="font-size:22px;">${past.symbol}</div>
        <div style="font-size:11px;color:var(--gray3);margin-top:4px;">과거</div>
        <div style="font-size:12px;color:var(--gray2);font-weight:600;">${past.name}</div>
      </div>
      <div style="font-size:18px;color:var(--gray3);align-self:center;">→</div>
      <div class="summary-flow-card" style="border-color:rgba(201,184,247,.4);">
        <div style="font-size:26px;">${present.symbol}</div>
        <div style="font-size:11px;color:var(--gray3);margin-top:4px;">현재</div>
        <div style="font-size:13px;color:#c9b8f7;font-weight:700;">${present.name}</div>
      </div>
      <div style="font-size:18px;color:var(--gray3);align-self:center;">→</div>
      <div class="summary-flow-card">
        <div style="font-size:22px;">${future.symbol}</div>
        <div style="font-size:11px;color:var(--gray3);margin-top:4px;">미래</div>
        <div style="font-size:12px;color:var(--gray2);font-weight:600;">${future.name}</div>
      </div>
    </div>
    <p style="font-size:14px;color:var(--gray1);line-height:1.85;margin:14px 0 10px;">${narratives[ni]}</p>
    <div class="summary-area-grid">
      <div class="summary-area-box">
        <div style="font-size:11px;font-weight:700;color:var(--gray3);margin-bottom:6px;">💕 연애 · 관계 종합</div>
        <div style="font-size:12px;color:var(--gray2);line-height:1.65;">${loveMsgs[li]}</div>
      </div>
      <div class="summary-area-box">
        <div style="font-size:11px;font-weight:700;color:var(--gray3);margin-bottom:6px;">💼 직업 · 재물 종합</div>
        <div style="font-size:12px;color:var(--gray2);line-height:1.65;">${careerMsgs[ci]}</div>
      </div>
    </div>
    <div class="summary-energy-row">
      <span style="font-size:12px;color:var(--gray3);">오늘의 전체 에너지</span>
      <div class="energy-bar-bg" style="flex:1;"><div class="energy-bar-fill" style="width:${avgEnergy}%;background:${engColor};"></div></div>
      <span style="font-size:13px;font-weight:700;color:${engColor};">${avgEnergy}</span>
    </div>
    <div class="today-msg-box">
      <div style="font-size:11px;font-weight:700;color:var(--gray3);margin-bottom:6px;">✨ 오늘의 메시지</div>
      <div class="today-msg-text">${todayMsgs[ti]}</div>
    </div>
    <p style="font-size:12px;color:var(--gray3);margin-top:14px;text-align:center;line-height:1.7;">카드는 가능성을 보여줄 뿐, 운명은 당신 스스로 만들어 갑니다 🌟</p>
  </div>`;
}

function shareResult() {
  if (drawnCards.length < 3) return;
  const text = `타로 카드 리딩 🃏 과거:${drawnCards[0].name} / 현재:${drawnCards[1].name} / 미래:${drawnCards[2].name} 나도 오늘의 타로 봐봐!`;
  if (navigator.share) navigator.share({ title: '오늘의 타로', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

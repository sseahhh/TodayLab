<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘의 타로 | 오늘연구소</title>
  <meta name="description" content="오늘의 타로 — 오늘연구소에서 재미있게 즐겨보세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .tarot-intro {
      background: linear-gradient(145deg, #0d0518 0%, #1a0535 100%);
      border-radius: 16px;
      padding: 40px 28px;
      text-align: center;
      margin-bottom: 24px;
      border: 1.5px solid rgba(161,140,209,.25);
      position: relative;
      overflow: hidden;
    }
    .tarot-intro::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% -20%, rgba(161,140,209,.35) 0%, transparent 65%);
    }
    .tarot-intro-emoji { font-size: 72px; display: block; margin-bottom: 14px; position: relative; }
    .tarot-intro h2 { font-size: 22px; font-weight: 800; margin-bottom: 10px; position: relative; }
    .tarot-intro p { font-size: 14px; color: var(--gray2); line-height: 1.8; position: relative; margin-bottom: 24px; }
    .cards-area {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .tarot-card-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .tarot-card-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--gray3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .tarot-card {
      width: 110px;
      height: 170px;
      perspective: 800px;
      cursor: pointer;
    }
    .tarot-card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 12px;
    }
    .tarot-card.flipped .tarot-card-inner {
      transform: rotateY(180deg);
    }
    .tarot-card-front,
    .tarot-card-back {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px 8px;
    }
    .tarot-card-back {
      background: linear-gradient(145deg, #1a0535 0%, #2d0a5e 100%);
      border: 1.5px solid rgba(161,140,209,.35);
    }
    .tarot-card-back-pattern {
      font-size: 36px;
      opacity: .7;
      margin-bottom: 8px;
    }
    .tarot-card-back-hint {
      font-size: 10px;
      color: rgba(255,255,255,.4);
      text-align: center;
    }
    .tarot-card-front {
      background: linear-gradient(145deg, #0a1a2e 0%, #0d2840 100%);
      border: 1.5px solid rgba(100,180,255,.3);
      transform: rotateY(180deg);
    }
    .card-front-symbol { font-size: 42px; margin-bottom: 8px; }
    .card-front-name { font-size: 12px; font-weight: 700; text-align: center; line-height: 1.4; color: #c9e8ff; }
    .reading-summary {
      background: linear-gradient(135deg, rgba(161,140,209,.1) 0%, rgba(100,180,255,.08) 100%);
      border: 1px solid rgba(161,140,209,.25);
      border-radius: 14px;
      padding: 24px 20px;
      margin-bottom: 20px;
    }
    .reading-summary h3 { font-size: 16px; font-weight: 800; margin-bottom: 14px; color: #c9b8f7; }
    .card-detail {
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .card-detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .card-detail-sym { font-size: 28px; }
    .card-detail-info { flex: 1; }
    .card-detail-pos { font-size: 11px; color: var(--gray3); letter-spacing: 1px; text-transform: uppercase; }
    .card-detail-name { font-size: 16px; font-weight: 800; color: #c9e8ff; }
    .card-detail-meaning { font-size: 13px; color: var(--gray2); line-height: 1.75; margin-bottom: 8px; }
    .card-detail-advice {
      font-size: 12px;
      color: #c9b8f7;
      background: rgba(161,140,209,.1);
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.6;
    }
    .reveal-btn {
      width: 100%;
      padding: 12px;
      background: rgba(161,140,209,.15);
      border: 1.5px solid rgba(161,140,209,.3);
      border-radius: 10px;
      color: #c9b8f7;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.3s;
      margin-bottom: 16px;
    }
    .reveal-btn:hover { background: rgba(161,140,209,.25); }
    .reveal-btn:disabled { opacity: .4; cursor: default; }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .step-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,.15);
      transition: background 0.3s;
    }
    .step-dot.active { background: #c9b8f7; }
  </style>
</head>
<body>

  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">

      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">🃏</span>
          <h1>오늘의 타로</h1>
          <p>타로 카드가 오늘의 운명을 말해줍니다<br>과거 · 현재 · 미래 3장을 뽑아보세요</p>
          <div class="test-meta">
            <span>🔮 운세</span>
            <span>⏱ 1분</span>
            <span>👥 89,234명 참여</span>
          </div>
        </div>

        <div class="tarot-intro">
          <span class="tarot-intro-emoji">🔮</span>
          <h2>오늘의 운명을 타로에게 물어보세요</h2>
          <p>마음을 가다듬고 오늘 하루를 떠올리며<br>카드를 뽑아주세요.</p>
          <button class="btn-primary" onclick="startTarot()" style="font-size:16px;padding:14px 36px;">
            🃏 카드 뽑기 시작
          </button>
        </div>
      </div>

      <div id="tarotSection" style="display:none;">
        <div class="test-header">
          <span class="test-header-emoji">🃏</span>
          <h1>타로 카드 리딩</h1>
          <p>카드를 하나씩 클릭해서 운명을 확인하세요</p>
        </div>

        <div class="step-indicator">
          <div class="step-dot" id="dot0"></div>
          <div class="step-dot" id="dot1"></div>
          <div class="step-dot" id="dot2"></div>
        </div>

        <div class="cards-area" id="cardsArea"></div>

        <div id="revealArea"></div>
        <div id="summaryArea" style="display:none;"></div>

        <div id="cardActions" style="display:none;">
          <div class="result-actions">
            <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
            <button class="btn-retry" onclick="location.reload()">🔄 다시하기</button>
            <a href="../index.html" class="btn-back">← 포털로</a>
          </div>
        </div>
      </div>

      <div id="resultSection" style="display:none;"></div>

    </div>
  </div>

<script>
const TAROT_DECK = [
  { name:'마법사', symbol:'🧙', meaning:'새로운 시작과 무한한 가능성이 열립니다. 당신 안에 이미 모든 도구가 갖춰져 있습니다. 의지와 집중력을 발휘할 때입니다.', advice:'오늘은 미루던 일을 시작하기 가장 좋은 날입니다. 첫걸음을 내딛으세요.' },
  { name:'여사제', symbol:'🌙', meaning:'직관과 내면의 지혜에 귀 기울이세요. 겉으로 드러나지 않는 진실이 있으며, 신중한 관찰이 필요한 시기입니다.', advice:'충동적으로 행동하지 말고 조용히 상황을 지켜보는 것이 현명합니다.' },
  { name:'여황제', symbol:'🌸', meaning:'풍요와 창조적 에너지가 넘치는 시기입니다. 자연의 흐름을 따르면 원하는 것이 저절로 찾아옵니다.', advice:'자신을 사랑하고 돌보는 시간을 가지세요. 지금 당신은 가장 매력적인 상태입니다.' },
  { name:'황제', symbol:'👑', meaning:'권위와 리더십이 빛나는 시기. 계획한 일을 실행에 옮길 강한 의지와 구조적 사고가 필요합니다.', advice:'원칙과 규율을 세우고 일관성 있게 밀고 나가세요. 흔들리지 않는 태도가 성공을 만듭니다.' },
  { name:'교황', symbol:'⛪', meaning:'지혜로운 조언자나 정신적 가르침이 필요한 시기입니다. 전통과 도덕적 가치가 중요하게 다가옵니다.', advice:'신뢰할 수 있는 선배나 멘토에게 조언을 구해보세요.' },
  { name:'연인', symbol:'💑', meaning:'중요한 선택의 기로에 서 있습니다. 마음과 가치관이 일치하는 방향을 선택해야 할 때입니다.', advice:'머리보다 마음이 이끄는 곳을 따르세요. 진정한 행복은 그곳에 있습니다.' },
  { name:'전차', symbol:'🏆', meaning:'강한 의지와 추진력으로 장애물을 돌파하는 시기입니다. 자기 통제와 집중력이 승리의 열쇠입니다.', advice:'두 가지 상반된 욕구를 조율하며 목표를 향해 직진하세요. 승리가 가까이 있습니다.' },
  { name:'힘', symbol:'🦁', meaning:'내면의 용기와 인내심이 요구되는 시기입니다. 두려움을 우아하게 극복하는 것이 진정한 힘입니다.', advice:'거칠게 밀어붙이지 않아도 됩니다. 부드러운 용기와 내면의 강인함을 믿으세요.' },
  { name:'은둔자', symbol:'🕯️', meaning:'잠시 혼자만의 시간이 필요합니다. 내면을 돌아보고 삶의 방향을 재정비하는 중요한 시기입니다.', advice:'세상의 소음에서 벗어나 자신만의 공간에서 깊이 생각해보세요.' },
  { name:'운명의 바퀴', symbol:'🎡', meaning:'큰 전환점이 찾아옵니다. 변화는 새로운 기회이며, 운명의 흐름을 긍정적으로 받아들이세요.', advice:'지금의 상황이 영원하지 않습니다. 변화를 두려워 말고 흐름을 타세요.' },
  { name:'정의', symbol:'⚖️', meaning:'공정한 결과와 균형이 회복되는 시기입니다. 자신의 행동과 결정이 공정한지 돌아보세요.', advice:'정직함이 최선의 전략입니다. 진실을 말하고 공정하게 행동하면 좋은 결과가 따릅니다.' },
  { name:'매달린 남자', symbol:'🔄', meaning:'새로운 시각이 필요한 시기입니다. 잠시 멈추고 다른 각도에서 상황을 바라보면 해결책이 보입니다.', advice:'무언가를 내려놓아야 더 큰 것을 얻을 수 있습니다. 집착을 버리세요.' },
  { name:'죽음', symbol:'🦋', meaning:'끝이 아니라 새로운 시작을 알리는 카드입니다. 과거를 떠나보내야 새로운 것이 찾아올 수 있습니다.', advice:'더 이상 필요하지 않은 것을 과감히 놓아주세요. 변화는 성장의 씨앗입니다.' },
  { name:'절제', symbol:'🌈', meaning:'균형과 절도가 필요한 시기입니다. 인내심을 갖고 조화를 이루어 가면 목표에 도달할 수 있습니다.', advice:'지금 당장의 결과를 조급해 말고 꾸준한 노력으로 천천히 나아가세요.' },
  { name:'악마', symbol:'⛓️', meaning:'집착이나 두려움이 당신을 옭아매고 있습니다. 스스로 만든 제약에서 벗어날 힘이 있습니다.', advice:'자신도 모르게 빠진 나쁜 습관이나 관계를 직시하고 변화를 시작하세요.' },
  { name:'별', symbol:'⭐', meaning:'희망과 영감이 찾아옵니다. 어둠 뒤에 반드시 빛이 있으며, 꿈을 포기하지 마세요.', advice:'마음속 소원을 밤하늘에 빌어보세요. 우주가 응답할 준비가 되어 있습니다.' },
  { name:'달', symbol:'🌑', meaning:'불확실성과 혼란의 시기지만, 직관이 길을 안내합니다. 표면 아래 숨겨진 진실이 있습니다.', advice:'두려움이나 불안이 크더라도 멈추지 마세요. 끝까지 나아가면 빛이 보입니다.' },
  { name:'태양', symbol:'☀️', meaning:'기쁨, 활력, 성공이 빛처럼 쏟아지는 최고의 시기입니다. 자신감을 갖고 세상으로 나아가세요.', advice:'오늘 하루 최선을 다해 즐기세요. 당신이 빛나는 날입니다!' },
  { name:'심판', symbol:'📯', meaning:'중요한 각성과 재탄생의 순간이 찾아옵니다. 자신에 대한 솔직한 평가가 도약의 발판이 됩니다.', advice:'과거를 용서하고 새로운 나로 거듭날 준비를 하세요. 두 번째 기회가 주어집니다.' },
  { name:'세계', symbol:'🌍', meaning:'완성과 성취의 카드입니다. 오랫동안 추구해온 목표가 완성되는 시기입니다.', advice:'지금까지의 여정을 축하하세요. 당신은 이미 훌륭하게 성장했습니다.' },
];

const POSITIONS = ['과거', '현재', '미래'];
let drawnCards = [];
let revealedCount = 0;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startTarot() {
  const shuffled = shuffle(TAROT_DECK);
  drawnCards = [shuffled[0], shuffled[1], shuffled[2]];
  revealedCount = 0;

  document.getElementById('formSection').style.display = 'none';
  document.getElementById('tarotSection').style.display = 'block';

  const area = document.getElementById('cardsArea');
  area.innerHTML = POSITIONS.map((pos, i) => `
    <div class="tarot-card-wrapper">
      <div class="tarot-card-label">${pos}</div>
      <div class="tarot-card" id="card${i}" onclick="revealCard(${i})">
        <div class="tarot-card-inner">
          <div class="tarot-card-back">
            <div class="tarot-card-back-pattern">✦</div>
            <div class="tarot-card-back-hint">클릭해서 열기</div>
          </div>
          <div class="tarot-card-front">
            <div class="card-front-symbol">${drawnCards[i].symbol}</div>
            <div class="card-front-name">${drawnCards[i].name}</div>
          </div>
        </div>
      </div>
    </div>
  `).join('');
}

function revealCard(idx) {
  const card = document.getElementById(`card${idx}`);
  if (card.classList.contains('flipped')) return;
  card.classList.add('flipped');

  document.getElementById(`dot${idx}`).classList.add('active');
  revealedCount++;

  const revealArea = document.getElementById('revealArea');
  const existing = document.getElementById(`detail${idx}`);
  if (!existing) {
    const detail = document.createElement('div');
    detail.id = `detail${idx}`;
    detail.className = 'card-detail';
    detail.style.animation = 'fadeInUp .4s ease';
    const c = drawnCards[idx];
    detail.innerHTML = `
      <div class="card-detail-header">
        <div class="card-detail-sym">${c.symbol}</div>
        <div class="card-detail-info">
          <div class="card-detail-pos">${POSITIONS[idx]}</div>
          <div class="card-detail-name">${c.name}</div>
        </div>
      </div>
      <div class="card-detail-meaning">${c.meaning}</div>
      <div class="card-detail-advice">💜 조언: ${c.advice}</div>
    `;
    revealArea.appendChild(detail);
  }

  if (revealedCount === 3) {
    showAdThenResult(() => {
      document.getElementById('summaryArea').style.display = 'block';
      document.getElementById('summaryArea').innerHTML = buildSummary();
      document.getElementById('cardActions').style.display = 'block';
    });
  }
}

function buildSummary() {
  const [past, present, future] = drawnCards;
  const summaries = [
    `${past.name}의 흐름을 바탕으로 ${present.name}의 시기를 지나, ${future.name}이 암시하는 밝은 미래로 나아가고 있습니다.`,
    `과거의 ${past.name} 에너지가 현재 ${present.name}에 영향을 미치고 있으며, ${future.name}이 보여주는 가능성이 기다리고 있습니다.`,
    `${past.name}이 가져온 경험이 오늘 ${present.name}의 지혜로 쌓였고, 앞으로 ${future.name}의 축복이 함께할 것입니다.`,
  ];
  const idx = (drawnCards[0].name.length + drawnCards[2].name.length) % summaries.length;
  return `<div class="reading-summary">
    <h3>🔮 종합 타로 리딩</h3>
    <p style="font-size:14px;color:var(--gray1);line-height:1.85;">${summaries[idx]}</p>
    <p style="font-size:13px;color:var(--gray3);margin-top:12px;line-height:1.7;">카드는 가능성을 보여줄 뿐, 운명은 당신 스스로 만들어 갑니다. 오늘 하루도 최선을 다하세요 🌟</p>
  </div>`;
}

function shareResult() {
  if (drawnCards.length < 3) return;
  const text = `타로 카드 리딩 🃏 과거:${drawnCards[0].name} / 현재:${drawnCards[1].name} / 미래:${drawnCards[2].name} 나도 오늘의 타로 봐봐!`;
  if (navigator.share) navigator.share({ title: '오늘의 타로', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

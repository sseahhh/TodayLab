<script>
// Korean stroke values for numerology name calculation
const STROKE = {
  '가':7,'나':5,'다':5,'라':5,'마':6,'바':7,'사':6,'아':4,'자':5,'차':7,'카':6,'타':5,'파':9,'하':5,
  '김':7,'이':6,'박':9,'최':12,'정':11,'강':11,'조':7,'윤':4,'장':11,'임':9,'한':5,'오':5,'서':6,
  '신':10,'권':15,'황':12,'안':6,'송':7,'류':10,'전':9,'홍':9,'고':10,'문':4,'양':11,'손':10,
  '배':10,'백':5,'허':11,'유':6,'남':9,'심':9,'노':9,'곽':11,'성':8,'주':5,
  '우':4,'구':5,'민':5,'준':9,'영':8,'수':4,'진':10,'지':6,'현':11,'재':6,'호':7,'석':11,
  '기':4,'동':6,'원':10,'형':7,'태':5,'경':11,'찬':14,'혁':16,'범':9,'승':10,
  '수':4,'진':10,'미':6,'경':11,'희':16,'은':10,'혜':16,'연':11,'소':5,'나':5,
  '아':4,'름':11,'다':5,'운':7,'빛':9,'달':8,'꽃':12,
};

function getNameNum(name) {
  let sum = 0;
  for (const ch of name) {
    sum += STROKE[ch] || (ch.charCodeAt(0) % 9 + 1);
  }
  return reduceToSingle(sum);
}

function reduceToSingle(n) {
  if (n === 11 || n === 22) return n; // master numbers
  while (n > 9) {
    n = String(n).split('').reduce((a, d) => a + parseInt(d), 0);
    if (n === 11 || n === 22) return n;
  }
  return n;
}

function getLifePathNum(year, month, day) {
  const digits = String(year) + String(month).padStart(2,'0') + String(day).padStart(2,'0');
  let sum = digits.split('').reduce((a, d) => a + parseInt(d), 0);
  return reduceToSingle(sum);
}

function getPersonalYearNum(year, month, day) {
  const currentYear = 2026; // Using today's year
  const digits = String(currentYear) + String(month).padStart(2,'0') + String(day).padStart(2,'0');
  let sum = digits.split('').reduce((a, d) => a + parseInt(d), 0);
  return reduceToSingle(sum);
}

  5:  { color:'#4facfe', personality:'자유와 변화를 사랑하는 모험가입니다. 다양한 경험을 즐기고 새로운 사람과 아이디어에 열려 있습니다. 적응력이 뛰어나 어떤 환경에서도 빠르게 자리를 잡습니다.', fortune:'올해는 다양한 기회가 쏟아집니다. 변화를 두려워하지 말고 용기 있게 새로운 도전을 받아들이세요. 여행이나 새로운 환경이 큰 행운을 가져올 것입니다.', luckyDay:'수요일', luckyColor:'하늘색' },

  7:  { color:'#b3c6ff', personality:'깊은 사고와 영적 탐구를 즐기는 철학자입니다. 겉으로 드러나지 않는 내면의 세계가 풍부하며, 탁월한 분석력과 직관으로 진실을 꿰뚫어 보는 능력이 있습니다.', fortune:'내면의 성장과 자기 계발에 최적의 해입니다. 학습, 연구, 영적 탐구에 투자하면 놀라운 발견을 하게 됩니다. 직관을 믿으면 올바른 선택을 할 수 있습니다.', luckyDay:'화요일', luckyColor:'남색' },
  8:  { color:'#ffb74d', personality:'강한 야망과 실행력을 가진 성취자입니다. 물질적 성공을 향한 열망이 강하며 리더십과 사업 감각이 탁월합니다. 도전을 즐기고 큰 그림을 그리는 전략가입니다.', fortune:'재물과 성공의 에너지가 가장 강한 해입니다. 오래 준비해온 사업이나 투자를 실행에 옮기기 좋습니다. 권위와 지위 상승의 기회가 찾아올 것입니다.', luckyDay:'토요일', luckyColor:'금색' },

function getNumData(n) {
  return NUM_DATA[n] || NUM_DATA[1];
}

function calcDigitStr(n) {
  const digits = String(n).split('');
  let s = digits.join('+');
  let sum = digits.reduce((a, d) => a + parseInt(d), 0);
  if (sum > 9 && sum !== 11 && sum !== 22) {
    const d2 = String(sum).split('');
    s += `=${sum}→${d2.join('+')}=${reduceToSingle(sum)}`;
  } else {
    s += `=${sum}`;
  }
  return s;
}

function calculate() {
  const name = document.getElementById('nameInput').value.trim();
  const year = parseInt(document.getElementById('bYear').value);
  const month = parseInt(document.getElementById('bMonth').value);
  const day = parseInt(document.getElementById('bDay').value);

  if (!name || name.length < 1) { alert('이름을 입력해주세요!'); return; }
  if (!year || year < 1930 || year > 2010) { alert('올바른 출생 연도를 입력해주세요!'); return; }
  if (!month) { alert('생월을 선택해주세요!'); return; }
  if (!day) { alert('생일을 선택해주세요!'); return; }

  const lifePath = getLifePathNum(year, month, day);
  const nameNum = getNameNum(name);
  const personalYear = getPersonalYearNum(year, month, day);

  const lpData = getNumData(lifePath);
  const combined = reduceToSingle(lifePath + (nameNum > 9 ? nameNum : nameNum));

  // Build digit string for display
  const dateStr = `${year}${String(month).padStart(2,'0')}${String(day).padStart(2,'0')}`;
  const dateDigits = dateStr.split('').map(Number);
  const rawSum = dateDigits.reduce((a,b) => a+b, 0);

  showAdThenResult(() => {

    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `<div class="result-card">

      <div class="result-title" style="font-size:24px;">${name}님의 운명수</div>

      <div class="num-pair">
        <div class="num-card">
          <div class="num-card-num" style="color:${lpData.color}">${lifePath}</div>
          <div class="num-card-label">생명경로수<br>(Life Path)</div>
        </div>
        <div class="num-card">
          <div class="num-card-num" style="color:#c9b8f7">${nameNum}</div>
          <div class="num-card-label">이름 공명수<br>(Name Number)</div>
        </div>
        <div class="num-card">
          <div class="num-card-num" style="color:#ffd700">${personalYear}</div>
          <div class="num-card-label">2026년<br>개인 연수</div>
        </div>
      </div>

      <div class="calc-steps">
        📐 생명경로수 계산: <code>${dateDigits.join('+')} = ${rawSum}</code> → <code>${lifePath}</code>
      </div>

      <div class="personality-box">
        <h4 style="color:${lpData.color}">🔢 생명경로수 ${lifePath}의 특성</h4>
        <p>${lpData.personality}</p>
      </div>

      <div class="fortune-reading-box">
        <h4>🌟 2026년 운세 (개인 연수 ${personalYear})</h4>
        <p>${lpData.fortune}</p>
      </div>

      <div class="lucky-grid4">

          <span class="lucky-cell-icon">🔢</span>
          <div class="lucky-cell-label">행운의 숫자</div>
          <div class="lucky-cell-val" style="color:${lpData.color}">${lifePath}</div>
        </div>
        <div class="lucky-cell">
          <span class="lucky-cell-icon">📅</span>

          <span class="lucky-cell-icon">🎨</span>
          <div class="lucky-cell-label">행운의 색</div>

        </div>
        <div class="lucky-cell">
          <span class="lucky-cell-icon">✨</span>

      <div class="result-actions">
        <button class="btn-share" onclick="shareResult(${lifePath})">🔗 결과 공유하기</button>

function shareResult(num) {
  const name = document.getElementById('nameInput').value.trim();
  const text = `수비학 행운 숫자 🔢 ${name}님의 생명경로수는 ${num}번! 나도 내 행운 숫자 알아봐~`;
  if (navigator.share) navigator.share({ title: '수비학 행운 숫자', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>

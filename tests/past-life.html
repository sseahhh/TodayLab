function toBlobAsync(canvas) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('blob 실패')), 'image/png');
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.96);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.6);text-align:center;max-width:320px;font-family:inherit;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(() => t.remove(), 400); }, 3000);
}

  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score);
    choicesEl.appendChild(btn);
  });
}

function pick(score) {
  Object.keys(score).forEach(k => { scores[k] += score[k]; });
  current++;
  if (current < QUESTIONS.length) showQ(current);
  else showAdThenResult(showResult);
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  currentResult = RESULTS[top];
  const r = currentResult;
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-type">나의 전생</div>
      <div class="result-title">${r.type}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="now-box">
        <strong>🔮 그래서 지금 나는...</strong>
        ${r.now}
      </div>
      <div class="past-life-scene">
        <div class="past-life-scene-title">🌀 전생의 흔적 (지금 나에게 남은 것)</div>
        <ul class="trace-list">
          ${r.traces.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
      <button class="img-card-btn" onclick="openShareOverlay()">✨ 전생 카드 이미지 만들기</button>
      <div class="result-actions" style="margin-top:14px;">
        <button class="btn-share" onclick="shareLink()">🔗 링크 공유</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
}

function retryTest() {
  scores = { scholar: 0, court: 0, swordsman: 0, merchant: 0, artist: 0, monk: 0 };
  current = 0; currentResult = null; shareDataURL = null; shareCanvas = null;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareLink() {
  const r = currentResult;
  if (navigator.share) navigator.share({ title: '나의 전생은?', text: `내 전생은 "${r.type}"! 너의 전생은?`, url: window.location.href });
  else navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
}

// ── Canvas 이미지 생성 ─────────────────────────────────────────────────

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let ty = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, ty);
      line = word;
      ty += lineH;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, ty); ty += lineH; }
  return ty;
}

async function renderPastLifeCard(r) {
  await document.fonts.ready;

  const W = 600, H = 860;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // ── 배경 ──
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, r.cardBg[0]);
  bg.addColorStop(1, r.cardBg[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 상단 신비로운 글로우
  const glow = ctx.createRadialGradient(W/2, 0, 0, W/2, 0, H * 0.7);
  glow.addColorStop(0, r.cardAccent + '18');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── 상단 그라데이션 바 ──
  const topBar = ctx.createLinearGradient(0, 0, W, 0);
  topBar.addColorStop(0, 'rgba(0,0,0,0)');
  topBar.addColorStop(0.5, r.cardAccent);
  topBar.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = topBar;
  ctx.fillRect(0, 0, W, 3);

  // ── 별빛 파티클 효과 ──
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  const stars = [[45,80],[120,35],[250,22],[400,55],[520,30],[570,90],[80,160],[480,145],[160,200],[530,200]];
  stars.forEach(([sx, sy]) => {
    ctx.beginPath();
    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
    ctx.fill();
  });

  // ── 상단 라벨 ──
  ctx.font = '500 14px "Noto Sans KR"';
  ctx.fillStyle = r.cardAccent + '99';
  ctx.textAlign = 'center';
  ctx.fillText('✨ 나의 전생 테스트 ✨', W/2, 42);

  // ── 이모지 ──
  ctx.font = '100px serif';
  ctx.textAlign = 'center';
  // 이모지 글로우
  ctx.shadowColor = r.cardAccent;
  ctx.shadowBlur = 30;
  ctx.fillText(r.emoji, W/2, 158);
  ctx.shadowBlur = 0;

  // ── 전생 레이블 ──
  ctx.font = '500 14px "Noto Sans KR"';
  ctx.fillStyle = r.cardAccent + '99';
  ctx.textAlign = 'center';
  ctx.fillText('🌀  나의 전생은  🌀', W/2, 195);

  // ── 전생 이름 ──
  ctx.font = '900 42px "Noto Sans KR"';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(r.type, W/2, 258);

  // 언더라인
  const tw = ctx.measureText(r.type).width;
  const ux = W/2 - tw/2;
  const uGrad = ctx.createLinearGradient(ux, 0, ux + tw, 0);
  uGrad.addColorStop(0, 'rgba(0,0,0,0)');
  uGrad.addColorStop(0.5, r.cardAccent);
  uGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = uGrad;
  ctx.fillRect(ux, 268, tw, 2);

  // ── 구분선 ──
  const divGrad = ctx.createLinearGradient(60, 0, W-60, 0);
  divGrad.addColorStop(0, 'rgba(255,255,255,0)');
  divGrad.addColorStop(0.5, 'rgba(255,255,255,0.12)');
  divGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = divGrad;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 298); ctx.lineTo(W - 60, 298); ctx.stroke();

  // ── 설명 텍스트 ──
  ctx.font = '400 15px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(200,200,220,0.8)';
  ctx.textAlign = 'center';
  const descEnd = wrapText(ctx, r.desc, W/2, 338, W - 80, 27);

  // ── 구분선 ──
  ctx.strokeStyle = divGrad;
  ctx.beginPath(); ctx.moveTo(60, descEnd + 20); ctx.lineTo(W - 60, descEnd + 20); ctx.stroke();

  // ── "그래서 지금 나는" ──
  ctx.font = '700 13px "Noto Sans KR"';
  ctx.fillStyle = r.cardAccent + 'bb';
  ctx.textAlign = 'center';
  ctx.fillText('🔮  그래서 지금 나는...', W/2, descEnd + 50);

  ctx.font = 'italic 400 14px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(180,180,200,0.75)';
  wrapText(ctx, r.now, W/2, descEnd + 78, W - 80, 25);

  // ── 하단 워터마크 ──
  const bottomY = H - 80;
  ctx.fillStyle = 'rgba(255,255,255,0.025)';
  ctx.fillRect(0, bottomY, W, 80);

  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, bottomY); ctx.lineTo(W, bottomY); ctx.stroke();

  ctx.font = '700 17px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.textAlign = 'center';
  ctx.fillText('나의 전생은? — 직접 테스트해보기 →', W/2, H - 48);

  ctx.font = '400 13px "Noto Sans KR"';
  ctx.fillStyle = '#444';
  ctx.fillText('🔬 오늘연구소 | 전생 테스트', W/2, H - 22);

  return c;
}

async function openShareOverlay() {
  const btn = document.querySelector('.img-card-btn');
  if (btn) { btn.textContent = '⏳ 카드 생성 중...'; btn.disabled = true; }

  try {
    shareCanvas = await renderPastLifeCard(currentResult);
    shareDataURL = shareCanvas.toDataURL('image/png');
    document.getElementById('sharePreviewImg').src = shareDataURL;
    document.getElementById('shareOverlay').classList.add('open');
  } finally {
    if (btn) { btn.textContent = '✨ 전생 카드 이미지 만들기'; btn.disabled = false; }
  }
}

function closeShareOverlay() {
  document.getElementById('shareOverlay').classList.remove('open');
}

function downloadShareImage() {
  if (!shareDataURL) return;
  const a = document.createElement('a');
  a.href = shareDataURL;
  a.download = `전생_${currentResult.type}.png`;
  a.click();
}

async function shareImageFile() {
  if (!shareCanvas) return;
  const btn = document.querySelector('.share-action-btn.secondary');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    const blob = await toBlobAsync(shareCanvas);
    const file = new File([blob], `전생_${currentResult.type}.png`, { type: 'image/png' });
    // 1순위: 이미지 파일 공유 (모바일)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: '나의 전생은?', text: `내 전생은 "${currentResult.type}"! 너의 전생은?` });
    // 2순위: 링크 공유 (일부 모바일)
    } else if (navigator.share) {
      await navigator.share({ title: '나의 전생은?', text: `내 전생은 "${currentResult.type}"! 너의 전생은?`, url: window.location.href });
    // 3순위: 이미지 다운로드
    } else {
      downloadShareImage();
      showToast('💾 이미지가 저장됐어요! 카카오톡에 직접 공유해보세요 😊');
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      downloadShareImage();
      showToast('💾 이미지가 저장됐어요! 직접 공유해보세요 😊');
    }
  } finally {
    if (btn) { btn.textContent = '📤 공유하기'; btn.disabled = false; }
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeShareOverlay(); });
document.getElementById('shareOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shareOverlay')) closeShareOverlay();
});
</script>

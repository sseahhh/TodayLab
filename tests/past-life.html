let scores = { scholar: 0, court: 0, swordsman: 0, merchant: 0, artist: 0, monk: 0 };
let current = 0;

function startTest() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function showQ(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D', 'E'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score);
    choicesEl.appendChild(btn);
  });
}

function pick(score) {
  Object.keys(score).forEach(k => { scores[k] += score[k]; });
  current++;
  if (current < QUESTIONS.length) {
    showQ(current);
  } else {
    showAdThenResult(showResult);
  }
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const r = RESULTS[top];
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-type">나의 전생</div>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc}</div>
      <div class="now-box">
        <strong>🔮 그래서 지금 나는...</strong>
        ${r.now}
      </div>
      <div class="past-life-scene">
        <div class="past-life-scene-title">🌀 전생의 흔적 (지금 나에게 남은 것)</div>
        <ul class="trace-list">
          ${r.traces.map(t => `<li>${t}</li>`).join('')}
        </ul>
      </div>
      <div class="result-actions" style="margin-top:28px;">
        <button class="btn-share" onclick="shareResult('${r.title}')">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
}

function retryTest() {
  scores = { scholar: 0, court: 0, swordsman: 0, merchant: 0, artist: 0, monk: 0 };
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareResult(type) {
  const text = `내 전생은 "${type}"! 너의 전생은?`;
  if (navigator.share) {
    navigator.share({ title: '나의 전생은?', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
  }
}
</script>

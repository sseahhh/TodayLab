  <style>
    .age-input-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .dev-big {
      font-size: 64px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(135deg, #96fbc4, #f9f586);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 20px 0 8px;
    }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      cursor: pointer;
      user-select: none;
    }
    .checklist-item:last-child { border-bottom: none; }
    .check-box {
      width: 22px;
      height: 22px;
      border: 2px solid rgba(255,255,255,.25);
      border-radius: 6px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      margin-top: 1px;
    }
    .checklist-item.checked .check-box {
      background: #96fbc4;
      border-color: #96fbc4;
      color: #141414;
    }
    .checklist-item.checked .check-label {
      color: var(--gray3);
      text-decoration: line-through;
    }
    .check-label { font-size: 14px; color: var(--gray2); line-height: 1.5; }
    .activity-item {
      display: flex;
      gap: 10px;
      padding: 10px 0;
      font-size: 14px;
      color: var(--gray2);
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .activity-item:last-child { border-bottom: none; }
  </style>
</head>

  <nav class="navbar scrolled">

        </a>
      </div>

        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>

  <div class="test-wrap">
    <div class="test-inner">
      <div id="formSection">

          <div class="test-meta">
            <span>👶 육아</span>
            <span>⏱ 2분</span>
            <span>👥 67,445명 참여</span>
          </div>
        </div>

        <div class="question-card">
          <div class="question-num">나이 입력 방식</div>
          <div class="chip-group" id="ageMode" style="margin-bottom:24px;">
            <button class="chip selected" onclick="selectAgeMode(this,'months')">개월 수</button>
            <button class="chip" onclick="selectAgeMode(this,'years')">만 나이 (년)</button>
          </div>

          <div id="monthsInput">
            <label class="input-label">아이 나이 (개월, 0~60)</label>

        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:16px 18px;margin-top:16px;">

function selectAgeMode(btn, mode) {
  document.querySelectorAll('#ageMode .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  currentAgeMode = mode;
  document.getElementById('monthsInput').style.display = mode === 'months' ? 'block' : 'none';
  document.getElementById('yearsInput').style.display = mode === 'years' ? 'block' : 'none';
}

function getDevData(months) {
  for (const d of devData) {
    if (months >= d.min && months <= d.max) return d;
  }
  if (months > 60) return devData[devData.length - 1];
  return devData[0];
}

function calculate() {
  let months;
  if (currentAgeMode === 'months') {
    months = parseInt(document.getElementById('ageMonths').value);
    if (isNaN(months) || months < 0 || months > 60) {
      alert('아이 나이를 0~60개월 사이로 입력해주세요!'); return;
    }
  } else {
    const years = parseFloat(document.getElementById('ageYears').value);
    if (isNaN(years) || years < 0 || years > 5) {
      alert('아이 만 나이를 0~5세 사이로 입력해주세요!'); return;
    }
    months = Math.round(years * 12);
  }

  const data = getDevData(months);
  const ageDisplay = months < 12 ? `${months}개월` : `${Math.floor(months/12)}세 ${months%12}개월`;

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';

    const checklistHTML = data.milestones.map((m, i) => `
      <div class="checklist-item" id="check${i}" onclick="toggleCheck(${i})">
        <div class="check-box" id="box${i}">✓</div>
        <span class="check-label">${m}</span>
      </div>`).join('');

    const activitiesHTML = data.activities.map(a => `
      <div class="activity-item">${a}</div>`).join('');

    sec.innerHTML = `
      <div class="result-card">
        <span class="result-emoji">${data.emoji}</span>
        <div class="result-type">${data.range} 발달 체크</div>
        <div class="dev-big">${ageDisplay}</div>
        <p style="text-align:center;color:var(--gray2);font-size:14px;margin-bottom:24px;">${data.desc}</p>

        <div style="text-align:left;">
          <div style="font-size:15px;font-weight:700;margin-bottom:12px;">✅ 발달 체크리스트</div>
          <div style="background:rgba(255,255,255,.04);border-radius:12px;padding:4px 18px;margin-bottom:8px;">
            ${checklistHTML}
          </div>
          <p style="font-size:12px;color:var(--gray3);margin-bottom:24px;">항목을 클릭해서 체크해보세요!</p>

          <div style="font-size:15px;font-weight:700;margin-bottom:12px;">🎯 발달을 도와주는 활동</div>
          <div class="range-info" style="margin-bottom:20px;">
            ${activitiesHTML}
          </div>

          <div style="background:rgba(255,107,107,.08);border:1px solid rgba(255,107,107,.2);border-radius:12px;padding:16px 18px;margin-bottom:20px;">
            <div style="font-size:13px;font-weight:700;color:#ff9999;margin-bottom:6px;">⚠️ 이 시기 주의사항</div>
            <p style="font-size:13px;color:var(--gray2);line-height:1.7;">${data.caution}</p>
          </div>
        </div>

        <div class="result-actions">
          <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
          <button class="btn-retry" onclick="location.reload()">🔄 다시 확인</button>
          <a href="../index.html" class="btn-back">← 포털로</a>
        </div>
      </div>`;
  });
}

function toggleCheck(i) {
  const item = document.getElementById('check' + i);
  item.classList.toggle('checked');
}

function shareResult() {
  const text = '우리 아이 발달 체크 해봤어요! 👶 우리 아이 발달도 확인해봐요~';
  if (navigator.share) navigator.share({ title: '아이 발달 체크', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

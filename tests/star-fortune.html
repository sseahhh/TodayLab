function getSign(month, day) {
  const m = parseInt(month), d = parseInt(day);
  if ((m === 3 && d >= 21) || (m === 4 && d <= 19)) return SIGNS[3]; // 양자리
  if ((m === 4 && d >= 20) || (m === 5 && d <= 20)) return SIGNS[4]; // 황소자리
  if ((m === 5 && d >= 21) || (m === 6 && d <= 20)) return SIGNS[5]; // 쌍둥이
  if ((m === 6 && d >= 21) || (m === 7 && d <= 22)) return SIGNS[6]; // 게자리
  if ((m === 7 && d >= 23) || (m === 8 && d <= 22)) return SIGNS[7]; // 사자자리
  if ((m === 8 && d >= 23) || (m === 9 && d <= 22)) return SIGNS[8]; // 처녀자리
  if ((m === 9 && d >= 23) || (m === 10 && d <= 22)) return SIGNS[9]; // 천칭
  if ((m === 10 && d >= 23) || (m === 11 && d <= 21)) return SIGNS[10]; // 전갈
  if ((m === 11 && d >= 22) || (m === 12 && d <= 21)) return SIGNS[11]; // 궁수
  if ((m === 12 && d >= 22) || (m === 1 && d <= 19)) return SIGNS[0]; // 염소
  if ((m === 1 && d >= 20) || (m === 2 && d <= 18)) return SIGNS[1]; // 물병
  return SIGNS[2]; // 물고기
}

  const names = ['양자리','황소자리','쌍둥이자리','게자리','사자자리','처녀자리','천칭자리','전갈자리','궁수자리','염소자리','물병자리','물고기자리'];
  const periods = ['3/21~4/19','4/20~5/20','5/21~6/20','6/21~7/22','7/23~8/22','8/23~9/22','9/23~10/22','10/23~11/21','11/22~12/21','12/22~1/19','1/20~2/18','2/19~3/20'];
  const idx = names.indexOf(sign.name);
  return idx >= 0 ? periods[idx] : '';
}

function seededVal(seed, min, max) {
  return min + (seed % (max - min + 1));
}

function statBar(label, value, color) {
  return `<div class="stat-row">
    <div class="stat-label"><span>${label}</span><span style="color:${color}">${value}</span></div>
    <div class="stat-bar-bg"><div class="stat-bar-fill" data-val="${value}" style="width:0%;background:${color}"></div></div>
  </div>`;
}

function calculate() {
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;
  if (!month || !day) { alert('생월과 생일을 선택해주세요!'); return; }

  const sign = getSign(month, day);
  const today = new Date();
  const seed = today.getDate() * 7 + today.getMonth() * 13 + parseInt(month) * 3 + parseInt(day) * 5;

  const overall = seededVal(seed * 3, 55, 98);
  const love    = seededVal(seed * 7, 42, 99);
  const money   = seededVal(seed * 11, 40, 95);
  const health  = seededVal(seed * 13, 50, 97);
  const career  = seededVal(seed * 17, 45, 96);

  const adviceIdx = seed % sign.advice.length;
  const luckyColor = sign.luckyColors[seed % sign.luckyColors.length];
  const luckyNum = sign.luckyNums[seed % sign.luckyNums.length];
  const luckyDir = sign.luckyDirs[seed % sign.luckyDirs.length];
  const period = periodLabel(sign);

  const dateStr = `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일`;

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `<div class="result-card">
      <div class="result-type">⭐ 별자리 운세 — ${dateStr}</div>

      <div class="star-sign-hero">
        <span class="star-sign-emoji">${sign.emoji}</span>
        <div class="star-sign-name" style="color:${sign.color}">${sign.name}</div>
        <div class="star-sign-period">${period}</div>
      </div>

      <div class="today-fortune-box">
        <p>✨ <strong style="color:${sign.color}">${sign.name}</strong> — ${sign.personality}</p>
      </div>

      <div style="margin-bottom:24px;">
        ${statBar('총운 ⭐', overall, sign.color)}
        ${statBar('애정운 💕', love, '#f06292')}
        ${statBar('금전운 💰', money, '#ffd700')}
        ${statBar('건강운 💪', health, '#46d369')}
        ${statBar('직업운 🚀', career, '#4facfe')}
      </div>

      <div class="lucky-grid">
        <div class="lucky-box">
          <span class="lucky-box-icon">🎨</span>
          <div class="lucky-box-label">행운의 색</div>
          <div class="lucky-box-val">${luckyColor}</div>
        </div>
        <div class="lucky-box">
          <span class="lucky-box-icon">🔢</span>
          <div class="lucky-box-label">행운의 숫자</div>
          <div class="lucky-box-val">${luckyNum}</div>
        </div>
        <div class="lucky-box">
          <span class="lucky-box-icon">🧭</span>
          <div class="lucky-box-label">행운의 방향</div>
          <div class="lucky-box-val">${luckyDir}</div>
        </div>
      </div>

      <div class="today-fortune-box">
        <p>💜 오늘의 조언: ${sign.advice[adviceIdx]}</p>
      </div>

      <div class="result-actions">
        <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="location.reload()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;

    setTimeout(() => {
      document.querySelectorAll('.stat-bar-fill').forEach(el => {
        el.style.width = el.dataset.val + '%';
      });
    }, 100);
  });
}

function shareResult() {
  const month = document.getElementById('birthMonth').value;
  const day = document.getElementById('birthDay').value;
  const sign = getSign(month, day);
  const text = `내 별자리 ${sign.emoji} ${sign.name} 오늘의 운세 확인했어! 너도 해봐 ⭐`;
  if (navigator.share) navigator.share({ title: '별자리 운세', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

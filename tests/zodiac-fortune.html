    .birth-row { display:grid; grid-template-columns:2fr 1fr 1fr; gap:10px; margin-bottom:4px; }

      background:linear-gradient(145deg,rgba(13,26,10,.95) 0%,rgba(26,46,10,.95) 100%);

    .zodiac-emoji { font-size:78px; display:block; margin-bottom:10px; line-height:1; }
    .zodiac-name  { font-size:28px; font-weight:900; color:#46d369; margin-bottom:4px; }
    .zodiac-info  { font-size:12px; color:var(--gray3); line-height:1.6; }

    .fortune-main {
      background:rgba(255,255,255,.04); border:1px solid rgba(255,255,255,.08);

    .lucky-label { font-size:10px; color:var(--gray3); margin-bottom:3px; }
    .lucky-val   { font-size:13px; font-weight:700; color:var(--gray1); }

  { key:'rabbit', name:'토끼띠', emoji:'🐰', repYears:'1963 · 1975 · 1987 · 1999',

  { key:'dragon', name:'용띠', emoji:'🐲', repYears:'1952 · 1964 · 1976 · 1988 · 2000',

    quarters:['예리한 직관으로 좋은 기회를 포착합니다. 망설임보다 결단이 중요합니다.','대인관계에서 섬세한 배려가 필요한 시기. 소통을 강화하세요.','재능이 빛나는 시기. 자신만의 강점을 적극적으로 표현하세요.','한 해 성과를 갈무리하며 내년을 위한 전략을 수립하세요.'],

  { key:'horse', name:'말띠', emoji:'🐴', repYears:'1954 · 1966 · 1978 · 1990 · 2002',

    advice:'본명년은 변화의 해이자 성장의 해입니다. 외부의 변화에 흔들리지 말고 자신의 중심을 굳건히 잡으세요.' },

  { key:'goat', name:'양띠', emoji:'🐑', repYears:'1955 · 1967 · 1979 · 1991 · 2003',

// cycle: 1900 = 쥐(rat)
const CYCLE = ['rat','ox','tiger','rabbit','dragon','snake','horse','goat','monkey','rooster','dog','pig'];

function getZodiac(year, month, day) {
  let zodYear = year;
  if (month < 2 || (month === 2 && day < 4)) zodYear = year - 1;
  const idx = ((zodYear - 1900) % 12 + 12) % 12;
  return ZODIAC.find(z => z.key === CYCLE[idx]);
}

function statBar(label, value, color) {
  return `<div class="stat-row">
    <div class="stat-label"><span>${label}</span><span style="color:${color}">${value}</span></div>
    <div class="stat-bar-bg"><div class="stat-bar-fill" data-val="${value}" style="width:0%;background:${color};transition:width 1.2s cubic-bezier(.4,0,.2,1) .3s;"></div></div>
  </div>`;
}

document.getElementById('calcBtn').addEventListener('click', calculate);

function calculate() {
  const year  = parseInt(document.getElementById('bYear').value);
  const month = parseInt(document.getElementById('bMonth').value);
  const day   = parseInt(document.getElementById('bDay').value);

  if (!year || year < 1924 || year > 2010) { alert('1924~2010년 사이의 출생연도를 입력해주세요!'); return; }
  if (!month || month < 1 || month > 12)   { alert('월을 1~12 사이로 입력해주세요!'); return; }
  if (!day   || day   < 1 || day   > 31)   { alert('일을 1~31 사이로 입력해주세요!'); return; }

    document.getElementById('formSection').style.display = 'none';

    sec.innerHTML = `
      <div class="result-card">
        <div class="result-type">🐉 ${THIS_YEAR}년 띠별 운세</div>

        <div class="zodiac-hero">

          <div class="zodiac-info">${year}년 ${month}월 ${day}일생<br>${z.repYears}</div>
        </div>

        <div class="fortune-main">${z.fortune}</div>

        <div style="margin-bottom:20px;">

        <div style="font-size:13px;font-weight:700;color:var(--gray2);margin-bottom:12px;">📅 ${THIS_YEAR}년 분기별 흐름</div>

function shareResult(name, emoji) {
  const text = `나는 ${emoji} ${name}! ${THIS_YEAR}년 띠별 운세 확인했어 🐉 너도 해봐!`;
  if (navigator.share) navigator.share({ title:`띠별 운세 ${THIS_YEAR}`, text, url:window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}

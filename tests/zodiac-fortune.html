    money:75, love:90, health:60, career:73,

// Year to zodiac: base year 1900 is rat(쥐). cycle 12 starting [rat,ox,tiger,rabbit,dragon,snake,horse,goat,monkey,rooster,dog,pig]
function getZodiac(year) {
  const cycle = ['rat','ox','tiger','rabbit','dragon','snake','horse','goat','monkey','rooster','dog','pig'];
  const base = ((year - 1900) % 12 + 12) % 12;
  const key = cycle[base];
  return ZODIAC.find(z => z.key === key) || ZODIAC[0];
}

function statBar(label, value, color) {
  return `<div class="stat-row">
    <div class="stat-label"><span>${label}</span><span style="color:${color}">${value}</span></div>
    <div class="stat-bar-bg"><div class="stat-bar-fill" data-val="${value}" style="width:0%;background:${color}"></div></div>
  </div>`;
}

function calculate() {
  const year = parseInt(document.getElementById('birthYear').value);
  if (!year || year < 1930 || year > 2010) { alert('1930~2010년 사이의 출생 연도를 입력해주세요!'); return; }

  const z = getZodiac(year);

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `<div class="result-card">
      <div class="result-type">🐉 2025년 띠별 운세</div>

      <div class="zodiac-hero">
        <span class="zodiac-animal-emoji">${z.emoji}</span>
        <div class="zodiac-animal-name">${z.name}</div>
        <div class="zodiac-animal-years">${year}년생</div>
      </div>

      <div class="fortune-desc-box">${z.fortune2025}</div>

      <div style="margin-bottom:24px;">
        ${statBar('재물운 💰', z.money, '#ffd700')}
        ${statBar('애정운 💕', z.love, '#f06292')}
        ${statBar('건강운 💪', z.health, '#46d369')}
        ${statBar('직업운 🚀', z.career, '#4facfe')}
      </div>

      <div class="lucky-month-row">
        <div class="lucky-month-box" style="background:rgba(70,211,105,.1);border:1px solid rgba(70,211,105,.25);">
          <div class="lm-label" style="color:#46d369;">🍀 행운의 달</div>
          <div class="lm-val" style="color:#46d369;">${z.luckyMonth}</div>
        </div>
        <div class="lucky-month-box" style="background:rgba(229,9,20,.08);border:1px solid rgba(229,9,20,.2);">
          <div class="lm-label" style="color:#ff6b6b;">⚠️ 주의할 달</div>
          <div class="lm-val" style="color:#ff6b6b;">${z.unluckyMonth}</div>
        </div>
      </div>

      <div class="lucky-items-row">
        <div class="lucky-item-card">
          <span class="li-icon">🎨</span>
          <div class="li-label">행운의 색</div>
          <div class="li-val">${z.luckyColor}</div>
        </div>
        <div class="lucky-item-card">
          <span class="li-icon">🔢</span>
          <div class="li-label">행운의 숫자</div>
          <div class="li-val">${z.luckyNum}</div>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="location.reload()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;

    setTimeout(() => {
      document.querySelectorAll('.stat-bar-fill').forEach(el => {
        el.style.width = el.dataset.val + '%';
      });
    }, 100);
  });
}

function shareResult() {
  const year = parseInt(document.getElementById('birthYear').value);
  const z = getZodiac(year);
  const text = `나는 ${z.emoji} ${z.name}! 2025년 운세 확인했어 🐉 너도 해봐!`;
  if (navigator.share) navigator.share({ title: '띠별 운세 2025', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>

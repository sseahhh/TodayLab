  <style>
    .stress-meter-wrap {
      margin: 0 auto 24px;
      max-width: 360px;
    }
    .stress-meter-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .stress-meter-bar {
      background: var(--bg3);
      border-radius: 50px;
      height: 22px;
      overflow: hidden;
      position: relative;
    }
    .stress-meter-fill {
      height: 100%;
      border-radius: 50px;
      width: 0;
      transition: width 1.4s cubic-bezier(.4,0,.2,1) .3s;
      position: relative;
    }
    .stress-score-num {
      font-size: 72px;
      font-weight: 900;
      line-height: 1;
      margin: 8px 0 4px;
    }
    .stress-score-unit {
      font-size: 18px;
      font-weight: 600;
      opacity: .6;
    }
    .stress-area-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 16px 0;
    }
    .stress-area-item {
      background: var(--bg3);
      border-radius: 10px;
      padding: 12px 10px;
      text-align: center;
    }
    @media (max-width: 600px) {
      .stress-area-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 400px) {
      .stress-area-grid { grid-template-columns: 1fr; }
    }
    .stress-area-icon { font-size: 22px; display: block; margin-bottom: 6px; }
    .stress-area-label { font-size: 12px; color: var(--gray3); margin-bottom: 6px; }
    .stress-area-val { font-size: 15px; font-weight: 700; }
    .relief-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .relief-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
      font-size: 14px;
      color: var(--gray2);
      line-height: 1.6;
    }
    .relief-item:last-child { border-bottom: none; }
    .relief-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }
    .relief-box {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 16px 18px;
      margin-top: 16px;
    }
    .relief-box-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

// Area score tracking
let areaScores = { daily: 0, work: 0, relation: 0 };
let areaCounts = { daily: 0, work: 0, relation: 0 };
let totalScore = 0;
let current = 0;

function startTest() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function showQ(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score, q.area);
    choicesEl.appendChild(btn);
  });
}

function pick(score, area) {
  totalScore += score;
  areaScores[area] += score;
  areaCounts[area]++;
  current++;
  if (current < QUESTIONS.length) {
    showQ(current);
  } else {
    showAdThenResult(showResult);
  }
}

function getLevel(raw) {
  // raw max = 12 * 8 = 96, scale to 100
  const scaled = Math.round((raw / 96) * 100);
  for (const l of LEVELS) {
    if (scaled <= l.max) return { level: l, scaled };
  }
  return { level: LEVELS[3], scaled: 100 };
}

function getAreaLevel(area) {
  const max = areaCounts[area] * 8;
  if (max === 0) return '보통';
  const pct = (areaScores[area] / max) * 100;
  if (pct <= 25) return '낮음';
  if (pct <= 50) return '보통';
  if (pct <= 75) return '높음';
  return '매우 높음';
}

function getAreaColor(level) {
  const map = { '낮음': '#46d369', '보통': '#fbbf24', '높음': '#f97316', '매우 높음': '#e50914' };
  return map[level] || '#fbbf24';
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const { level, scaled } = getLevel(totalScore);

  const dailyLvl = getAreaLevel('daily');
  const workLvl = getAreaLevel('work');
  const relationLvl = getAreaLevel('relation');

  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <div class="result-type">스트레스 지수</div>
      <div class="stress-score-num" style="color:${level.color};" id="stressNum">0</div>
      <div class="stress-score-unit">/ 100</div>
      <div style="margin: 12px 0 6px;">
        <span class="result-emoji">${level.emoji}</span>
      </div>
      <div class="stress-meter-wrap">
        <div class="stress-meter-bar">
          <div class="stress-meter-fill" id="stressFill" style="background:${level.fillColor};"></div>
        </div>
      </div>
      <div class="result-title">${level.label}</div>
      <div class="result-desc">${level.desc}</div>
      <div style="margin-top:20px;">
        <div style="font-size:12px;font-weight:700;color:var(--gray3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px;">📊 주요 스트레스 원인 분석</div>
        <div class="stress-area-grid">
          <div class="stress-area-item">
            <span class="stress-area-icon">🏠</span>
            <div class="stress-area-label">일상 피로</div>
            <div class="stress-area-val" style="color:${getAreaColor(dailyLvl)}">${dailyLvl}</div>
          </div>
          <div class="stress-area-item">
            <span class="stress-area-icon">💼</span>
            <div class="stress-area-label">업무 압박</div>
            <div class="stress-area-val" style="color:${getAreaColor(workLvl)}">${workLvl}</div>
          </div>
          <div class="stress-area-item">
            <span class="stress-area-icon">👥</span>
            <div class="stress-area-label">관계 스트레스</div>
            <div class="stress-area-val" style="color:${getAreaColor(relationLvl)}">${relationLvl}</div>
          </div>
        </div>
      </div>
      <div class="relief-box">
        <div class="relief-box-title" style="color:${level.color};">✦ 맞춤 해소법 3가지</div>
        <ul class="relief-list">
          ${level.reliefs.map((r, i) => `<li class="relief-item"><span class="relief-num" style="background:${level.color}20;color:${level.color};">${i+1}</span><span>${r}</span></li>`).join('')}
        </ul>
      </div>
      <div class="result-actions" style="margin-top:28px;">
        <button class="btn-share" onclick="shareResult(${scaled})">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;

  // Animate score number
  let n = 0;
  const target = scaled;
  const timer = setInterval(() => {
    n = Math.min(n + 2, target);
    const el = document.getElementById('stressNum');
    if (el) el.textContent = n;
    if (n >= target) clearInterval(timer);
  }, 25);

  // Animate bar
  setTimeout(() => {
    const fill = document.getElementById('stressFill');
    if (fill) fill.style.width = scaled + '%';
  }, 100);
}

function retryTest() {
  totalScore = 0;
  areaScores = { daily: 0, work: 0, relation: 0 };
  areaCounts = { daily: 0, work: 0, relation: 0 };
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQ(0);
}

function shareResult(score) {
  const text = `나의 스트레스 지수는 ${score}점! 너는?`;
  if (navigator.share) {
    navigator.share({ title: '스트레스 지수 체크', text, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
  }
}
</script>
</body>
</html>

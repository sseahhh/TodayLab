<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>아이 성장 백분위 | 오늘연구소</title>
  <meta name="description" content="아이 성장 백분위 — 오늘연구소에서 재미있게 즐겨보세요">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>">
  <link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="../ad.js"></script>
  <style>
    .input-row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    .bmi-big {
      font-size: 72px;
      font-weight: 900;
      text-align: center;
      margin: 20px 0 8px;
    }
    .status-badge {
      display: inline-block;
      padding: 8px 24px;
      border-radius: 50px;
      font-size: 16px;
      font-weight: 700;
      margin: 8px auto 20px;
    }
    .status-under { background: rgba(100,180,255,.15); color: #64b4ff; border: 1px solid rgba(100,180,255,.3); }
    .status-normal { background: rgba(70,211,105,.15); color: #46d369; border: 1px solid rgba(70,211,105,.3); }
    .status-over { background: rgba(255,200,0,.15); color: #ffc800; border: 1px solid rgba(255,200,0,.3); }
    .status-obese { background: rgba(255,80,80,.15); color: #ff5050; border: 1px solid rgba(255,80,80,.3); }
    .percentile-bar {
      background: var(--bg3);
      border-radius: 50px;
      height: 12px;
      margin: 8px 0 4px;
      overflow: hidden;
    }
    .percentile-fill {
      height: 100%;
      border-radius: 50px;
      background: linear-gradient(90deg, #96fbc4, #f9f586);
      transition: width 1.5s cubic-bezier(.4,0,.2,1) .3s;
    }
  </style>
</head>
<body>
  <nav class="navbar scrolled">
    <div class="nav-container">
      <div class="nav-left">
        <a href="../index.html" class="logo">
          <span class="logo-emoji">🔬</span>
          <span class="logo-text">오늘연구소</span>
        </a>
      </div>
      <div class="nav-right">
        <a href="../index.html" class="btn-back">← 포털로 돌아가기</a>
      </div>
    </div>
  </nav>

  <div class="test-wrap">
    <div class="test-inner">
      <div id="formSection">
        <div class="test-header">
          <span class="test-header-emoji">📊</span>
          <h1>아이 성장 백분위</h1>
          <p>우리 아이의 키, 몸무게, BMI가<br>또래와 비교해서 어느 정도인지 확인해요!</p>
          <div class="test-meta">
            <span>👶 육아</span>
            <span>⏱ 1분</span>
            <span>👥 54,223명 참여</span>
          </div>
        </div>

        <div class="question-card">
          <div class="question-num">아이 정보 입력</div>
          <p class="question-text" style="margin-bottom:16px;">성별을 선택해주세요</p>

          <div class="chip-group" id="genderGroup" style="margin-bottom:24px;">
            <button class="chip" onclick="selectGender(this,'M')">💙 아들</button>
            <button class="chip" onclick="selectGender(this,'F')">🩷 딸</button>
          </div>

          <label class="input-label">만 나이 (0~17세)</label>
          <input type="number" class="input-field" id="childAge" placeholder="예: 7" min="0" max="17">

          <div class="input-row2">
            <div>
              <label class="input-label">키 (cm)</label>
              <input type="number" class="input-field" id="childHeight" placeholder="예: 120" min="40" max="200" style="margin-bottom:0;">
            </div>
            <div>
              <label class="input-label">몸무게 (kg)</label>
              <input type="number" class="input-field" id="childWeight" placeholder="예: 25" min="2" max="120" style="margin-bottom:0;">
            </div>
          </div>

          <button class="btn-primary" onclick="calculate()" style="width:100%;padding:15px;font-size:16px;margin-top:16px;">
            📊 성장 분석하기
          </button>
        </div>

        <div style="background:rgba(255,255,255,.03);border-radius:12px;padding:16px 18px;margin-top:16px;">
          <p style="font-size:12px;color:var(--gray3);line-height:1.7;">
            📌 한국 소아청소년 성장 기준(<strong style="color:var(--gray2)">질병관리청 2017년 기준</strong>) 기반 근사값입니다.<br>
            정확한 성장 평가는 소아청소년과에서 받아주세요. 아이 성장에 정답은 없어요 💕
          </p>
        </div>
      </div>

      <div id="resultSection" style="display:none;"></div>
    </div>
  </div>

<script>
let childGender = null;

function selectGender(btn, g) {
  document.querySelectorAll('#genderGroup .chip').forEach(c => c.classList.remove('selected'));
  btn.classList.add('selected');
  childGender = g;
}

// Korean child growth reference (approximate averages)
const growthRef = {
  M: {
    0:  { h: 50,  w: 3.3 },
    1:  { h: 75,  w: 9.5 },
    2:  { h: 87,  w: 12.2 },
    3:  { h: 96,  w: 14.5 },
    4:  { h: 103, w: 16.3 },
    5:  { h: 110, w: 19.0 },
    6:  { h: 116, w: 21.5 },
    7:  { h: 122, w: 24.0 },
    8:  { h: 128, w: 27.0 },
    9:  { h: 133, w: 30.0 },
    10: { h: 139, w: 34.0 },
    11: { h: 144, w: 38.0 },
    12: { h: 151, w: 43.0 },
    13: { h: 162, w: 52.0 },
    14: { h: 168, w: 58.0 },
    15: { h: 170, w: 61.0 },
    16: { h: 172, w: 63.0 },
    17: { h: 173, w: 65.0 },
  },
  F: {
    0:  { h: 49,  w: 3.2 },
    1:  { h: 74,  w: 9.0 },
    2:  { h: 86,  w: 11.5 },
    3:  { h: 95,  w: 13.8 },
    4:  { h: 102, w: 15.8 },
    5:  { h: 109, w: 18.0 },
    6:  { h: 115, w: 20.5 },
    7:  { h: 121, w: 23.0 },
    8:  { h: 127, w: 26.0 },
    9:  { h: 133, w: 29.0 },
    10: { h: 139, w: 33.0 },
    11: { h: 146, w: 38.0 },
    12: { h: 152, w: 44.0 },
    13: { h: 157, w: 48.0 },
    14: { h: 159, w: 51.0 },
    15: { h: 160, w: 52.0 },
    16: { h: 161, w: 53.0 },
    17: { h: 161, w: 53.0 },
  }
};

function estimatePercentile(value, avg, stdDev) {
  const z = (value - avg) / stdDev;
  const pct = Math.round(50 + z * 34);
  return Math.max(3, Math.min(97, pct));
}

function getBmiStatus(bmi, age) {
  if (age < 2) {
    if (bmi < 14) return { label: '저체중', cls: 'status-under' };
    if (bmi < 18) return { label: '정상', cls: 'status-normal' };
    if (bmi < 20) return { label: '과체중', cls: 'status-over' };
    return { label: '비만', cls: 'status-obese' };
  }
  // Age 2+ uses percentile-based thresholds (simplified)
  if (bmi < 14) return { label: '저체중', cls: 'status-under' };
  if (bmi < 22) return { label: '정상', cls: 'status-normal' };
  if (bmi < 25) return { label: '과체중', cls: 'status-over' };
  return { label: '비만', cls: 'status-obese' };
}

function calculate() {
  if (!childGender) { alert('성별을 선택해주세요!'); return; }
  const age = parseInt(document.getElementById('childAge').value);
  const height = parseFloat(document.getElementById('childHeight').value);
  const weight = parseFloat(document.getElementById('childWeight').value);

  if (isNaN(age) || age < 0 || age > 17) { alert('나이를 0~17세 사이로 입력해주세요!'); return; }
  if (!height || height < 40 || height > 200) { alert('키를 정확하게 입력해주세요!'); return; }
  if (!weight || weight < 2 || weight > 120) { alert('몸무게를 정확하게 입력해주세요!'); return; }

  const bmi = weight / Math.pow(height / 100, 2);
  const status = getBmiStatus(bmi, age);
  const ref = growthRef[childGender][age] || growthRef[childGender][17];

  const hStdDev = ref.h * 0.044;
  const wStdDev = ref.w * 0.18;
  const hPct = estimatePercentile(height, ref.h, hStdDev);
  const wPct = estimatePercentile(weight, ref.w, wStdDev);

  let advice;
  if (status.label === '저체중') {
    advice = '아이가 또래보다 체중이 적은 편이에요. 균형 잡힌 식사와 충분한 영양 섭취가 중요합니다. 영양이 풍부한 간식을 자주 제공해주세요.';
  } else if (status.label === '정상') {
    advice = '아이가 건강한 체중 범위에 있어요! 지금처럼 균형 잡힌 식사와 규칙적인 활동을 유지해주세요. 잘 크고 있답니다 😊';
  } else if (status.label === '과체중') {
    advice = '아이의 체중이 약간 많은 편이에요. 단 음료와 고칼로리 간식을 줄이고, 매일 60분 이상 신체활동을 늘려주세요. 성장 중이니 무리한 다이어트는 금물!';
  } else {
    advice = '체중 관리가 필요한 시기예요. 소아청소년과나 소아 비만 클리닉 상담을 권장드려요. 아이와 함께 걷기, 수영, 자전거 등 즐거운 운동을 시작해보세요.';
  }

  const bmiColor = status.label === '저체중' ? '#64b4ff'
    : status.label === '정상' ? '#46d369'
    : status.label === '과체중' ? '#ffc800'
    : '#ff5050';

  showAdThenResult(() => {
    document.getElementById('formSection').style.display = 'none';
    const sec = document.getElementById('resultSection');
    sec.style.display = 'block';
    sec.innerHTML = `
      <div class="result-card">
        <span class="result-emoji">📊</span>
        <div class="result-type">${age}세 ${childGender === 'M' ? '남아' : '여아'} 성장 분석</div>
        <div class="bmi-big" style="color:${bmiColor};">${bmi.toFixed(1)}</div>
        <div style="text-align:center;margin-bottom:4px;color:var(--gray3);font-size:13px;">BMI (체질량지수)</div>
        <div style="text-align:center;margin-bottom:20px;">
          <span class="status-badge ${status.cls}">${status.label}</span>
        </div>

        <div class="range-info">
          <div class="range-row">
            <span>📏 키</span>
            <span class="range-val">${height}cm</span>
          </div>
          <div class="range-row">
            <span>📏 키 백분위</span>
            <span class="range-val">상위 ${100-hPct}% (또래 중 ${hPct}번째)</span>
          </div>
          <div class="range-row">
            <span>⚖️ 몸무게</span>
            <span class="range-val">${weight}kg</span>
          </div>
          <div class="range-row">
            <span>⚖️ 몸무게 백분위</span>
            <span class="range-val">상위 ${100-wPct}% (또래 중 ${wPct}번째)</span>
          </div>
          <div class="range-row">
            <span>📊 이 나이 평균 키</span>
            <span class="range-val">${ref.h}cm</span>
          </div>
          <div class="range-row">
            <span>📊 이 나이 평균 몸무게</span>
            <span class="range-val">${ref.w}kg</span>
          </div>
        </div>

        <div style="margin: 8px 0 16px;">
          <div style="font-size:13px;color:var(--gray3);margin-bottom:6px;text-align:left;">키 백분위 위치</div>
          <div class="percentile-bar">
            <div class="percentile-fill" id="hPctFill" style="width:0%"></div>
          </div>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--gray3);">
            <span>작은 편</span><span>평균</span><span>큰 편</span>
          </div>
        </div>

        <div style="background:rgba(255,255,255,.04);border-radius:12px;padding:16px 18px;margin:20px 0;text-align:left;">
          <div style="font-size:14px;font-weight:700;margin-bottom:8px;">💡 부모님께 드리는 조언</div>
          <p style="font-size:14px;color:var(--gray2);line-height:1.7;">${advice}</p>
        </div>

        <div class="result-actions">
          <button class="btn-share" onclick="shareResult()">🔗 결과 공유하기</button>
          <button class="btn-retry" onclick="location.reload()">🔄 다시 계산</button>
          <a href="../index.html" class="btn-back">← 포털로</a>
        </div>
      </div>`;

    setTimeout(() => {
      document.getElementById('hPctFill').style.width = hPct + '%';
    }, 200);
  });
}

function shareResult() {
  const text = '우리 아이 성장 백분위 계산해봤어요! 📊 우리 아이도 체크해봐요~';
  if (navigator.share) navigator.share({ title: '아이 성장 백분위', text, url: window.location.href });
  else navigator.clipboard.writeText(text + '\n' + window.location.href).then(() => alert('복사됐어요! 🎉'));
}
</script>
</body>
</html>

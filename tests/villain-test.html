}

function showQuestion(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score);
    choicesEl.appendChild(btn);
  });
}

function pick(score) {
  Object.keys(score).forEach(k => { scores[k] += score[k]; });
  current++;
  if (current < QUESTIONS.length) showQuestion(current);
  else showAdThenResult(showResult);
}

function showResult() {
  document.getElementById('quizSection').style.display = 'none';
  const top = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  currentResult = RESULTS[top];
  const r = currentResult;
  const sec = document.getElementById('resultSection');
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${r.emoji}</span>
      <div class="result-type">${r.type}</div>
      <div style="background:rgba(229,9,20,.1);border:1px solid rgba(229,9,20,.25);border-radius:8px;padding:10px 16px;font-size:14px;font-weight:600;color:#ff8a8a;margin:12px 0 20px;line-height:1.5;">
        💬 ${r.summary}
      </div>
      <div class="result-title">당신의 빌런 유형은 👉 ${r.type}</div>
      <div class="result-desc">${r.desc.replace(/\n/g, '<br>')}</div>
      <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
      <button class="img-card-btn" onclick="openShareOverlay()">📸 결과 이미지 카드 만들기</button>
      <div class="result-actions" style="margin-top:14px;">
        <button class="btn-share" onclick="shareLink()">🔗 링크 공유</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
}

function retryTest() {
  scores = { A:0, B:0, C:0, D:0, E:0 };
  current = 0;
  currentResult = null;
  shareDataURL = null;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQuestion(0);
}

function shareLink() {
  const r = currentResult;
  if (navigator.share) navigator.share({ title: '직장인 빌런 유형 테스트', text: `나의 빌런 유형은 "${r.type}"! 너는?`, url: window.location.href });
  else navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
}

// ── Canvas 이미지 생성 ─────────────────────────────────────────────────

function wrapText(ctx, text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let ty = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, ty);
      line = word;
      ty += lineH;
    } else {
      line = test;
    }
  }
  if (line) { ctx.fillText(line, x, ty); ty += lineH; }
  return ty;
}

async function renderVillainCard(r) {
  await document.fonts.ready;

  const W = 600, H = 820;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // ── 배경 그라데이션 ──
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, r.cardBg[0]);
  bg.addColorStop(1, r.cardBg[1]);
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 중앙 글로우
  const glow = ctx.createRadialGradient(W/2, H*0.32, 30, W/2, H*0.32, 260);
  glow.addColorStop(0, r.cardAccent + '22');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);

  // ── 상단 액센트 바 ──
  ctx.fillStyle = r.cardAccent;
  ctx.fillRect(0, 0, W, 5);

  // ── 사이트 상단 라벨 ──
  ctx.font = '500 14px "Noto Sans KR"';
  ctx.fillStyle = '#444';
  ctx.textAlign = 'center';
  ctx.fillText('🔬 오늘연구소 · 직장인 빌런 유형 테스트', W/2, 38);

  // ── 이모지 ──
  ctx.font = '96px serif';
  ctx.textAlign = 'center';
  ctx.fillText(r.emoji, W/2, 145);

  // ── 유형명 ──
  ctx.font = '900 38px "Noto Sans KR"';
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(r.type, W/2, 210);

  // 액센트 언더라인
  const tw = ctx.measureText(r.type).width;
  const ux = W/2 - tw/2;
  const grad = ctx.createLinearGradient(ux, 0, ux + tw, 0);
  grad.addColorStop(0, r.cardAccent);
  grad.addColorStop(1, r.cardAccent + '44');
  ctx.fillStyle = grad;
  ctx.fillRect(ux, 220, tw, 3);

  // ── 서머리 ──
  ctx.font = 'italic 500 17px "Noto Sans KR"';
  ctx.fillStyle = r.cardAccent + 'cc';
  ctx.textAlign = 'center';
  wrapText(ctx, `"${r.summary}"`, W/2, 262, W - 80, 28);

  // ── 구분선 ──
  const div = ctx.createLinearGradient(60, 0, W-60, 0);
  div.addColorStop(0, 'rgba(255,255,255,0)');
  div.addColorStop(0.5, 'rgba(255,255,255,0.15)');
  div.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = div;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(60, 320); ctx.lineTo(W-60, 320); ctx.stroke();

  // ── 설명 텍스트 (첫 문단만) ──
  const descLine = r.desc.split('\n')[0];
  ctx.font = '400 15px "Noto Sans KR"';
  ctx.fillStyle = '#9a9a9a';
  ctx.textAlign = 'center';
  wrapText(ctx, descLine, W/2, 355, W - 80, 26);

  // ── 구분선 2 ──
  ctx.strokeStyle = div;
  ctx.beginPath(); ctx.moveTo(60, 510); ctx.lineTo(W-60, 510); ctx.stroke();

  // ── 태그 ──
  ctx.font = '700 13px "Noto Sans KR"';
  ctx.fillStyle = r.cardAccent;
  ctx.textAlign = 'center';
  const tagsStr = r.tags.slice(0, 3).join('  ');
  ctx.fillText(tagsStr, W/2, 550);

  // ── 하단 워터마크 영역 ──
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(0, H - 90, W, 90);

  // 하단 구분선
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H - 90); ctx.lineTo(W, H - 90); ctx.stroke();

  ctx.font = '700 17px "Noto Sans KR"';
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.textAlign = 'center';
  ctx.fillText('나의 빌런 유형은? 직접 테스트해보기 →', W/2, H - 52);

  ctx.font = '400 13px "Noto Sans KR"';
  ctx.fillStyle = '#444';
  ctx.fillText('오늘연구소 | 직장인 빌런 유형 테스트', W/2, H - 24);

  return c;
}

let shareCanvas = null;

function toBlobAsync(canvas) {
  return new Promise((resolve, reject) => {
    canvas.toBlob(blob => blob ? resolve(blob) : reject(new Error('blob 실패')), 'image/png');
  });
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(20,20,20,.96);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.6);text-align:center;max-width:320px;font-family:inherit;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(() => t.remove(), 400); }, 3000);
}

async function openShareOverlay() {
  const btn = document.querySelector('.img-card-btn');
  if (btn) { btn.textContent = '⏳ 이미지 생성 중...'; btn.disabled = true; }

  try {
    shareCanvas = await renderVillainCard(currentResult);
    shareDataURL = shareCanvas.toDataURL('image/png');
    document.getElementById('sharePreviewImg').src = shareDataURL;
    document.getElementById('shareOverlay').classList.add('open');
  } finally {
    if (btn) { btn.textContent = '📸 결과 이미지 카드 만들기'; btn.disabled = false; }
  }
}

function closeShareOverlay() {
  document.getElementById('shareOverlay').classList.remove('open');
}

function downloadShareImage() {
  if (!shareDataURL) return;
  const a = document.createElement('a');
  a.href = shareDataURL;
  a.download = `빌런유형_${currentResult.type}.png`;
  a.click();
}

async function shareImageFile() {
  if (!shareCanvas) return;
  const btn = document.querySelector('.share-action-btn.secondary');
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  try {
    const blob = await toBlobAsync(shareCanvas);
    const file = new File([blob], `빌런유형_${currentResult.type}.png`, { type: 'image/png' });
    // 1순위: 이미지 파일 공유 (모바일)
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({ files: [file], title: '직장인 빌런 유형 테스트', text: `나의 빌런 유형은 "${currentResult.type}"! 너는?` });
    // 2순위: 링크 공유 (일부 모바일)
    } else if (navigator.share) {
      await navigator.share({ title: '직장인 빌런 유형 테스트', text: `나의 빌런 유형은 "${currentResult.type}"! 너는?`, url: window.location.href });
    // 3순위: 이미지 다운로드
    } else {
      downloadShareImage();
      showToast('💾 이미지가 저장됐어요! 카카오톡에 직접 공유해보세요 😊');
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      downloadShareImage();
      showToast('💾 이미지가 저장됐어요! 직접 공유해보세요 😊');
    }
  } finally {
    if (btn) { btn.textContent = '📤 공유하기'; btn.disabled = false; }
  }
}

// ESC로 오버레이 닫기
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeShareOverlay(); });
document.getElementById('shareOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('shareOverlay')) closeShareOverlay();
});
</script>

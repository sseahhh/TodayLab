let scores = { A:0, B:0, C:0, D:0, E:0 };
let current = 0;

function startTest() {
  document.getElementById('introSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQuestion(0);
}

function showQuestion(i) {
  const q = QUESTIONS[i];
  document.getElementById('questionNum').textContent = `Q${i + 1}`;
  document.getElementById('questionText').textContent = q.text;
  document.getElementById('progressText').textContent = `${i + 1} / ${QUESTIONS.length}`;
  document.getElementById('progressFill').style.width = `${((i + 1) / QUESTIONS.length) * 100}%`;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-letter">${letters[idx]}</span>${c.text}`;
    btn.onclick = () => pick(c.score);
    choicesEl.appendChild(btn);
  });
}

function pick(score) {
  Object.keys(score).forEach(k => { scores[k] += score[k]; });
  current++;
  if (current < QUESTIONS.length) {
    showQuestion(current);
  } else {
    showAdThenResult(showResult);
  }
}

function showResult() {

      <div class="result-type">${r.type}</div>
      <div style="
        background: rgba(229,9,20,.1);
        border: 1px solid rgba(229,9,20,.25);
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
        font-weight: 600;
        color: #ff8a8a;
        margin: 12px 0 20px;
        line-height: 1.5;
      ">💬 ${r.summary}</div>
      <div class="result-title">${r.title}</div>
      <div class="result-desc">${r.desc.replace(/\n/g, '<br>')}</div>
      <div class="result-tags">${r.tags.map(t => `<span class="result-tag">${t}</span>`).join('')}</div>
      <div class="result-actions">
        <button class="btn-share" onclick="shareResult('${r.type}')">🔗 결과 공유하기</button>
        <button class="btn-retry" onclick="retryTest()">🔄 다시하기</button>
        <a href="../index.html" class="btn-back">← 포털로</a>
      </div>
    </div>`;
}

function retryTest() {
  scores = { A:0, B:0, C:0, D:0, E:0 };
  current = 0;
  document.getElementById('resultSection').style.display = 'none';
  document.getElementById('quizSection').style.display = 'block';
  showQuestion(0);
}

function shareResult(type) {
  if (navigator.share) {
    navigator.share({ title: '직장인 빌런 유형 테스트', text: `나의 빌런 유형은 "${type}"! 너는?`, url: window.location.href });
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => alert('링크가 복사됐어요! 🎉'));
  }
}
</script>
</body>
</html>
